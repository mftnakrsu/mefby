<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 540" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <!-- ============ BACKGROUND ============ -->
  <rect x="0" y="0" width="1060" height="540" fill="#ffffff"/>

  <!-- ============ TITLE ============ -->
  <text x="530" y="50" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">The open-book exam</text>
  <text x="530" y="76" text-anchor="middle" font-size="14" fill="#64748b">Same question, two ways to answer it</text>

  <!-- ============ ROOM FLOOR / SOFT STAGE ============ -->
  <!-- faint shadow behind the stage panel -->
  <rect x="46" y="106" width="968" height="356" rx="20" fill="#0f172a" opacity="0.04"/>
  <rect x="44" y="102" width="968" height="356" rx="20" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <!-- soft divider between the two students -->
  <rect x="525" y="138" width="10" height="248" rx="5" fill="#e2e8f0"/>
  <circle cx="530" cy="132" r="7" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ===================================================================== -->
  <!-- ============================ LEFT STUDENT ============================ -->
  <!-- ============ "Closed book" : Vanilla LLM ============ -->
  <!-- ===================================================================== -->

  <!-- panel label -->
  <text x="290" y="138" text-anchor="middle" font-size="13" font-weight="600" fill="#94a3b8" letter-spacing="0.5">CLOSED BOOK</text>

  <!-- thought bubble with "?" -->
  <g>
    <circle cx="360" cy="172" r="5" fill="#fff1f2" stroke="#fecdd3" stroke-width="1.5"/>
    <circle cx="372" cy="160" r="8" fill="#fff1f2" stroke="#fecdd3" stroke-width="1.5"/>
    <rect x="372" y="118" width="118" height="58" rx="16" fill="#fff1f2" stroke="#fecdd3" stroke-width="1.5"/>
    <text x="402" y="156" text-anchor="middle" font-size="30" font-weight="700" fill="#f43f5e">?</text>
    <!-- faint hesitant guess lines -->
    <rect x="424" y="134" width="48" height="6" rx="3" fill="#fda4af" opacity="0.55"/>
    <rect x="424" y="146" width="34" height="6" rx="3" fill="#fda4af" opacity="0.4"/>
    <rect x="424" y="158" width="42" height="6" rx="3" fill="#fda4af" opacity="0.28"/>
  </g>

  <!-- STUDENT (geometric, seated) -->
  <g>
    <!-- chair back hint -->
    <rect x="232" y="252" width="14" height="86" rx="7" fill="#e2e8f0"/>
    <!-- torso -->
    <path d="M252 350 q0 -64 50 -64 q50 0 50 64 z" fill="#6366f1"/>
    <!-- arm resting on desk (guessing posture) -->
    <path d="M336 300 q26 8 34 34 l-16 8 q-10 -22 -30 -28 z" fill="#4f46e5"/>
    <!-- neck -->
    <rect x="294" y="248" width="16" height="20" rx="6" fill="#fcd9c2"/>
    <!-- head -->
    <circle cx="302" cy="232" r="26" fill="#ffe0c7"/>
    <!-- hair cap -->
    <path d="M276 230 a26 26 0 0 1 52 0 q-26 -14 -52 0 z" fill="#1e293b"/>
    <!-- eye (tiny dot) -->
    <circle cx="296" cy="232" r="2.4" fill="#0f172a"/>
    <circle cx="310" cy="232" r="2.4" fill="#0f172a"/>
  </g>

  <!-- DESK (left) with soft shadow -->
  <rect x="208" y="356" width="190" height="14" rx="7" fill="#0f172a" opacity="0.05"/>
  <rect x="202" y="346" width="196" height="20" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="216" y="366" width="8" height="20" rx="3" fill="#e2e8f0"/>
  <rect x="376" y="366" width="8" height="20" rx="3" fill="#e2e8f0"/>

  <!-- CLOSED / STACKED books on the desk -->
  <g>
    <rect x="246" y="332" width="118" height="14" rx="3" fill="#94a3b8"/>
    <rect x="246" y="332" width="10" height="14" fill="#64748b"/>
    <rect x="252" y="318" width="118" height="14" rx="3" fill="#a5b4fc"/>
    <rect x="252" y="318" width="10" height="14" fill="#6366f1"/>
    <rect x="240" y="304" width="118" height="14" rx="3" fill="#cbd5e1"/>
    <rect x="240" y="304" width="10" height="14" fill="#94a3b8"/>
  </g>

  <!-- TAG (rose-tinted) : Vanilla LLM -->
  <g>
    <rect x="172" y="396" width="284" height="58" rx="14" fill="#fff1f2" stroke="#fecdd3" stroke-width="1"/>
    <circle cx="196" cy="425" r="9" fill="#f43f5e"/>
    <path d="M191.5 425 l3.5 3.5 l6 -7" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0"/>
    <text x="196" y="430" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">!</text>
    <text x="216" y="421" font-size="15" font-weight="700" fill="#9f1239">Vanilla LLM</text>
    <text x="216" y="440" font-size="11.5" fill="#be123c">answers from memory &#8212; guesses when unsure</text>
  </g>

  <!-- ===================================================================== -->
  <!-- ============================ RIGHT STUDENT =========================== -->
  <!-- ============ "Open book" : RAG ============ -->
  <!-- ===================================================================== -->

  <!-- panel label -->
  <text x="770" y="138" text-anchor="middle" font-size="13" font-weight="600" fill="#94a3b8" letter-spacing="0.5">OPEN BOOK</text>

  <!-- STUDENT (geometric, seated, calmly writing) -->
  <g>
    <!-- chair back hint -->
    <rect x="846" y="252" width="14" height="86" rx="7" fill="#e2e8f0"/>
    <!-- torso -->
    <path d="M740 350 q0 -64 50 -64 q50 0 50 64 z" fill="#10b981"/>
    <!-- neck -->
    <rect x="782" y="248" width="16" height="20" rx="6" fill="#fcd9c2"/>
    <!-- head -->
    <circle cx="790" cy="232" r="26" fill="#ffe0c7"/>
    <!-- hair cap -->
    <path d="M764 230 a26 26 0 0 1 52 0 q-26 -14 -52 0 z" fill="#0f3d33"/>
    <!-- eyes -->
    <circle cx="784" cy="233" r="2.4" fill="#0f172a"/>
    <circle cx="798" cy="233" r="2.4" fill="#0f172a"/>
    <!-- writing arm reaching to sheet -->
    <path d="M756 304 q-34 12 -42 44 l16 8 q8 -26 38 -36 z" fill="#059669"/>
    <!-- pointing arm reaching to the open book -->
    <path d="M824 300 q34 6 46 30 l-16 10 q-10 -18 -34 -22 z" fill="#059669"/>
  </g>

  <!-- DESK (right) with soft shadow -->
  <rect x="654" y="356" width="232" height="14" rx="7" fill="#0f172a" opacity="0.05"/>
  <rect x="648" y="346" width="238" height="20" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="662" y="366" width="8" height="20" rx="3" fill="#e2e8f0"/>
  <rect x="864" y="366" width="8" height="20" rx="3" fill="#e2e8f0"/>

  <!-- ANSWER SHEET the student writes on -->
  <g>
    <rect x="666" y="318" width="78" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" transform="rotate(-6 705 333)"/>
    <g transform="rotate(-6 705 333)">
      <rect x="674" y="325" width="58" height="4" rx="2" fill="#10b981"/>
      <rect x="674" y="333" width="50" height="4" rx="2" fill="#cbd5e1"/>
      <rect x="674" y="341" width="40" height="4" rx="2" fill="#cbd5e1"/>
    </g>
    <!-- pen -->
    <rect x="700" y="330" width="34" height="5" rx="2.5" fill="#f59e0b" transform="rotate(-32 717 332)"/>
  </g>

  <!-- OPEN BOOK lying on desk with highlighted passage -->
  <g>
    <!-- soft shadow -->
    <path d="M760 348 q44 -16 88 0 l0 6 q-44 -16 -88 0 z" fill="#0f172a" opacity="0.06"/>
    <!-- left page -->
    <path d="M764 342 q22 -10 40 -10 l0 -44 q-18 0 -40 10 z" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <!-- right page -->
    <path d="M844 342 q-22 -10 -40 -10 l0 -44 q18 0 40 10 z" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <!-- spine -->
    <rect x="802" y="288" width="4" height="56" rx="2" fill="#cbd5e1"/>
    <!-- left page text lines -->
    <rect x="772" y="306" width="26" height="3.5" rx="1.75" fill="#cbd5e1"/>
    <rect x="770" y="314" width="28" height="3.5" rx="1.75" fill="#cbd5e1"/>
    <rect x="769" y="322" width="29" height="3.5" rx="1.75" fill="#cbd5e1"/>
    <rect x="768" y="330" width="22" height="3.5" rx="1.75" fill="#cbd5e1"/>
    <!-- right page text lines + TEAL HIGHLIGHT bar -->
    <rect x="810" y="306" width="28" height="3.5" rx="1.75" fill="#cbd5e1"/>
    <rect x="810" y="314" width="32" height="8" rx="4" fill="#99f6e4"/>
    <rect x="810" y="316" width="30" height="3.5" rx="1.75" fill="#0f766e"/>
    <rect x="810" y="326" width="26" height="3.5" rx="1.75" fill="#cbd5e1"/>
    <rect x="811" y="334" width="20" height="3.5" rx="1.75" fill="#cbd5e1"/>
    <!-- pointing finger / hand on the highlighted line -->
    <circle cx="850" cy="320" r="7" fill="#ffe0c7" stroke="#fcd9c2" stroke-width="1"/>
    <path d="M850 320 l-12 -2" stroke="#fcd9c2" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- TAG (emerald-tinted) : RAG -->
  <g>
    <rect x="632" y="396" width="270" height="58" rx="14" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
    <circle cx="657" cy="425" r="9" fill="#10b981"/>
    <path d="M652.5 425 l3.5 3.5 l6 -7.5" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="677" y="421" font-size="15" font-weight="700" fill="#065f46">RAG</text>
    <text x="677" y="440" font-size="11.5" fill="#047857">looks it up first, then answers</text>
  </g>

  <!-- ===================================================================== -->
  <!-- ============ MAPPING CAPTIONS (analogy -> mechanism) ============ -->
  <!-- placed subtly to the right, stacked, small -->
  <!-- ===================================================================== -->
  <g>
    <!-- caption 1 : retrieval (teal) -->
    <circle cx="916" cy="170" r="4" fill="#14b8a6"/>
    <text x="928" y="167" font-size="11.5" fill="#334155">find the right page</text>
    <text x="928" y="181" font-size="11.5" font-weight="600" fill="#0f766e">= retrieval</text>

    <!-- caption 2 : augmentation (amber) -->
    <circle cx="916" cy="212" r="4" fill="#f59e0b"/>
    <text x="928" y="209" font-size="11.5" fill="#334155">lay it open by you</text>
    <text x="928" y="223" font-size="11.5" font-weight="600" fill="#b45309">= augmentation</text>

    <!-- caption 3 : generation (indigo) -->
    <circle cx="916" cy="254" r="4" fill="#6366f1"/>
    <text x="928" y="251" font-size="11.5" fill="#334155">answer in your words</text>
    <text x="928" y="265" font-size="11.5" font-weight="600" fill="#4f46e5">= generation</text>
  </g>

</svg>
