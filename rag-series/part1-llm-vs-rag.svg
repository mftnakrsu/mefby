<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 580" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1,1 L9,5 L1,9" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>

  <!-- Canvas -->
  <rect x="0" y="0" width="1060" height="580" fill="#ffffff" />

  <!-- Diagram title -->
  <text x="40" y="44" font-size="20" font-weight="700" fill="#0f172a">Vanilla LLM vs. RAG</text>
  <text x="40" y="66" font-size="13" fill="#64748b">Same question, two ways to answer it</text>

  <!-- Vertical divider -->
  <line x1="530" y1="92" x2="530" y2="552" stroke="#e2e8f0" stroke-width="1" />

  <!-- ============ LEFT PANEL: Vanilla LLM ============ -->
  <!-- Header -->
  <text x="64" y="112" font-size="16" font-weight="700" fill="#0f172a">Vanilla LLM</text>
  <text x="64" y="132" font-size="12.5" fill="#64748b">answers from memory</text>

  <!-- 1) Question chip -->
  <rect x="62" y="150" width="400" height="50" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
  <text x="80" y="172" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.4">QUESTION</text>
  <text x="80" y="190" font-size="13" fill="#334155" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">"What is our 2026 refund window?"</text>

  <!-- arrow -->
  <line x1="262" y1="200" x2="262" y2="226" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arrow)" />

  <!-- 2) LLM box -->
  <rect x="182" y="230" width="160" height="56" rx="14" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1" />
  <text x="262" y="258" font-size="16" font-weight="700" fill="#4f46e5" text-anchor="middle">LLM</text>
  <text x="262" y="276" font-size="11" fill="#6366f1" text-anchor="middle">from training memory</text>

  <!-- arrow -->
  <line x1="262" y1="286" x2="262" y2="312" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arrow)" />

  <!-- 3) Answer card (rose) -->
  <!-- soft shadow -->
  <rect x="64" y="320" width="400" height="148" rx="14" fill="#0f172a" opacity="0.04" />
  <rect x="62" y="316" width="400" height="148" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
  <!-- rose left accent -->
  <rect x="62" y="316" width="6" height="148" rx="3" fill="#f43f5e" />

  <text x="84" y="342" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.4">ANSWER</text>
  <text x="84" y="368" font-size="16" font-weight="600" fill="#0f172a">Refunds accepted within 90 days.</text>

  <!-- rose badge -->
  <rect x="84" y="386" width="206" height="26" rx="8" fill="#fff1f2" stroke="#fecdd3" stroke-width="1" />
  <text x="97" y="403" font-size="12.5" font-weight="700" fill="#e11d48">&#10007;</text>
  <text x="113" y="403" font-size="12" font-weight="600" fill="#e11d48">Hallucinated &#8212; no source</text>

  <text x="84" y="438" font-size="12" fill="#64748b">made up; sounds confident</text>

  <!-- ============ RIGHT PANEL: RAG ============ -->
  <!-- Header -->
  <text x="596" y="112" font-size="16" font-weight="700" fill="#0f172a">RAG</text>
  <text x="596" y="132" font-size="12.5" fill="#64748b">answers from your documents</text>

  <!-- 1) Question chip (same) -->
  <rect x="594" y="150" width="400" height="50" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
  <text x="612" y="172" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.4">QUESTION</text>
  <text x="612" y="190" font-size="13" fill="#334155" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">"What is our 2026 refund window?"</text>

  <!-- arrow -->
  <line x1="794" y1="200" x2="794" y2="222" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arrow)" />

  <!-- 2) Retrieve step -->
  <rect x="594" y="226" width="400" height="70" rx="14" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1" />
  <!-- database/document icon (teal) -->
  <g transform="translate(612,242)">
    <ellipse cx="14" cy="6" rx="14" ry="5.5" fill="none" stroke="#14b8a6" stroke-width="1.6" />
    <path d="M0,6 L0,32 C0,35 6.3,38 14,38 C21.7,38 28,35 28,32 L28,6" fill="none" stroke="#14b8a6" stroke-width="1.6" />
    <path d="M0,19 C0,22 6.3,25 14,25 C21.7,25 28,22 28,19" fill="none" stroke="#14b8a6" stroke-width="1.4" />
  </g>
  <text x="654" y="250" font-size="11" font-weight="700" fill="#0d9488" letter-spacing="0.4">RETRIEVE</text>
  <text x="654" y="268" font-size="13.5" font-weight="600" fill="#0f172a">Knowledge base</text>
  <!-- matched snippet chip -->
  <rect x="654" y="274" width="312" height="16" rx="8" fill="#ecfeff" stroke="#a5f3fc" stroke-width="1" />
  <circle cx="666" cy="282" r="3" fill="#06b6d4" />
  <text x="676" y="286" font-size="11" fill="#0e7490" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">...refunds within 30 days...</text>

  <!-- arrow -->
  <line x1="794" y1="296" x2="794" y2="316" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arrow)" />

  <!-- 3) Augmented prompt (amber) -->
  <rect x="594" y="320" width="400" height="74" rx="14" fill="#fffbeb" stroke="#fde68a" stroke-width="1" />
  <rect x="594" y="320" width="6" height="74" rx="3" fill="#f59e0b" />
  <text x="616" y="344" font-size="11" font-weight="700" fill="#b45309" letter-spacing="0.4">AUGMENTED PROMPT</text>
  <text x="616" y="365" font-size="12.5" fill="#334155" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">Context: refunds within 30 days</text>
  <text x="616" y="383" font-size="12.5" fill="#334155" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">Question: 2026 refund window?</text>

  <!-- arrow -->
  <line x1="794" y1="394" x2="794" y2="414" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arrow)" />

  <!-- 4) LLM box -->
  <rect x="714" y="418" width="160" height="48" rx="14" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1" />
  <text x="794" y="447" font-size="16" font-weight="700" fill="#4f46e5" text-anchor="middle">LLM</text>

  <!-- arrow -->
  <line x1="794" y1="466" x2="794" y2="486" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arrow)" />

  <!-- 5) Answer card (emerald) -->
  <rect x="596" y="494" width="400" height="62" rx="14" fill="#0f172a" opacity="0.04" />
  <rect x="594" y="490" width="400" height="62" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
  <rect x="594" y="490" width="6" height="62" rx="3" fill="#10b981" />

  <text x="616" y="514" font-size="14.5" font-weight="600" fill="#0f172a">Refunds accepted within 30 days.</text>
  <!-- emerald badge -->
  <rect x="616" y="524" width="118" height="22" rx="8" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1" />
  <text x="628" y="539" font-size="12" font-weight="700" fill="#059669">&#10003;</text>
  <text x="643" y="539" font-size="11.5" font-weight="600" fill="#059669">Grounded</text>
  <!-- citation -->
  <text x="744" y="539" font-size="10.5" fill="#64748b" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">Source: refund-policy.pdf, p.3</text>
</svg>
