<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" width="100%" style="height:auto" role="img" aria-label="The idempotency key gives effectively-once side effects. Top row, the safe path: the refund tool carries a stable key ORD-3300 colon refund colon 180.00. The first call reaches the payment provider, which has not seen the key, so it honors the key, posts the refund moving the ledger to 180 dollars, and records the key in its keystore, returning refunded 180 dollars to ORD-3300. On resume the SAME key is re-issued; the provider recognizes it and returns the original stored result with NO second charge, so the ledger stays at 180 dollars: effectively once. Bottom row, the naive path: a rerun with no key. The provider cannot tell it apart from a fresh request, posts a second refund, and the ledger doubles to 360 dollars: a double charge.">
  <title>The idempotency key: effectively-once side effects versus a naive rerun that double-charges</title>

  <defs>
    <marker id="arrAmber" markerWidth="11" markerHeight="9" refX="9" refY="4.5" orient="auto">
      <polygon points="0 0, 11 4.5, 0 9" fill="#f59e0b"/>
    </marker>
    <marker id="arrEmerald" markerWidth="11" markerHeight="9" refX="9" refY="4.5" orient="auto">
      <polygon points="0 0, 11 4.5, 0 9" fill="#10b981"/>
    </marker>
    <marker id="arrRose" markerWidth="11" markerHeight="9" refX="9" refY="4.5" orient="auto">
      <polygon points="0 0, 11 4.5, 0 9" fill="#f43f5e"/>
    </marker>
    <marker id="arrTeal" markerWidth="11" markerHeight="9" refX="9" refY="4.5" orient="auto">
      <polygon points="0 0, 11 4.5, 0 9" fill="#14b8a6"/>
    </marker>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="660" fill="#f8fafc"/>

  <!-- Top-right label -->
  <text x="1170" y="30" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="11" font-weight="700" fill="#64748b" letter-spacing="0.06em">AGENTS FROM FIRST PRINCIPLES</text>
  <text x="1170" y="46" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="10" fill="#94a3b8">Part 9, the durable agent</text>

  <!-- Title -->
  <text x="40" y="34" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="18" font-weight="700" fill="#0f172a">The idempotency key: effectively-once across a replay</text>
  <text x="40" y="54" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12" fill="#64748b">A side-effecting refund carries a STABLE key. The provider remembers keys it honored, so a repeat of the same key returns the original result instead of charging twice.</text>

  <!-- The stable key chip (shared) -->
  <text x="40" y="92" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#64748b" letter-spacing="0.04em">THE STABLE KEY (SAME ON EVERY ATTEMPT)</text>
  <rect x="40" y="102" width="372" height="40" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.8"/>
  <!-- key glyph -->
  <circle cx="66" cy="122" r="8.5" fill="none" stroke="#b45309" stroke-width="2.4"/>
  <line x1="73" y1="122" x2="92" y2="122" stroke="#b45309" stroke-width="2.4"/>
  <line x1="86" y1="122" x2="86" y2="129" stroke="#b45309" stroke-width="2.4"/>
  <line x1="92" y1="122" x2="92" y2="130" stroke="#b45309" stroke-width="2.4"/>
  <text x="108" y="120" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700" fill="#b45309">ORD-3300:refund:180.00</text>
  <text x="108" y="135" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#92400e">order + action + amount, derived deterministically from the plan</text>

  <!-- ================= SAFE PATH (top row) ================= -->
  <rect x="40" y="160" width="1120" height="210" rx="14" fill="#ffffff" stroke="#a7f3d0" stroke-width="1.8"/>
  <rect x="40" y="160" width="1120" height="30" rx="14" fill="#ecfdf5"/>
  <rect x="40" y="176" width="1120" height="14" fill="#ecfdf5"/>
  <text x="58" y="181" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#047857">WITH THE KEY &#183; effectively-once</text>
  <text x="1142" y="181" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#047857">first call posts once; the replay is a no-op charge</text>

  <!-- FIRST CALL box -->
  <rect x="64" y="206" width="244" height="142" rx="11" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.4"/>
  <text x="80" y="230" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#0d9488">1 &#183; FIRST CALL</text>
  <text x="80" y="250" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10" fill="#475569">process_refund(</text>
  <text x="92" y="265" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10" fill="#475569">ORD-3300, $180.00,</text>
  <rect x="92" y="274" width="200" height="20" rx="5" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="100" y="288" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9" fill="#b45309">key ORD-3300:refund:180.00</text>
  <text x="80" y="312" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10" fill="#475569">)</text>
  <text x="80" y="334" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#0d9488">the agent's first refund attempt</text>

  <!-- arrow first call -> provider -->
  <line x1="308" y1="262" x2="380" y2="262" stroke="#14b8a6" stroke-width="2.4" marker-end="url(#arrTeal)"/>
  <text x="344" y="254" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="8.5" font-weight="700" fill="#0d9488">new key</text>

  <!-- PROVIDER box (center) -->
  <rect x="380" y="206" width="300" height="142" rx="11" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.6"/>
  <text x="396" y="230" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#b45309">2 &#183; PAYMENT PROVIDER (keystore)</text>
  <text x="396" y="249" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#92400e">"have I honored this key before?"</text>
  <text x="396" y="263" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#047857">No &#8594; honor it: post the refund, then</text>
  <text x="396" y="277" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#047857">record the key atomically with the charge.</text>
  <!-- keystore mini -->
  <rect x="396" y="288" width="268" height="44" rx="7" fill="#ffffff" stroke="#fde68a" stroke-width="1.2"/>
  <text x="408" y="304" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="8.5" font-weight="700" fill="#b45309" letter-spacing="0.03em">KEYSTORE NOW HOLDS</text>
  <text x="408" y="318" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="8.5" fill="#92400e">"ORD-3300:refund:180.00"</text>
  <text x="408" y="328" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="8.5" fill="#64748b">&#8594; "refunded $180.00 to ORD-3300"</text>

  <!-- arrow provider -> ledger -->
  <line x1="680" y1="248" x2="752" y2="248" stroke="#10b981" stroke-width="2.4" marker-end="url(#arrEmerald)"/>
  <text x="716" y="240" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="8.5" font-weight="700" fill="#047857">+$180.00</text>

  <!-- LEDGER box (top) -->
  <rect x="752" y="206" width="184" height="142" rx="11" fill="#ecfdf5" stroke="#10b981" stroke-width="1.6"/>
  <text x="768" y="230" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#047857">3 &#183; LEDGER</text>
  <text x="768" y="248" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10" fill="#065f46">ORD-3300</text>
  <text x="844" y="290" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="26" font-weight="700" fill="#047857">$180.00</text>
  <text x="844" y="316" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#047857">money moved exactly once</text>
  <text x="844" y="334" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#065f46">after both attempts</text>

  <!-- REPLAY CALL box (far right) -->
  <rect x="956" y="206" width="186" height="142" rx="11" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.6"/>
  <text x="972" y="230" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#4f46e5">4 &#183; REPLAY</text>
  <text x="972" y="249" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#3730a3">resume re-issues the</text>
  <text x="972" y="263" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#3730a3">SAME key.</text>
  <text x="972" y="282" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#047857">Provider: "seen it" &#8594;</text>
  <text x="972" y="296" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#047857">return the stored result,</text>
  <text x="972" y="310" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#047857">NO second charge.</text>
  <text x="972" y="332" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#6366f1">ledger unchanged</text>

  <!-- replay loop arrow: replay -> provider (curving back) -->
  <path d="M 1010 348 C 1010 392, 560 392, 560 350" fill="none" stroke="#6366f1" stroke-width="2.2" stroke-dasharray="6 4" marker-end="url(#arrAmber)"/>
  <rect x="700" y="380" width="170" height="22" rx="6" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="785" y="395" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" font-weight="700" fill="#4f46e5">same key, looked up not re-charged</text>

  <!-- ================= NAIVE PATH (bottom row) ================= -->
  <rect x="40" y="430" width="1120" height="158" rx="14" fill="#ffffff" stroke="#fecdd3" stroke-width="1.8"/>
  <rect x="40" y="430" width="1120" height="30" rx="14" fill="#fff1f2"/>
  <rect x="40" y="446" width="1120" height="14" fill="#fff1f2"/>
  <text x="58" y="451" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#9f1239">WITHOUT THE KEY &#183; naive rerun double-charges</text>
  <text x="1142" y="451" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#9f1239">the provider cannot tell the rerun from a fresh request</text>

  <!-- naive first call -->
  <rect x="64" y="476" width="244" height="92" rx="11" fill="#fff1f2" stroke="#fecdd3" stroke-width="1.4"/>
  <text x="80" y="500" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#9f1239">rerun the plan from scratch</text>
  <text x="80" y="520" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10" fill="#475569">process_refund(</text>
  <text x="92" y="535" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10" fill="#475569">ORD-3300, $180.00)</text>
  <rect x="80" y="544" width="120" height="18" rx="5" fill="#ffffff" stroke="#fecdd3" stroke-width="1"/>
  <text x="140" y="557" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" fill="#9f1239">no key attached</text>

  <!-- arrow naive -> provider -->
  <line x1="308" y1="522" x2="380" y2="522" stroke="#f43f5e" stroke-width="2.4" marker-end="url(#arrRose)"/>
  <text x="344" y="514" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="8.5" font-weight="700" fill="#9f1239">again</text>

  <!-- naive provider -->
  <rect x="380" y="476" width="300" height="92" rx="11" fill="#fff1f2" stroke="#fecdd3" stroke-width="1.4"/>
  <text x="396" y="500" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#9f1239">PROVIDER: no key to match</text>
  <text x="396" y="520" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#9f1239">It looks like a brand-new refund request,</text>
  <text x="396" y="534" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#9f1239">so the provider honors it and posts AGAIN.</text>
  <text x="396" y="554" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#b91c1c">memoization alone fails here: no journaled tool_result either</text>

  <!-- arrow naive provider -> ledger -->
  <line x1="680" y1="514" x2="752" y2="514" stroke="#f43f5e" stroke-width="2.4" marker-end="url(#arrRose)"/>
  <text x="716" y="506" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="8.5" font-weight="700" fill="#9f1239">+$180.00</text>
  <text x="716" y="530" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="8.5" font-weight="700" fill="#9f1239">a 2nd time</text>

  <!-- naive ledger -->
  <rect x="752" y="476" width="184" height="92" rx="11" fill="#fff1f2" stroke="#f43f5e" stroke-width="1.8"/>
  <text x="768" y="500" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#9f1239">LEDGER</text>
  <text x="844" y="535" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="24" font-weight="700" fill="#9f1239">$360.00</text>
  <text x="844" y="556" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" font-weight="700" fill="#9f1239">DOUBLE REFUND. The bug.</text>

  <!-- contrast callout (bottom right) -->
  <rect x="956" y="476" width="186" height="92" rx="11" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="972" y="498" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="700" fill="#475569">why the key wins</text>
  <text x="972" y="516" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#64748b">The effect is the same call;</text>
  <text x="972" y="529" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#64748b">only the key lets the provider</text>
  <text x="972" y="542" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#64748b">deduplicate it. Effectively-once</text>
  <text x="972" y="555" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#64748b">lives in the keystore, not the agent.</text>

  <!-- footer reuse / honesty note -->
  <rect x="40" y="604" width="1120" height="40" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.2"/>
  <text x="58" y="623" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10.5" font-weight="700" fill="#4f46e5">This hardens Part 2's local idempotency guard, which was an in-memory dict that died with the process.</text>
  <text x="58" y="638" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#3730a3">The keystore models the payment provider's own idempotency, the durable thing that makes the guarantee real. The key must be stable across runs, derived from the plan, never random per attempt.</text>

</svg>
