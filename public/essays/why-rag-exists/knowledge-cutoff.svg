<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 440" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <!-- diagonal hatch for the unknown band -->
    <pattern id="hatch" width="10" height="10" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="#fff1f2" />
      <line x1="0" y1="0" x2="0" y2="10" stroke="#f43f5e" stroke-width="1.1" stroke-opacity="0.32" />
    </pattern>
    <!-- training bar gradient: indigo to teal -->
    <linearGradient id="trainFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.16" />
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0.16" />
    </linearGradient>
    <linearGradient id="trainStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1" />
      <stop offset="1" stop-color="#14b8a6" />
    </linearGradient>
  </defs>

  <!-- canvas -->
  <rect x="0" y="0" width="1060" height="440" fill="#ffffff" />

  <!-- title -->
  <text x="48" y="52" font-size="21" font-weight="700" fill="#0f172a">The knowledge cutoff</text>
  <text x="48" y="76" font-size="14" fill="#64748b">Why a frozen model can't know what happened after it stopped training.</text>

  <!-- ===================== AXIS GEOMETRY ===================== -->
  <!-- axis spans x=80 .. x=980, y=240. cutoff at x=575 (~55%) -->

  <!-- KNOWN / training region soft shadow + card-like bar -->
  <rect x="82" y="222" width="495" height="40" rx="12" fill="#0f172a" opacity="0.04" />
  <rect x="80" y="218" width="495" height="40" rx="12" fill="url(#trainFill)" stroke="url(#trainStroke)" stroke-width="1.4" />

  <!-- training bar labels -->
  <text x="328" y="206" font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle">Training data — what the model learned</text>
  <text x="328" y="280" font-size="12.5" fill="#64748b" text-anchor="middle">the model's frozen knowledge</text>

  <!-- UNKNOWN / hatched band after cutoff: x=575 .. 980 -->
  <rect x="575" y="218" width="405" height="40" rx="12" fill="url(#hatch)" stroke="#f43f5e" stroke-width="1.2" stroke-opacity="0.45" stroke-dasharray="5 4" />
  <text x="777" y="244" font-size="14.5" font-weight="700" fill="#e11d48" text-anchor="middle">The model knows nothing here</text>

  <!-- the time axis line across the whole thing -->
  <line x1="80" y1="238" x2="958" y2="238" stroke="#cbd5e1" stroke-width="2" />
  <!-- arrow of time -->
  <path d="M 958 238 L 944 232 L 944 244 Z" fill="#94a3b8" />
  <text x="990" y="242" font-size="11.5" fill="#94a3b8" font-style="italic">time</text>

  <!-- ===================== CUTOFF MARKER ===================== -->
  <line x1="575" y1="118" x2="575" y2="362" stroke="#475569" stroke-width="2" stroke-dasharray="2 4" />
  <circle cx="575" cy="238" r="6" fill="#ffffff" stroke="#475569" stroke-width="2.2" />
  <!-- cutoff label chip -->
  <rect x="488" y="92" width="174" height="44" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1" />
  <text x="575" y="113" font-size="13.5" font-weight="700" fill="#0f172a" text-anchor="middle">Knowledge cutoff</text>
  <text x="575" y="129" font-size="11" fill="#64748b" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">(training stops here)</text>

  <!-- ===================== EVENT DOTS (in the gap) ===================== -->
  <!-- Event 1: ABOVE axis -->
  <g>
    <line x1="648" y1="238" x2="648" y2="172" stroke="#cbd5e1" stroke-width="1.2" />
    <circle cx="648" cy="238" r="5.5" fill="#ffffff" stroke="#94a3b8" stroke-width="2" />
    <path d="M 645.5 235.5 L 650.5 240.5 M 650.5 235.5 L 645.5 240.5" stroke="#f43f5e" stroke-width="1.6" stroke-linecap="round" />
    <rect x="582" y="146" width="132" height="26" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
    <text x="648" y="163" font-size="12" fill="#475569" text-anchor="middle">Yesterday's news</text>
  </g>

  <!-- Event 2: BELOW axis -->
  <g>
    <line x1="762" y1="238" x2="762" y2="300" stroke="#cbd5e1" stroke-width="1.2" />
    <circle cx="762" cy="238" r="5.5" fill="#ffffff" stroke="#94a3b8" stroke-width="2" />
    <path d="M 759.5 235.5 L 764.5 240.5 M 764.5 235.5 L 759.5 240.5" stroke="#f43f5e" stroke-width="1.6" stroke-linecap="round" />
    <rect x="694" y="302" width="136" height="26" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
    <text x="762" y="319" font-size="12" fill="#475569" text-anchor="middle">Your product launch</text>
  </g>

  <!-- Event 3: ABOVE axis -->
  <g>
    <line x1="876" y1="238" x2="876" y2="172" stroke="#cbd5e1" stroke-width="1.2" />
    <circle cx="876" cy="238" r="5.5" fill="#ffffff" stroke="#94a3b8" stroke-width="2" />
    <path d="M 873.5 235.5 L 878.5 240.5 M 878.5 235.5 L 873.5 240.5" stroke="#f43f5e" stroke-width="1.6" stroke-linecap="round" />
    <rect x="800" y="146" width="152" height="26" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
    <text x="876" y="163" font-size="12" fill="#475569" text-anchor="middle">This morning's incident</text>
  </g>

  <!-- ===================== TODAY MARKER (far right) ===================== -->
  <line x1="940" y1="238" x2="940" y2="300" stroke="#10b981" stroke-width="2" />
  <circle cx="940" cy="238" r="6" fill="#10b981" stroke="#ffffff" stroke-width="2" />
  <!-- flag/pin -->
  <line x1="940" y1="300" x2="940" y2="332" stroke="#10b981" stroke-width="2" />
  <path d="M 940 304 L 968 311 L 940 318 Z" fill="#10b981" />
  <rect x="906" y="332" width="68" height="26" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.2" />
  <text x="940" y="349" font-size="12.5" font-weight="700" fill="#059669" text-anchor="middle">Today</text>

  <!-- footer hint -->
  <text x="80" y="404" font-size="12.5" fill="#64748b">Everything to the right of the cutoff is invisible to the model — RAG exists to feed it that fresh context.</text>
</svg>
