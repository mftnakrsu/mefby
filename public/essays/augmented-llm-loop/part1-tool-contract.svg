<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="100%" style="height:auto" role="img" aria-label="Side-by-side comparison: an unchecked, no-schema tool call on the left versus a typed tool schema validated before the call on the right.">
  <title>Typed Tool Contract vs an Unchecked Tool Call</title>

  <!-- Page background -->
  <rect width="1200" height="560" fill="#ffffff"/>
  <rect width="1200" height="560" fill="#f8fafc"/>

  <!-- ═══════════════════════════════════════════════════════
       LEFT PANEL, "before / text action" (rose-tinted)
  ════════════════════════════════════════════════════════════ -->
  <rect x="30" y="30" width="530" height="450" rx="16"
    fill="#fff1f2" stroke="#fecdd3" stroke-width="2"/>

  <!-- Panel header -->
  <rect x="30" y="30" width="530" height="52" rx="16" fill="#fecdd3"/>
  <rect x="30" y="66" width="530" height="16" fill="#fecdd3"/>
  <text x="295" y="63" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="14" font-weight="700" fill="#9f1239" letter-spacing="0.04em">no schema, no contract</text>

  <!-- Code block: the raw string -->
  <rect x="58" y="102" width="474" height="70" rx="10"
    fill="#1e1e2e" stroke="#3d0014" stroke-width="1.5"/>

  <!-- Code line with typo highlighted -->
  <text x="80" y="128"
    font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace"
    font-size="14" fill="#cdd6f4">action: </text>
  <text x="155" y="128"
    font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace"
    font-size="14" fill="#f38ba8">"search_</text>
  <!-- typo: prodcts underlined in rose -->
  <text x="280" y="128"
    font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace"
    font-size="14" fill="#f38ba8" text-decoration="underline">prodcts</text>
  <text x="352" y="128"
    font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace"
    font-size="14" fill="#f38ba8">(\"shoes\")"</text>

  <!-- Second code line: arg -->
  <text x="80" y="155"
    font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace"
    font-size="14" fill="#6c7086">  # bare string arg, no type info</text>

  <!-- Annotation arrows pointing at typo and arg -->
  <defs>
    <marker id="arrowRose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f43f5e"/>
    </marker>
    <marker id="arrowEmerald2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrowGray2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Typo annotation -->
  <line x1="316" y1="115" x2="316" y2="93" stroke="#f43f5e" stroke-width="1.5" marker-end="url(#arrowRose)" transform="rotate(180 316 104)"/>
  <rect x="240" y="72" width="148" height="26" rx="7" fill="#f43f5e"/>
  <text x="314" y="89" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" font-weight="600" fill="#ffffff">typo: "prodcts"</text>

  <!-- Parse flow: string → parse → call site -->
  <rect x="58" y="196" width="474" height="54" rx="10"
    fill="#ffe4e6" stroke="#fecdd3" stroke-width="1.5"/>
  <text x="295" y="218" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="12" font-weight="500" fill="#9f1239">name + arg → TOOLS[name](arg)</text>
  <text x="295" y="238" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" fill="#64748b">no schema, nothing checks the call first</text>

  <!-- Crash box -->
  <rect x="58" y="272" width="474" height="76" rx="10"
    fill="#fff1f2" stroke="#f43f5e" stroke-width="2"/>
  <rect x="58" y="272" width="8" height="76" rx="4" fill="#f43f5e"/>
  <text x="295" y="302" text-anchor="middle"
    font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace"
    font-size="13" fill="#9f1239">KeyError: 'search_prodcts'</text>
  <text x="295" y="323" text-anchor="middle"
    font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace"
    font-size="13" fill="#9f1239">missing required arg: query</text>
  <text x="295" y="342" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" fill="#64748b">crash discovered only at call time</text>

  <!-- X icon -->
  <circle cx="100" cy="310" r="14" fill="#f43f5e"/>
  <text x="100" y="316" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="16" font-weight="700" fill="#ffffff">✕</text>

  <!-- Three failure badges -->
  <rect x="58" y="370" width="140" height="28" rx="8" fill="#ffe4e6" stroke="#f43f5e" stroke-width="1.2"/>
  <text x="128" y="388" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" font-weight="500" fill="#f43f5e">unknown tool</text>

  <rect x="210" y="370" width="150" height="28" rx="8" fill="#ffe4e6" stroke="#f43f5e" stroke-width="1.2"/>
  <text x="285" y="388" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" font-weight="500" fill="#f43f5e">malformed arg</text>

  <rect x="372" y="370" width="160" height="28" rx="8" fill="#ffe4e6" stroke="#f43f5e" stroke-width="1.2"/>
  <text x="452" y="388" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" font-weight="500" fill="#f43f5e">runtime surprise</text>

  <!-- BEFORE label -->
  <text x="295" y="435" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" font-weight="700" fill="#f43f5e" letter-spacing="0.1em">BEFORE</text>

  <!-- ═══════════════════════════════════════════════════════
       RIGHT PANEL, "typed tool contract" (emerald-tinted)
  ════════════════════════════════════════════════════════════ -->
  <rect x="640" y="30" width="530" height="450" rx="16"
    fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>

  <!-- Panel header -->
  <rect x="640" y="30" width="530" height="52" rx="16" fill="#bbf7d0"/>
  <rect x="640" y="66" width="530" height="16" fill="#bbf7d0"/>
  <text x="905" y="63" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="14" font-weight="700" fill="#064e3b" letter-spacing="0.04em">typed schema, validated before the call</text>

  <!-- Schema card -->
  <rect x="668" y="102" width="474" height="180" rx="10"
    fill="#ffffff" stroke="#10b981" stroke-width="2"/>

  <!-- Schema header -->
  <rect x="668" y="102" width="474" height="36" rx="10" fill="#10b981"/>
  <rect x="668" y="124" width="474" height="14" fill="#10b981"/>
  <text x="905" y="126" text-anchor="middle"
    font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace"
    font-size="13" font-weight="600" fill="#ffffff">tool schema (TOOL_SCHEMAS entry)</text>

  <!-- Schema fields -->
  <text x="692" y="162"
    font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace"
    font-size="13" fill="#64748b">name:</text>
  <text x="760" y="162"
    font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace"
    font-size="13" fill="#0f172a">search_products</text>

  <line x1="688" y1="172" x2="1122" y2="172" stroke="#e2e8f0" stroke-width="1"/>

  <text x="692" y="192"
    font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace"
    font-size="13" fill="#64748b">params:</text>
  <text x="760" y="192"
    font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace"
    font-size="13" fill="#0f172a">query: </text>
  <text x="832" y="192"
    font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace"
    font-size="13" fill="#6366f1">string</text>
  <text x="900" y="192"
    font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace"
    font-size="13" fill="#64748b">  (required)</text>

  <line x1="688" y1="202" x2="1122" y2="202" stroke="#e2e8f0" stroke-width="1"/>

  <text x="692" y="222"
    font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace"
    font-size="13" fill="#64748b">returns:</text>
  <text x="770" y="222"
    font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace"
    font-size="13" fill="#0f172a">text</text>

  <line x1="688" y1="232" x2="1122" y2="232" stroke="#e2e8f0" stroke-width="1"/>

  <text x="692" y="252"
    font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace"
    font-size="13" fill="#64748b">errors:</text>
  <text x="760" y="252"
    font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace"
    font-size="13" fill="#f59e0b">structured error channel</text>

  <!-- Validate gate -->
  <rect x="668" y="302" width="474" height="64" rx="10"
    fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="820" y="330" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="13" font-weight="600" fill="#064e3b">validate()</text>
  <text x="820" y="352" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" fill="#64748b">schema check before it fires</text>

  <!-- Check icon -->
  <circle cx="1080" cy="334" r="18" fill="#10b981"/>
  <text x="1080" y="340" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="18" font-weight="700" fill="#ffffff">✓</text>

  <!-- Two success badges + one catch badge -->
  <rect x="668" y="387" width="140" height="28" rx="8" fill="#dcfce7" stroke="#10b981" stroke-width="1.2"/>
  <text x="738" y="405" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" font-weight="500" fill="#10b981">tool resolved</text>

  <rect x="820" y="387" width="156" height="28" rx="8" fill="#dcfce7" stroke="#10b981" stroke-width="1.2"/>
  <text x="898" y="405" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" font-weight="500" fill="#10b981">args type-checked</text>

  <rect x="988" y="387" width="154" height="28" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="1065" y="405" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" font-weight="500" fill="#f59e0b">bad args → caught</text>

  <!-- AFTER label -->
  <text x="905" y="435" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" font-weight="700" fill="#10b981" letter-spacing="0.1em">AFTER</text>

  <!-- ═══════════════════════════════════════════════════════
       DIVIDER ARROW between panels
  ════════════════════════════════════════════════════════════ -->
  <circle cx="600" cy="255" r="24" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="600" y="261" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="20" fill="#64748b">→</text>

  <!-- ═══════════════════════════════════════════════════════
       BOTTOM CAPTION STRIP
  ════════════════════════════════════════════════════════════ -->
  <rect x="30" y="500" width="1140" height="44" rx="10"
    fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="600" y="525" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="12" fill="#64748b">
    Same call, two contracts: the schema rejects the unknown tool and the malformed arg before they ever run.
  </text>

  <!-- Top-right label -->
  <text x="1170" y="18" text-anchor="end"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" font-weight="700" fill="#64748b" letter-spacing="0.06em">AGENTS FROM FIRST PRINCIPLES</text>
  <text x="1170" y="30" text-anchor="end"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="10" fill="#94a3b8">Part 1, Figure 3</text>

</svg>
