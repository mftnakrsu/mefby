<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" width="100%" style="height:auto" role="img" aria-label="The augmented-LLM primitive and series map: an LLM core ringed by Tools, Memory, and Retrieval capabilities, with a reason–act–observe loop and a stop condition.">
  <title>Augmented-LLM Primitive: Series Map</title>

  <!-- Background -->
  <rect width="1200" height="620" fill="#ffffff"/>

  <!-- Subtle grid background -->
  <rect x="0" y="0" width="1200" height="620" fill="#f8fafc"/>

  <!-- ── LOOP ARROW (ellipse arc around center) ── -->
  <!-- Elliptical dashed track encircling the center cluster -->
  <ellipse cx="600" cy="310" rx="195" ry="140"
    fill="none" stroke="#c7d2fe" stroke-width="2.5" stroke-dasharray="10 5"/>

  <!-- Loop arrow head at top of ellipse, pointing clockwise -->
  <!-- Arrow tip near top-right of ellipse -->
  <path d="M 720 218 L 740 205 L 735 228 Z" fill="#6366f1"/>

  <!-- Loop label: reason → act → observe -->
  <text x="600" y="168" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="13" font-weight="500" fill="#6366f1" letter-spacing="0.03em">
    reason → act → observe
  </text>

  <!-- ── CENTER LLM NODE ── -->
  <rect x="500" y="255" width="200" height="110" rx="14"
    fill="#6366f1" stroke="#4f46e5" stroke-width="2"/>
  <text x="600" y="302" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="28" font-weight="700" fill="#ffffff" letter-spacing="0.02em">LLM</text>
  <text x="600" y="330" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="12" font-weight="400" fill="#c7d2fe">reason · plan · generate</text>

  <!-- ── RING CHIPS ── -->

  <!-- Tools chip (top, teal) -->
  <rect x="543" y="155" width="114" height="46" rx="12"
    fill="#f0fdfa" stroke="#14b8a6" stroke-width="2"/>
  <text x="600" y="174" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="13" font-weight="600" fill="#14b8a6">Tools</text>
  <text x="600" y="191" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" fill="#64748b">search · code · APIs</text>
  <!-- connector line -->
  <line x1="600" y1="201" x2="600" y2="255" stroke="#14b8a6" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Memory chip (left, amber) -->
  <rect x="340" y="287" width="120" height="46" rx="12"
    fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="306" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="13" font-weight="600" fill="#f59e0b">Memory</text>
  <text x="400" y="323" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" fill="#64748b">short + long term</text>
  <!-- connector line -->
  <line x1="460" y1="310" x2="500" y2="310" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Retrieval chip (right, violet) -->
  <rect x="740" y="287" width="120" height="46" rx="12"
    fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="800" y="306" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="13" font-weight="600" fill="#8b5cf6">Retrieval</text>
  <text x="800" y="323" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" fill="#64748b">vector · graph · SQL</text>
  <!-- connector line -->
  <line x1="700" y1="310" x2="740" y2="310" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- ── STOP BRANCH ── -->
  <!-- Arrow from bottom of loop going down-right to stop node -->
  <path d="M 720 403 Q 820 430 870 400" fill="none" stroke="#64748b" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arrowGray)"/>

  <!-- Stop node -->
  <rect x="870" y="363" width="220" height="72" rx="12"
    fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>
  <!-- Rose stripe on left side for "step budget exceeded" -->
  <rect x="870" y="363" width="8" height="72" rx="4" fill="#10b981"/>
  <text x="990" y="392" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="13" font-weight="600" fill="#0f172a">finish()  or  step budget</text>
  <text x="990" y="413" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" fill="#64748b">stop condition exits the loop</text>
  <!-- small rose "MAX" badge -->
  <rect x="936" y="424" width="108" height="20" rx="6" fill="#fff1f2" stroke="#f43f5e" stroke-width="1.2"/>
  <text x="990" y="438" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="10" font-weight="500" fill="#f43f5e">MAX STEPS → abort</text>

  <!-- ── SERIES MAP ANNOTATIONS (muted labels) ── -->
  <!-- Top-left panel -->
  <rect x="30" y="30" width="210" height="180" rx="14"
    fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="135" y="55" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" font-weight="700" fill="#64748b" letter-spacing="0.08em">SERIES MAP</text>
  <line x1="50" y1="63" x2="220" y2="63" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Series parts list -->
  <text x="50" y="84" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" font-weight="600" fill="#6366f1">Part 1: this primitive</text>
  <text x="50" y="103" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" fill="#64748b">+ planning</text>
  <text x="50" y="120" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" fill="#64748b">+ reflection</text>
  <text x="50" y="137" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" fill="#64748b">+ multi-agent</text>
  <text x="50" y="154" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" fill="#64748b">+ durability</text>
  <text x="50" y="171" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" fill="#64748b">+ evaluation</text>
  <text x="50" y="195" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="10" fill="#94a3b8" font-style="italic">Each part adds one ring</text>

  <!-- ── BOTTOM CAPTION STRIP ── -->
  <rect x="30" y="565" width="1140" height="40" rx="10"
    fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="600" y="590" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="12" fill="#64748b">
    The augmented-LLM primitive: an LLM call ringed by capabilities, wrapped in the smallest loop with a stop condition.
  </text>

  <!-- ── INPUT / OUTPUT ARROWS ── -->
  <!-- Input arrow from left -->
  <defs>
    <marker id="arrowIndigo" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowEmerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>

  <!-- User prompt → LLM -->
  <rect x="60" y="295" width="140" height="40" rx="10"
    fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="130" y="318" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="12" fill="#334155">user prompt</text>
  <line x1="200" y1="315" x2="340" y2="315" stroke="#6366f1" stroke-width="1.8" marker-end="url(#arrowIndigo)"/>

  <!-- LLM → Final answer (below loop) -->
  <rect x="550" y="460" width="100" height="38" rx="10"
    fill="#f0fdf4" stroke="#10b981" stroke-width="1.5"/>
  <text x="600" y="484" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="12" font-weight="500" fill="#10b981">answer</text>
  <line x1="600" y1="365" x2="600" y2="460" stroke="#10b981" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#arrowEmerald)"/>

  <!-- Top-right label: "Agents from First Principles" -->
  <text x="1170" y="44" text-anchor="end"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" font-weight="700" fill="#64748b" letter-spacing="0.06em">AGENTS FROM FIRST PRINCIPLES</text>
  <text x="1170" y="60" text-anchor="end"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" fill="#94a3b8">Part 1, Figure 1</text>

</svg>
