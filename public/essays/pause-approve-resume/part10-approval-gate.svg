<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="100%" style="height:auto" role="img" aria-label="The approval gate as a first-class decision for run run-aa10. A gated refund of 180 dollars to ORD-3300 reaches the gate because it exceeds the 100 dollar threshold. The gate has three outbound branches. APPROVE executes the 180 dollar refund, effectively once because the idempotency key is honored, leaving the ledger at 180 dollars in emerald. DENY moves no money and finishes with a refusal, leaving the ledger empty in rose. STEER is more than a yes or no: the approver injects a correction that lowers the refund to 90 dollars, now under the 100 dollar threshold, then the refund executes for 90 dollars and the ledger shows 90 dollars in amber and indigo. The figure emphasizes that steering is a correction the approver supplies, not a binary gate, and is the same mechanism as answering a clarifying question back to the user.">
  <title>The approval gate is a first-class action: APPROVE, DENY, or STEER a correction, not just a yes or no</title>

  <defs>
    <marker id="arrEmerald" markerWidth="11" markerHeight="9" refX="9" refY="4.5" orient="auto">
      <polygon points="0 0, 11 4.5, 0 9" fill="#10b981"/>
    </marker>
    <marker id="arrRose" markerWidth="11" markerHeight="9" refX="9" refY="4.5" orient="auto">
      <polygon points="0 0, 11 4.5, 0 9" fill="#f43f5e"/>
    </marker>
    <marker id="arrAmber" markerWidth="11" markerHeight="9" refX="9" refY="4.5" orient="auto">
      <polygon points="0 0, 11 4.5, 0 9" fill="#f59e0b"/>
    </marker>
    <marker id="arrIndigo" markerWidth="11" markerHeight="9" refX="9" refY="4.5" orient="auto">
      <polygon points="0 0, 11 4.5, 0 9" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="700" fill="#f8fafc"/>

  <!-- Top-right label -->
  <text x="1170" y="30" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="11" font-weight="700" fill="#64748b" letter-spacing="0.06em">AGENTS FROM FIRST PRINCIPLES</text>
  <text x="1170" y="46" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="10" fill="#94a3b8">Part 10, pause, approve, resume, steer</text>

  <!-- Title -->
  <text x="40" y="34" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="18" font-weight="700" fill="#0f172a">The approval gate is a first-class action, not a yes or no</text>
  <text x="40" y="54" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12" fill="#64748b">A $180 refund over the $100 threshold reaches the gate. The human picks one of three branches. STEER is the one that does more than approve or deny: it corrects what the agent does next.</text>

  <!-- ===================== LEFT: the gated action + gate ===================== -->
  <!-- gated action card -->
  <rect x="40" y="278" width="232" height="100" rx="12" fill="#ffffff" stroke="#fde68a" stroke-width="1.8"/>
  <rect x="40" y="278" width="6" height="100" rx="3" fill="#f59e0b"/>
  <text x="60" y="304" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#b45309">gated action (idx 1)</text>
  <text x="60" y="326" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#475569">process_refund</text>
  <text x="60" y="342" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#475569">ORD-3300 &#183; amount $180.00</text>
  <text x="60" y="362" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#92400e">key ORD-3300:refund (idempotent)</text>

  <!-- arrow action -> gate -->
  <line x1="272" y1="328" x2="312" y2="328" stroke="#f59e0b" stroke-width="2.4" marker-end="url(#arrAmber)"/>

  <!-- the gate diamond -->
  <polygon points="430,256 560,328 430,400 300,328" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="312" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" fill="#b45309">approval gate</text>
  <text x="430" y="332" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#92400e">$180.00 &gt; $100 threshold</text>
  <text x="430" y="350" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#92400e">a human must decide</text>

  <!-- human chip below gate -->
  <rect x="350" y="420" width="160" height="34" rx="9" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.4"/>
  <circle cx="372" cy="437" r="8" fill="#6366f1"/>
  <circle cx="372" cy="434" r="2.6" fill="#ffffff"/>
  <path d="M 367 442 a 5 4 0 0 1 10 0" fill="#ffffff"/>
  <text x="388" y="441" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="700" fill="#4f46e5">the decision is an ACTION</text>
  <line x1="430" y1="400" x2="430" y2="418" stroke="#6366f1" stroke-width="2" marker-end="url(#arrIndigo)"/>

  <!-- ===================== THREE BRANCHES ===================== -->
  <!-- branch fan-out from gate right vertex -->
  <!-- to APPROVE (top) -->
  <path d="M 560 328 C 640 328, 640 150, 720 150" fill="none" stroke="#10b981" stroke-width="2.4" marker-end="url(#arrEmerald)"/>
  <rect x="612" y="116" width="86" height="22" rx="6" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.2"/>
  <text x="655" y="131" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#047857">APPROVE</text>

  <!-- to DENY (middle) -->
  <path d="M 560 328 C 640 328, 640 328, 720 328" fill="none" stroke="#f43f5e" stroke-width="2.4" marker-end="url(#arrRose)"/>
  <rect x="616" y="296" width="70" height="22" rx="6" fill="#fff1f2" stroke="#fecdd3" stroke-width="1.2"/>
  <text x="651" y="311" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#9f1239">DENY</text>

  <!-- to STEER (bottom) -->
  <path d="M 560 328 C 640 328, 640 512, 720 512" fill="none" stroke="#f59e0b" stroke-width="2.4" marker-end="url(#arrAmber)"/>
  <rect x="624" y="540" width="70" height="22" rx="6" fill="#fffbeb" stroke="#fde68a" stroke-width="1.2"/>
  <text x="659" y="555" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#b45309">STEER</text>

  <!-- ===================== APPROVE branch card ===================== -->
  <rect x="720" y="108" width="440" height="92" rx="12" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.8"/>
  <rect x="720" y="108" width="6" height="92" rx="3" fill="#10b981"/>
  <text x="742" y="132" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#047857">Approve: execute the $180.00 refund</text>
  <text x="742" y="152" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10.5" fill="#065f46">step 1 process_refund runs: "refunded $180.00 to ORD-3300".</text>
  <text x="742" y="168" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10.5" fill="#065f46">The idempotency key makes this EFFECTIVELY-ONCE: a retried</text>
  <text x="742" y="181" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10.5" fill="#065f46">resume returns the stored result, never a second charge.</text>
  <!-- ledger chip -->
  <rect x="978" y="156" width="166" height="34" rx="8" fill="#ffffff" stroke="#a7f3d0" stroke-width="1.2"/>
  <text x="992" y="170" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="8.5" font-weight="700" fill="#047857">LEDGER</text>
  <text x="1134" y="178" text-anchor="end" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" fill="#047857">{ORD-3300: 180.0}</text>

  <!-- ===================== DENY branch card ===================== -->
  <rect x="720" y="284" width="440" height="88" rx="12" fill="#fff1f2" stroke="#fecdd3" stroke-width="1.8"/>
  <rect x="720" y="284" width="6" height="88" rx="3" fill="#f43f5e"/>
  <text x="742" y="308" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#9f1239">Deny: no money moves</text>
  <text x="742" y="328" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10.5" fill="#9f1239">step 1: "DENIED by approver, no money moved". The run</text>
  <text x="742" y="341" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10.5" fill="#9f1239">finishes with a refusal rather than a charge.</text>
  <!-- ledger chip -->
  <rect x="978" y="334" width="166" height="32" rx="8" fill="#ffffff" stroke="#fecdd3" stroke-width="1.2"/>
  <text x="992" y="348" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="8.5" font-weight="700" fill="#9f1239">LEDGER</text>
  <text x="1134" y="355" text-anchor="end" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" fill="#9f1239">(empty)</text>

  <!-- ===================== STEER branch card (the highlight) ===================== -->
  <rect x="720" y="436" width="440" height="148" rx="12" fill="#fffbeb" stroke="#fde68a" stroke-width="2"/>
  <rect x="720" y="436" width="6" height="148" rx="3" fill="#f59e0b"/>
  <text x="742" y="460" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#b45309">Steer: more than a yes or no, a correction</text>

  <!-- the correction injection (indigo) -->
  <rect x="742" y="470" width="396" height="38" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.4"/>
  <text x="756" y="486" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" font-weight="700" fill="#4f46e5">approver injects a correction:</text>
  <text x="756" y="500" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10" fill="#3730a3">amount $180.00 &#8594; $90.00 (now under the $100 threshold)</text>

  <text x="742" y="528" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10.5" fill="#92400e">step 1: "STEERED by approver, amount lowered to $90.00".</text>
  <text x="742" y="543" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10.5" fill="#92400e">Then the refund executes: "refunded $90.00 to ORD-3300".</text>
  <text x="742" y="558" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#92400e">Same mechanism as answering a clarifying question to the user.</text>
  <!-- ledger chip -->
  <rect x="978" y="546" width="166" height="30" rx="8" fill="#ffffff" stroke="#fde68a" stroke-width="1.2"/>
  <text x="992" y="559" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="8.5" font-weight="700" fill="#b45309">LEDGER</text>
  <text x="1134" y="566" text-anchor="end" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700" fill="#b45309">{ORD-3300: 90.0}</text>

  <!-- emphasis callout: steer is not binary -->
  <rect x="40" y="500" width="232" height="100" rx="11" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.4"/>
  <text x="60" y="524" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#4f46e5">Why STEER matters</text>
  <text x="60" y="544" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#3730a3">Approve and deny are a binary gate.</text>
  <text x="60" y="557" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#3730a3">Steer makes the human decision a</text>
  <text x="60" y="570" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#3730a3">first-class action: it can change what</text>
  <text x="60" y="583" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#3730a3">the agent does next, not only whether</text>
  <text x="60" y="596" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#3730a3">it proceeds.</text>

  <!-- bottom note -->
  <rect x="40" y="636" width="1120" height="44" rx="9" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="56" y="658" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#475569">Each branch is recorded as an approval_decision event, then resume replays the journal and acts on it. The gated refund keeps its idempotency</text>
  <text x="56" y="673" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#475569">key throughout, so approve and steer both move money exactly once. Frozen run run-aa10, threshold $100, the same refund desk as Part 9.</text>

</svg>
