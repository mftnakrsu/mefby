<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 560" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect x="0" y="0" width="1080" height="560" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="42" font-size="20" font-weight="700" fill="#0f172a">What routing buys you</text>
  <text x="40" y="64" font-size="13" fill="#64748b">Always running the heaviest pipeline wastes effort on easy queries. Routing spends only what each query needs, and keeps quality on the hard ones.</text>

  <!-- Legend (top-right) -->
  <g font-size="11.5">
    <rect x="690" y="30" width="14" height="14" rx="3" fill="#cbd5e1"/>
    <text x="712" y="42" fill="#64748b">Always multi-step (fixed)</text>
    <rect x="888" y="30" width="14" height="14" rx="3" fill="#6366f1"/>
    <text x="910" y="42" fill="#64748b">Adaptive (routed)</text>
  </g>

  <!-- ===================================================================== -->
  <!-- LEFT PANEL: relative effort per query (grouped bars)                  -->
  <!-- plot box x:80..620  y:120..430                                        -->
  <!-- ===================================================================== -->
  <text x="80" y="100" font-size="13" font-weight="700" fill="#0f172a">Effort spent per query</text>
  <text x="80" y="116" font-size="10.5" fill="#94a3b8">cost + latency, relative units &#183; lower is better</text>

  <!-- gridlines -->
  <line x1="80" y1="160" x2="620" y2="160" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="80" y1="220" x2="620" y2="220" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="80" y1="280" x2="620" y2="280" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="80" y1="340" x2="620" y2="340" stroke="#f1f5f9" stroke-width="1"/>
  <!-- baseline axis -->
  <line x1="80" y1="400" x2="620" y2="400" stroke="#94a3b8" stroke-width="1.6"/>
  <line x1="80" y1="120" x2="80" y2="400" stroke="#94a3b8" stroke-width="1.6"/>
  <text x="72" y="164" font-size="10" fill="#94a3b8" text-anchor="end">high</text>
  <text x="72" y="400" font-size="10" fill="#94a3b8" text-anchor="end">low</text>

  <!-- GROUP 1: easy / no-retrieval -->
  <!-- fixed bar (tall, wasteful) -->
  <rect x="120" y="172" width="46" height="228" rx="5" fill="#cbd5e1"/>
  <!-- adaptive bar (tiny) -->
  <rect x="172" y="352" width="46" height="48" rx="5" fill="#64748b"/>
  <text x="169" y="420" font-size="11" font-weight="700" fill="#0f172a" text-anchor="middle">Easy</text>
  <text x="169" y="436" font-size="10" fill="#64748b" text-anchor="middle">"Hi" &#183; greeting</text>
  <!-- savings bracket -->
  <path d="M148,172 H110 M110,172 V352 H160" fill="none" stroke="#10b981" stroke-width="1.4" stroke-dasharray="4 3"/>
  <rect x="90" y="248" width="58" height="30" rx="7" fill="#ecfdf5" stroke="#10b981"/>
  <text x="119" y="262" font-size="9.5" font-weight="700" fill="#059669" text-anchor="middle">saved</text>
  <text x="119" y="273" font-size="8.5" fill="#059669" text-anchor="middle">no retrieval</text>

  <!-- GROUP 2: medium / single-step -->
  <rect x="300" y="172" width="46" height="228" rx="5" fill="#cbd5e1"/>
  <rect x="352" y="288" width="46" height="112" rx="5" fill="#14b8a6"/>
  <text x="349" y="420" font-size="11" font-weight="700" fill="#0f172a" text-anchor="middle">Medium</text>
  <text x="349" y="436" font-size="10" fill="#64748b" text-anchor="middle">single lookup</text>
  <path d="M328,172 H290 M290,172 V288 H340" fill="none" stroke="#10b981" stroke-width="1.4" stroke-dasharray="4 3"/>
  <rect x="270" y="215" width="58" height="30" rx="7" fill="#ecfdf5" stroke="#10b981"/>
  <text x="299" y="229" font-size="9.5" font-weight="700" fill="#059669" text-anchor="middle">saved</text>
  <text x="299" y="240" font-size="8.5" fill="#059669" text-anchor="middle">1 step, not n</text>

  <!-- GROUP 3: hard / multi-step (no waste, adaptive == fixed) -->
  <rect x="480" y="172" width="46" height="228" rx="5" fill="#cbd5e1"/>
  <rect x="532" y="172" width="46" height="228" rx="5" fill="#8b5cf6"/>
  <text x="529" y="420" font-size="11" font-weight="700" fill="#0f172a" text-anchor="middle">Hard</text>
  <text x="529" y="436" font-size="10" fill="#64748b" text-anchor="middle">comparison</text>
  <rect x="470" y="138" width="118" height="26" rx="7" fill="#f5f3ff" stroke="#8b5cf6"/>
  <text x="529" y="155" font-size="9.5" font-weight="700" fill="#6d28d9" text-anchor="middle">full effort, kept</text>

  <text x="350" y="466" font-size="11.5" font-weight="700" fill="#64748b" text-anchor="middle">query complexity  &#8594;</text>

  <!-- ===================================================================== -->
  <!-- RIGHT PANEL: answer quality holds                                     -->
  <!-- plot box x:700..1020  y:120..400                                      -->
  <!-- ===================================================================== -->
  <text x="700" y="100" font-size="13" font-weight="700" fill="#0f172a">Answer quality</text>
  <text x="700" y="116" font-size="10.5" fill="#94a3b8">higher is better</text>

  <line x1="700" y1="160" x2="1020" y2="160" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="700" y1="220" x2="1020" y2="220" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="700" y1="280" x2="1020" y2="280" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="700" y1="340" x2="1020" y2="340" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="700" y1="120" x2="700" y2="400" stroke="#94a3b8" stroke-width="1.6"/>
  <line x1="700" y1="400" x2="1020" y2="400" stroke="#94a3b8" stroke-width="1.6"/>
  <text x="692" y="164" font-size="10" fill="#94a3b8" text-anchor="end">high</text>
  <text x="692" y="400" font-size="10" fill="#94a3b8" text-anchor="end">low</text>

  <!-- fixed quality line (already high) -->
  <path d="M740,176 C820,176 900,178 980,180" fill="none" stroke="#cbd5e1" stroke-width="2.8" stroke-linecap="round"/>
  <!-- adaptive quality line: matches fixed (stays high) -->
  <path d="M740,182 C820,182 900,184 980,186" fill="none" stroke="#6366f1" stroke-width="2.8" stroke-linecap="round" stroke-dasharray="2 5"/>
  <text x="980" y="170" font-size="10.5" font-weight="700" fill="#475569" text-anchor="end">both stay high</text>
  <text x="980" y="200" font-size="10" fill="#4f46e5" text-anchor="end">adaptive tracks the fixed pipeline</text>

  <!-- failure-surface caveat -->
  <circle cx="760" cy="320" r="4" fill="#f43f5e"/>
  <rect x="716" y="332" width="288" height="50" rx="8" fill="#fff1f2" stroke="#f43f5e" stroke-width="1.3"/>
  <text x="730" y="350" font-size="10.5" font-weight="700" fill="#be123c">The classifier is itself a failure surface.</text>
  <text x="730" y="366" font-size="9.5" fill="#9f1239">A misroute (hard query sent to the single-step path)</text>
  <text x="730" y="378" font-size="9.5" fill="#9f1239">under-retrieves and quality drops.</text>

  <!-- ===================================================================== -->
  <!-- indicative-numbers banner                                             -->
  <!-- ===================================================================== -->
  <rect x="40" y="488" width="1000" height="52" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="56" y="500" width="92" height="28" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.3"/>
  <text x="102" y="518" font-size="10.5" font-weight="700" fill="#b45309" text-anchor="middle">indicative</text>
  <text x="168" y="510" font-size="11.5" fill="#334155">Vendor reports cite roughly 35% lower latency and 28% lower cost from routing. Treat these as indicative, not measured guarantees:</text>
  <text x="168" y="528" font-size="11.5" font-weight="700" fill="#334155">the real win is structural. Stop paying for machinery an easy query never needed.</text>
</svg>
