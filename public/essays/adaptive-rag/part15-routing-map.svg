<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="p15rm-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <marker id="p15rm-arr-slate" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <marker id="p15rm-arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#14b8a6"/>
    </marker>
    <marker id="p15rm-arr-indigo" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4f46e5"/>
    </marker>
    <marker id="p15rm-arr-violet" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b5cf6"/>
    </marker>
    <marker id="p15rm-arr-emerald" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1080" height="600" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="42" font-size="20" font-weight="700" fill="#0f172a">One classifier, three routes</text>
  <text x="40" y="64" font-size="13" fill="#64748b">A small complexity classifier sends each query down the cheapest path that can still answer it.</text>

  <!-- ===================================================================== -->
  <!-- LEFT: query -> classifier                                             -->
  <!-- ===================================================================== -->
  <!-- query box -->
  <rect x="40" y="262" width="150" height="64" rx="14" fill="#eef2ff" stroke="#6366f1"/>
  <text x="115" y="290" font-size="13" font-weight="700" fill="#4f46e5" text-anchor="middle">Query</text>
  <text x="115" y="308" font-size="10" fill="#6366f1" text-anchor="middle">any user request</text>

  <!-- arrow into classifier -->
  <line x1="190" y1="294" x2="228" y2="294" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#p15rm-arr)"/>

  <!-- classifier diamond -->
  <polygon points="310,234 388,294 310,354 232,294" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="310" y="288" font-size="12" font-weight="700" fill="#b45309" text-anchor="middle">Classify</text>
  <text x="310" y="304" font-size="10" fill="#b45309" text-anchor="middle">complexity?</text>

  <!-- signal chips under the classifier -->
  <text x="310" y="392" font-size="10" font-weight="700" letter-spacing="0.04em" fill="#64748b" text-anchor="middle">SIGNALS IT READS</text>
  <g font-size="9.5" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">
    <rect x="206" y="404" width="84" height="24" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="248" y="420" fill="#475569" text-anchor="middle">length</text>
    <rect x="296" y="404" width="116" height="24" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="354" y="420" fill="#475569" text-anchor="middle">comparatives</text>
    <rect x="230" y="434" width="160" height="24" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="310" y="450" fill="#475569" text-anchor="middle">conjunctions, # of "?"</text>
  </g>

  <!-- the three branch arrows out of the classifier -->
  <!-- to NONE (top) -->
  <path d="M340,264 C420,232 470,170 540,150" fill="none" stroke="#64748b" stroke-width="1.8" marker-end="url(#p15rm-arr-slate)"/>
  <rect x="392" y="178" width="74" height="22" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="429" y="193" font-size="10" font-weight="700" fill="#475569" text-anchor="middle">none</text>
  <!-- to SINGLE (middle) -->
  <line x1="388" y1="294" x2="538" y2="294" stroke="#14b8a6" stroke-width="1.8" marker-end="url(#p15rm-arr-teal)"/>
  <rect x="430" y="270" width="68" height="22" rx="8" fill="#f0fdfa" stroke="#5eead4"/>
  <text x="464" y="285" font-size="10" font-weight="700" fill="#0f766e" text-anchor="middle">single</text>
  <!-- to MULTI (bottom) -->
  <path d="M340,324 C420,356 470,420 540,440" fill="none" stroke="#8b5cf6" stroke-width="1.8" marker-end="url(#p15rm-arr-violet)"/>
  <rect x="392" y="392" width="70" height="22" rx="8" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="427" y="407" font-size="10" font-weight="700" fill="#6d28d9" text-anchor="middle">multi</text>

  <!-- ===================================================================== -->
  <!-- ROUTE 1: NO RETRIEVAL (top)                                           -->
  <!-- ===================================================================== -->
  <g transform="translate(548,118)">
    <rect width="492" height="120" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect width="6" height="120" rx="3" fill="#64748b"/>
    <text x="24" y="30" font-size="11.5" font-weight="700" letter-spacing="0.05em" fill="#64748b">ROUTE A &#183; NO RETRIEVAL</text>
    <text x="24" y="48" font-size="10.5" fill="#64748b">The model already knows, or it is small talk. Skip the index entirely.</text>

    <rect x="24" y="62" width="132" height="42" rx="8" fill="#eef2ff" stroke="#6366f1"/>
    <text x="90" y="88" font-size="11" font-weight="700" fill="#4f46e5" text-anchor="middle">Generate</text>

    <text x="186" y="80" font-size="11" fill="#475569">"Hi" &#183; "Thanks" &#183; a fact the model knows.</text>
    <text x="186" y="98" font-size="11" font-weight="700" fill="#475569">Cheapest path: one model call, zero retrieval.</text>
  </g>

  <!-- ===================================================================== -->
  <!-- ROUTE 2: SINGLE-STEP = Part 6 (middle)                                -->
  <!-- ===================================================================== -->
  <g transform="translate(548,254)">
    <rect width="492" height="78" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect width="6" height="78" rx="3" fill="#14b8a6"/>
    <text x="24" y="28" font-size="11.5" font-weight="700" letter-spacing="0.05em" fill="#0f766e">ROUTE B &#183; SINGLE-STEP (PART 6)</text>

    <rect x="24" y="38" width="118" height="30" rx="8" fill="#ecfeff" stroke="#06b6d4"/>
    <text x="83" y="57" font-size="10.5" font-weight="700" fill="#0e7490" text-anchor="middle">Retrieve</text>
    <line x1="146" y1="53" x2="174" y2="53" stroke="#14b8a6" stroke-width="1.8" marker-end="url(#p15rm-arr-teal)"/>
    <rect x="178" y="38" width="118" height="30" rx="8" fill="#eef2ff" stroke="#6366f1"/>
    <text x="237" y="57" font-size="10.5" font-weight="700" fill="#4f46e5" text-anchor="middle">Generate</text>

    <text x="320" y="50" font-size="11" fill="#475569">One lookup answers it.</text>
    <text x="320" y="66" font-size="11" font-weight="700" fill="#475569">"What's our refund window?"</text>
  </g>

  <!-- ===================================================================== -->
  <!-- ROUTE 3: MULTI-STEP = Part 10 (bottom)                                -->
  <!-- ===================================================================== -->
  <g transform="translate(548,348)">
    <rect width="492" height="134" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect width="6" height="134" rx="3" fill="#8b5cf6"/>
    <text x="24" y="28" font-size="11.5" font-weight="700" letter-spacing="0.05em" fill="#6d28d9">ROUTE C &#183; MULTI-STEP (PART 10)</text>

    <rect x="24" y="40" width="100" height="30" rx="8" fill="#f5f3ff" stroke="#8b5cf6"/>
    <text x="74" y="59" font-size="10.5" font-weight="700" fill="#6d28d9" text-anchor="middle">Decompose</text>
    <line x1="124" y1="55" x2="150" y2="55" stroke="#8b5cf6" stroke-width="1.8" marker-end="url(#p15rm-arr-violet)"/>

    <!-- sub-queries -->
    <rect x="154" y="40" width="118" height="30" rx="8" fill="#ecfeff" stroke="#06b6d4"/>
    <text x="213" y="59" font-size="10" font-weight="700" fill="#0e7490" text-anchor="middle">Retrieve &#215; n</text>
    <line x1="274" y1="55" x2="300" y2="55" stroke="#8b5cf6" stroke-width="1.8" marker-end="url(#p15rm-arr-violet)"/>
    <rect x="304" y="40" width="120" height="30" rx="8" fill="#ecfdf5" stroke="#10b981"/>
    <text x="364" y="59" font-size="10.5" font-weight="700" fill="#047857" text-anchor="middle">Synthesize</text>

    <!-- loop back hint for the decompose step -->
    <path d="M213,72 V92 H74 V72" fill="none" stroke="#8b5cf6" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#p15rm-arr-violet)"/>
    <text x="143" y="107" font-size="9.5" fill="#7c3aed" text-anchor="middle">one pass per sub-question</text>

    <text x="24" y="124" font-size="11" fill="#475569">"Compare the refund window and the warranty period."</text>
  </g>

  <!-- ===================================================================== -->
  <!-- bottom note                                                           -->
  <!-- ===================================================================== -->
  <rect x="40" y="512" width="1000" height="56" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <g transform="translate(72,540)">
    <circle cx="0" cy="0" r="13" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.6"/>
    <path d="M-6,0 L-2,5 L7,-6" fill="none" stroke="#b45309" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="100" y="535" font-size="12.5" font-weight="700" fill="#b45309">Adaptive RAG is the conductor, not a new pipeline.</text>
  <text x="100" y="554" font-size="11.5" fill="#334155">It routes among the pipelines built in Parts 6 to 10 by query complexity. Contrast Part 8 (rewrite the query) and Part 10 (route by source).</text>
</svg>
