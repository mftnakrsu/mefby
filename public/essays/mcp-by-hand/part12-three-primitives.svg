<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="100%" style="height:auto" role="img" aria-label="MCP's three server primitives. A HOST at the top connects to a SERVER over JSON-RPC after the initialize handshake, which negotiates protocolVersion 2025-06-18 and advertises capabilities tools, resources, and prompts. The server exposes three primitives shown side by side. First, TOOLS: callable functions described by a JSON inputSchema, discovered with tools/list and invoked with tools/call. Example tool search_policy with inputSchema requiring query, and tools/call returning the text Refunds are accepted within 30 days; after the window a 10% restocking fee applies. Second, RESOURCES: read-only data the host can fetch, listed with resources/list and read with resources/read. Example resource file:///policies/refund.md, and resources/read returning the text Refunds within 30 days; 10% restocking fee after. Third, PROMPTS: named prompt templates, listed with prompts/list and fetched with prompts/get. Example prompt refund_decision, and prompts/get returning the template Decide the refund for {order}, citing the policy. The point is that one server can advertise tools, resources, and prompts, and a host discovers and consumes all three over the same JSON-RPC protocol.">
  <title>MCP's three server primitives: tools, resources, prompts, all over JSON-RPC after the initialize handshake</title>

  <defs>
    <marker id="arrIndigo" markerWidth="12" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0 0, 12 5, 0 10" fill="#6366f1"/>
    </marker>
    <marker id="arrTeal" markerWidth="12" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0 0, 12 5, 0 10" fill="#14b8a6"/>
    </marker>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="720" fill="#f8fafc"/>

  <!-- Top-right label -->
  <text x="1170" y="30" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="11" font-weight="700" fill="#64748b" letter-spacing="0.06em">AGENTS FROM FIRST PRINCIPLES</text>
  <text x="1170" y="46" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="10" fill="#94a3b8">Part 12, tools as a protocol (MCP)</text>

  <!-- Title -->
  <text x="40" y="34" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="18" font-weight="700" fill="#0f172a">MCP's three server primitives: tools, resources, prompts</text>
  <text x="40" y="54" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12" fill="#64748b">One SERVER advertises all three; one HOST discovers and consumes them over the same JSON-RPC protocol, after the initialize handshake.</text>

  <!-- ====================== HOST (top) ====================== -->
  <rect x="380" y="78" width="440" height="58" rx="11" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.8"/>
  <rect x="380" y="78" width="6" height="58" rx="3" fill="#4f46e5"/>
  <text x="600" y="104" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700" fill="#4f46e5">HOST</text>
  <text x="600" y="123" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10.5" fill="#3730a3">discovers + calls capabilities; the agent's action space is assembled at run time</text>

  <!-- handshake arrow HOST <-> SERVER -->
  <line x1="600" y1="138" x2="600" y2="186" stroke="#6366f1" stroke-width="2.4" marker-end="url(#arrIndigo)"/>
  <line x1="640" y1="186" x2="640" y2="138" stroke="#14b8a6" stroke-width="2.4" marker-end="url(#arrTeal)"/>
  <rect x="660" y="146" width="262" height="34" rx="8" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.3"/>
  <text x="674" y="160" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" fill="#4f46e5">initialize handshake (id 1)</text>
  <text x="674" y="173" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="8.5" fill="#3730a3">protocolVersion "2025-06-18" + capability negotiation</text>

  <!-- JSON-RPC wire label -->
  <rect x="278" y="150" width="120" height="26" rx="6" fill="#0f172a"/>
  <text x="338" y="167" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9.5" font-weight="700" fill="#ffffff">JSON-RPC 2.0</text>

  <!-- ====================== SERVER (band) ====================== -->
  <rect x="40" y="196" width="1120" height="492" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.8"/>
  <rect x="40" y="196" width="1120" height="40" rx="14" fill="#f0fdfa"/>
  <rect x="40" y="216" width="1120" height="20" fill="#f0fdfa"/>
  <text x="64" y="222" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700" fill="#0d9488">SERVER  &#183;  support-server</text>
  <text x="1136" y="222" text-anchor="end" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10" fill="#0f766e">capabilities: tools, resources, prompts</text>
  <line x1="40" y1="236" x2="1160" y2="236" stroke="#cbd5e1" stroke-width="1.4"/>

  <!-- COLUMN 1: TOOLS -->
  <rect x="64" y="258" width="344" height="408" rx="12" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.6"/>
  <rect x="64" y="258" width="344" height="6" rx="3" fill="#6366f1"/>
  <text x="84" y="292" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#4f46e5">TOOLS</text>
  <text x="84" y="312" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10.5" fill="#3730a3">callable functions, described by a JSON inputSchema</text>

  <!-- methods chips -->
  <rect x="84" y="326" width="138" height="24" rx="6" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.2"/>
  <text x="153" y="342" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#4f46e5">tools/list</text>
  <rect x="230" y="326" width="138" height="24" rx="6" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.2"/>
  <text x="299" y="342" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#4f46e5">tools/call</text>

  <!-- tool example -->
  <rect x="84" y="362" width="304" height="118" rx="9" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.3"/>
  <text x="100" y="382" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10.5" font-weight="700" fill="#4f46e5">search_policy</text>
  <text x="100" y="398" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="8.5" fill="#64748b">inputSchema:</text>
  <text x="100" y="412" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="8.5" fill="#b45309">{ "query": {"type":"string"} }</text>
  <text x="100" y="426" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="8.5" fill="#b45309">required: ["query"]</text>
  <line x1="100" y1="438" x2="372" y2="438" stroke="#e2e8f0" stroke-width="1"/>
  <text x="100" y="454" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="8.5" font-weight="700" fill="#0d9488">tools/call (id 3) &#8594;</text>
  <text x="100" y="468" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="8.5" fill="#475569">"Refunds accepted within 30 days; after</text>

  <!-- tool takeaway -->
  <rect x="84" y="494" width="304" height="150" rx="9" fill="#fbfbff" stroke="#c7d2fe" stroke-width="1.2"/>
  <text x="100" y="514" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" font-weight="700" fill="#4f46e5">What the host does with it</text>
  <text x="100" y="532" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#475569">The discovered inputSchema feeds Part 1's</text>
  <text x="100" y="546" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#475569">validator unchanged. The schema is just</text>
  <text x="100" y="560" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#475569">data, now arriving over the wire instead</text>
  <text x="100" y="574" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#475569">of a hardcoded dict.</text>
  <text x="100" y="600" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="8.5" fill="#047857">{order_id, amount:180.0} &#8594; OK</text>
  <text x="100" y="616" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="8.5" fill="#9f1239">{order_id} &#8594; REJECTED: missing amount</text>
  <text x="100" y="632" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="8.5" fill="#9f1239">amount:"lots" &#8594; REJECTED: not number</text>

  <!-- COLUMN 2: RESOURCES -->
  <rect x="428" y="258" width="344" height="408" rx="12" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.6"/>
  <rect x="428" y="258" width="344" height="6" rx="3" fill="#14b8a6"/>
  <text x="448" y="292" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#0d9488">RESOURCES</text>
  <text x="448" y="312" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10.5" fill="#0f766e">read-only data the host can fetch by URI</text>

  <rect x="448" y="326" width="138" height="24" rx="6" fill="#ffffff" stroke="#99f6e4" stroke-width="1.2"/>
  <text x="517" y="342" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#0d9488">resources/list</text>
  <rect x="594" y="326" width="138" height="24" rx="6" fill="#ffffff" stroke="#99f6e4" stroke-width="1.2"/>
  <text x="663" y="342" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#0d9488">resources/read</text>

  <rect x="448" y="362" width="304" height="118" rx="9" fill="#ffffff" stroke="#99f6e4" stroke-width="1.3"/>
  <text x="464" y="382" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9.5" font-weight="700" fill="#0d9488">file:///policies/refund.md</text>
  <text x="464" y="398" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="8.5" fill="#64748b">name: "refund-policy"</text>
  <line x1="464" y1="410" x2="736" y2="410" stroke="#e2e8f0" stroke-width="1"/>
  <text x="464" y="428" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="8.5" font-weight="700" fill="#0d9488">resources/read (id 4) &#8594;</text>
  <text x="464" y="444" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="8.5" fill="#475569">"Refunds within 30 days; 10%</text>
  <text x="464" y="458" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="8.5" fill="#475569">restocking fee after."</text>

  <rect x="448" y="494" width="304" height="150" rx="9" fill="#f7fffd" stroke="#99f6e4" stroke-width="1.2"/>
  <text x="464" y="514" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" font-weight="700" fill="#0d9488">Tools act; resources just inform</text>
  <text x="464" y="532" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#475569">A resource is read-only context: a policy</text>
  <text x="464" y="546" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#475569">file, a doc, a record. Reading one has no</text>
  <text x="464" y="560" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#475569">side effect, unlike calling a tool such as</text>
  <text x="464" y="574" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#475569">process_refund, which moves money.</text>
  <text x="464" y="600" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#475569">The host can pull a resource into the</text>
  <text x="464" y="614" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#475569">model's context without authorizing any</text>
  <text x="464" y="628" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#475569">action. Same protocol, different intent.</text>

  <!-- COLUMN 3: PROMPTS -->
  <rect x="792" y="258" width="344" height="408" rx="12" fill="#fffbeb" stroke="#fde68a" stroke-width="1.6"/>
  <rect x="792" y="258" width="344" height="6" rx="3" fill="#f59e0b"/>
  <text x="812" y="292" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#b45309">PROMPTS</text>
  <text x="812" y="312" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10.5" fill="#92400e">named, reusable prompt templates</text>

  <rect x="812" y="326" width="138" height="24" rx="6" fill="#ffffff" stroke="#fde68a" stroke-width="1.2"/>
  <text x="881" y="342" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#b45309">prompts/list</text>
  <rect x="958" y="326" width="138" height="24" rx="6" fill="#ffffff" stroke="#fde68a" stroke-width="1.2"/>
  <text x="1027" y="342" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#b45309">prompts/get</text>

  <rect x="812" y="362" width="304" height="118" rx="9" fill="#ffffff" stroke="#fde68a" stroke-width="1.3"/>
  <text x="828" y="382" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10.5" font-weight="700" fill="#b45309">refund_decision</text>
  <text x="828" y="398" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="8.5" fill="#64748b">description: "draft a refund decision"</text>
  <line x1="828" y1="410" x2="1100" y2="410" stroke="#e2e8f0" stroke-width="1"/>
  <text x="828" y="428" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="8.5" font-weight="700" fill="#b45309">prompts/get (id 5) &#8594;</text>
  <text x="828" y="444" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="8.5" fill="#475569">"Decide the refund for {order},</text>
  <text x="828" y="458" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="8.5" fill="#475569">citing the policy."</text>

  <rect x="812" y="494" width="304" height="150" rx="9" fill="#fffdf5" stroke="#fde68a" stroke-width="1.2"/>
  <text x="828" y="514" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" font-weight="700" fill="#b45309">A server can ship its own prompts</text>
  <text x="828" y="532" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#475569">Prompts are parameterized templates the</text>
  <text x="828" y="546" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#475569">server author maintains. The host fetches</text>
  <text x="828" y="560" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#475569">one by name and fills in {order}, so the</text>
  <text x="828" y="574" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#475569">phrasing lives with the server, not baked</text>
  <text x="828" y="588" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#475569">into every client.</text>
  <text x="828" y="614" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#475569">Discovered like the others: list the names,</text>
  <text x="828" y="628" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#475569">get the template when reached for.</text>

  <!-- ====================== bottom takeaway ====================== -->
  <rect x="40" y="698" width="838" height="0" rx="8" fill="none"/>
  <!-- legend bottom-right -->
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#64748b">
    <rect x="40" y="698" width="11" height="11" rx="2" fill="#6366f1"/>
    <text x="56" y="707">tools (callable)</text>
    <rect x="210" y="698" width="11" height="11" rx="2" fill="#14b8a6"/>
    <text x="226" y="707">resources (read-only)</text>
    <rect x="420" y="698" width="11" height="11" rx="2" fill="#f59e0b"/>
    <text x="436" y="707">prompts (templates)</text>
  </g>
  <text x="1160" y="707" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10.5" fill="#4f46e5">One protocol, three primitives: the host discovers and consumes all three over JSON-RPC.</text>

</svg>
