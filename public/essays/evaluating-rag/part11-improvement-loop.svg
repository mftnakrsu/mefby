<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="il-slate" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1,1 L9,5 L1,9 Z" fill="#94a3b8" />
    </marker>
    <marker id="il-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M1,1 L9,5 L1,9 Z" fill="#f59e0b" />
    </marker>
    <marker id="il-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1,1 L9,5 L1,9 Z" fill="#14b8a6" />
    </marker>
    <marker id="il-indigo" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1,1 L9,5 L1,9 Z" fill="#6366f1" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="480" fill="#ffffff" />

  <!-- Title -->
  <text x="40" y="38" font-size="20" font-weight="700" fill="#0f172a">The improvement loop: engineering, not vibes</text>
  <text x="40" y="61" font-size="13" fill="#64748b">Change one thing, measure the delta on a stable set, and keep it only if the number actually moved.</text>

  <!-- ===================== KEEP outcome (above the decision) ===================== -->
  <rect x="760" y="58" width="180" height="30" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" />
  <text x="850" y="78" font-size="12" font-weight="700" fill="#059669" text-anchor="middle">KEEP: new baseline</text>
  <line x1="852" y1="106" x2="852" y2="90" stroke="#10b981" stroke-width="1.8" marker-end="url(#il-slate)" />
  <text x="864" y="101" font-size="10.5" font-weight="700" fill="#059669">yes</text>

  <!-- ===================== PROCESS CARDS ===================== -->
  <!-- C1 -->
  <rect x="40" y="118" width="150" height="64" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" />
  <text x="115" y="146" font-size="12.5" font-weight="700" fill="#0f172a" text-anchor="middle">Build the eval set</text>
  <text x="115" y="164" font-size="10" fill="#64748b" text-anchor="middle">questions, golden chunks,</text>
  <text x="115" y="176" font-size="10" fill="#64748b" text-anchor="middle">reference answers</text>

  <!-- C2 -->
  <rect x="224" y="118" width="150" height="64" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" />
  <text x="299" y="146" font-size="12.5" font-weight="700" fill="#0f172a" text-anchor="middle">Measure a baseline</text>
  <text x="299" y="170" font-size="10" fill="#64748b" text-anchor="middle">score what you have now</text>

  <!-- C3 (the loop target, amber) -->
  <rect x="408" y="118" width="150" height="64" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.8" />
  <text x="483" y="146" font-size="12.5" font-weight="700" fill="#b45309" text-anchor="middle">Change ONE thing</text>
  <text x="483" y="170" font-size="10" fill="#92742a" text-anchor="middle">chunking, top-k, prompt, model</text>

  <!-- C4 -->
  <rect x="592" y="118" width="150" height="64" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" />
  <text x="667" y="146" font-size="12.5" font-weight="700" fill="#0f172a" text-anchor="middle">Re-measure</text>
  <text x="667" y="170" font-size="10" fill="#64748b" text-anchor="middle">same set, same metrics</text>

  <!-- Decision diamond -->
  <path d="M852,106 L922,150 L852,194 L782,150 Z" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.8" />
  <text x="852" y="146" font-size="11.5" font-weight="700" fill="#b45309" text-anchor="middle">Beat the</text>
  <text x="852" y="161" font-size="11.5" font-weight="700" fill="#b45309" text-anchor="middle">baseline?</text>

  <!-- process arrows -->
  <line x1="190" y1="150" x2="224" y2="150" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#il-slate)" />
  <line x1="374" y1="150" x2="408" y2="150" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#il-slate)" />
  <line x1="558" y1="150" x2="592" y2="150" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#il-slate)" />
  <line x1="742" y1="150" x2="782" y2="150" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#il-slate)" />

  <!-- ===================== RETURN ARC (iterate) ===================== -->
  <text x="836" y="214" font-size="10.5" font-weight="700" fill="#b45309">no</text>
  <path d="M852,194 L852,235 L483,235 L483,182" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#il-amber)" />
  <rect x="556" y="226" width="222" height="18" fill="#ffffff" />
  <text x="667" y="239" font-size="11.5" font-weight="700" fill="#92742a" text-anchor="middle">then change the next one thing</text>

  <!-- ===================== OFFLINE / ONLINE FOOTER ===================== -->
  <text x="40" y="290" font-size="11" font-weight="700" letter-spacing="0.06em" fill="#64748b">WHERE THE NUMBERS COME FROM</text>

  <!-- connector ticks (drawn before pills so pills sit on top of their starts) -->
  <line x1="299" y1="304" x2="299" y2="186" stroke="#14b8a6" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#il-teal)" />
  <line x1="900" y1="304" x2="900" y2="200" stroke="#6366f1" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#il-indigo)" />

  <!-- OFFLINE pill -->
  <rect x="40" y="304" width="440" height="150" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" />
  <text x="64" y="331" font-size="12.5" font-weight="700" fill="#0f766e">OFFLINE  &#183;  before you ship</text>
  <circle cx="70" cy="356" r="3" fill="#14b8a6" /><text x="82" y="360" font-size="12" fill="#334155">Fixed golden + synthetic test set</text>
  <circle cx="70" cy="382" r="3" fill="#14b8a6" /><text x="82" y="386" font-size="12" fill="#334155">Reproducible, runs in CI on every change</text>
  <circle cx="70" cy="408" r="3" fill="#14b8a6" /><text x="82" y="412" font-size="12" fill="#334155">Like-for-like A/B of design choices</text>
  <text x="64" y="438" font-size="10.5" fill="#94a3b8">feeds the baseline and re-measure steps</text>

  <!-- ONLINE pill -->
  <rect x="520" y="304" width="440" height="150" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" />
  <text x="544" y="331" font-size="12.5" font-weight="700" fill="#4f46e5">ONLINE  &#183;  in production</text>
  <circle cx="550" cy="356" r="3" fill="#6366f1" /><text x="562" y="360" font-size="12" fill="#334155">Live traffic, reference-free metrics</text>
  <circle cx="550" cy="382" r="3" fill="#6366f1" /><text x="562" y="386" font-size="12" fill="#334155">Thumbs up/down + implicit signals (rephrase, copy)</text>
  <circle cx="550" cy="408" r="3" fill="#6366f1" /><text x="562" y="412" font-size="12" fill="#334155">A/B tests; fold new failures back into the set</text>
  <text x="544" y="438" font-size="10.5" fill="#94a3b8">validates a kept change on real users</text>
</svg>
