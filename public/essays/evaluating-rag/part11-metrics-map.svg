<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect x="0" y="0" width="1000" height="600" fill="#ffffff" />

  <!-- Title -->
  <text x="40" y="42" font-size="20" font-weight="700" fill="#0f172a">What each metric compares</text>
  <text x="40" y="65" font-size="13" fill="#64748b">Every RAGAS-style metric is a comparison between two of three things: the question, the retrieved context, and the answer.</text>

  <!-- Legend (top-right) -->
  <g font-size="11.5" fill="#64748b">
    <line x1="700" y1="38" x2="734" y2="38" stroke="#14b8a6" stroke-width="3" stroke-linecap="round" /><text x="742" y="42">retrieval edge</text>
    <line x1="848" y1="38" x2="882" y2="38" stroke="#6366f1" stroke-width="3" stroke-linecap="round" /><text x="890" y="42">generation edge</text>
  </g>

  <!-- ===================== EDGES (drawn first, behind the cards) ===================== -->
  <!-- retrieval edge: question <-> context -->
  <line x1="500" y1="150" x2="240" y2="470" stroke="#14b8a6" stroke-width="2.4" stroke-linecap="round" />
  <!-- generation edge: question <-> answer -->
  <line x1="500" y1="150" x2="760" y2="470" stroke="#6366f1" stroke-width="2.4" stroke-linecap="round" />
  <!-- generation edge: context <-> answer -->
  <line x1="240" y1="470" x2="760" y2="470" stroke="#6366f1" stroke-width="2.4" stroke-linecap="round" />

  <!-- ===================== NODE CARDS ===================== -->
  <!-- Question (top) -->
  <rect x="405" y="114" width="190" height="72" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" />
  <text x="500" y="148" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">QUESTION</text>
  <text x="500" y="167" font-size="11.5" fill="#64748b" text-anchor="middle">what the user asked</text>

  <!-- Context (bottom-left) -->
  <rect x="145" y="434" width="190" height="72" rx="14" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1.5" />
  <text x="240" y="468" font-size="14" font-weight="700" fill="#0f766e" text-anchor="middle">CONTEXT</text>
  <text x="240" y="487" font-size="11.5" fill="#64748b" text-anchor="middle">the retrieved chunks</text>

  <!-- Answer (bottom-right) -->
  <rect x="665" y="434" width="190" height="72" rx="14" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5" />
  <text x="760" y="468" font-size="14" font-weight="700" fill="#4f46e5" text-anchor="middle">ANSWER</text>
  <text x="760" y="487" font-size="11.5" fill="#64748b" text-anchor="middle">the generated reply</text>

  <!-- ===================== EDGE LABEL: RETRIEVAL (two metrics) ===================== -->
  <rect x="200" y="248" width="272" height="124" rx="12" fill="#ffffff" stroke="#99f6e4" stroke-width="1.5" />
  <text x="218" y="270" font-size="10.5" font-weight="700" letter-spacing="0.04em" fill="#0f766e">RETRIEVAL  &#183;  question vs context</text>
  <text x="218" y="295" font-size="13" font-weight="700" fill="#0f172a">Context Precision</text>
  <text x="218" y="312" font-size="11.5" fill="#64748b">Are the relevant chunks ranked on top?</text>
  <text x="218" y="340" font-size="13" font-weight="700" fill="#0f172a">Context Recall</text>
  <text x="218" y="357" font-size="11.5" fill="#64748b">Did we fetch all the info we needed?</text>

  <!-- ===================== EDGE LABEL: ANSWER RELEVANCE ===================== -->
  <rect x="525" y="258" width="256" height="96" rx="12" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5" />
  <text x="543" y="280" font-size="10.5" font-weight="700" letter-spacing="0.04em" fill="#4f46e5">GENERATION  &#183;  question vs answer</text>
  <text x="543" y="306" font-size="13" font-weight="700" fill="#0f172a">Answer Relevance</text>
  <text x="543" y="324" font-size="11.5" fill="#64748b">Does the answer address the</text>
  <text x="543" y="339" font-size="11.5" fill="#64748b">question, without wandering?</text>

  <!-- ===================== EDGE LABEL: FAITHFULNESS ===================== -->
  <rect x="352" y="436" width="300" height="70" rx="12" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5" />
  <text x="502" y="458" font-size="10.5" font-weight="700" letter-spacing="0.04em" fill="#4f46e5" text-anchor="middle">GENERATION  &#183;  context vs answer</text>
  <text x="502" y="480" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">Faithfulness</text>
  <text x="502" y="497" font-size="11.5" fill="#64748b" text-anchor="middle">Is every claim in the answer supported by the context?</text>

  <!-- ===================== OPTIONAL: ANSWER CORRECTNESS (needs a reference) ===================== -->
  <line x1="760" y1="506" x2="760" y2="522" stroke="#cbd5e1" stroke-width="1.6" stroke-dasharray="4 4" />
  <rect x="635" y="522" width="250" height="54" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="5 4" />
  <text x="760" y="543" font-size="10.5" font-weight="700" letter-spacing="0.03em" fill="#64748b" text-anchor="middle">ANSWER CORRECTNESS  &#183;  vs a reference</text>
  <text x="760" y="560" font-size="11" fill="#94a3b8" text-anchor="middle">optional: only when you have a gold answer</text>
</svg>
