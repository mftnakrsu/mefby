<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 660" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="p12-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <marker id="p12-arr-cyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#06b6d4"/>
    </marker>
    <marker id="p12-arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#14b8a6"/>
    </marker>
    <marker id="p12-arr-violet" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b5cf6"/>
    </marker>
    <marker id="p12-arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b"/>
    </marker>
    <marker id="p12-arr-indigo" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6366f1"/>
    </marker>
    <marker id="p12-arr-emerald" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1080" height="660" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="42" font-size="20" font-weight="700" fill="#0f172a">The production request path (and a map of the whole series)</text>
  <text x="40" y="64" font-size="13" fill="#64748b">Every block carries the part that built it. The pipeline is wrapped by the four layers that make it survive production.</text>

  <!-- ===================================================================== -->
  <!-- TOP BAND: Monitoring and tracing                                       -->
  <!-- ===================================================================== -->
  <g>
    <rect x="40" y="86" width="1000" height="40" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-dasharray="6 4"/>
    <text x="60" y="105" font-size="11.5" font-weight="700" letter-spacing="0.04em" fill="#475569">MONITORING &amp; TRACING</text>
    <text x="60" y="120" font-size="11" fill="#64748b">latency &#183; tokens &#183; cost &#183; retrieved chunks per request</text>
    <rect x="958" y="96" width="68" height="22" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="992" y="111" font-size="10" font-weight="700" fill="#475569" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">P11 &#183; P12</text>
  </g>

  <!-- ===================================================================== -->
  <!-- CENTER REQUEST PATH                                                    -->
  <!-- ===================================================================== -->

  <!-- Block: User query (slate) -->
  <g>
    <rect x="40" y="186" width="118" height="66" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect x="40" y="186" width="6" height="66" rx="3" fill="#64748b"/>
    <text x="100" y="222" font-size="12" font-weight="700" fill="#0f172a" text-anchor="middle">User query</text>
  </g>

  <!-- Block: Semantic cache check (cyan, P12) -->
  <g>
    <rect x="186" y="186" width="128" height="66" rx="12" fill="#ecfeff" stroke="#06b6d4"/>
    <rect x="186" y="186" width="6" height="66" rx="3" fill="#06b6d4"/>
    <rect x="270" y="194" width="36" height="18" rx="8" fill="#ffffff" stroke="#67e8f9"/>
    <text x="288" y="207" font-size="9.5" font-weight="700" fill="#0e7490" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">P12</text>
    <text x="250" y="227" font-size="11.5" font-weight="700" fill="#0e7490" text-anchor="middle">Semantic</text>
    <text x="250" y="242" font-size="11.5" font-weight="700" fill="#0e7490" text-anchor="middle">cache check</text>
  </g>

  <!-- Block: Query transform (amber, P8) -->
  <g>
    <rect x="342" y="186" width="124" height="66" rx="12" fill="#fffbeb" stroke="#f59e0b"/>
    <rect x="342" y="186" width="6" height="66" rx="3" fill="#f59e0b"/>
    <rect x="422" y="194" width="36" height="18" rx="8" fill="#ffffff" stroke="#fcd34d"/>
    <text x="440" y="207" font-size="9.5" font-weight="700" fill="#b45309" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">P8</text>
    <text x="404" y="232" font-size="11.5" font-weight="700" fill="#b45309" text-anchor="middle">Query</text>
    <text x="404" y="247" font-size="11.5" font-weight="700" fill="#b45309" text-anchor="middle">transform</text>
  </g>

  <!-- Block: Hybrid retrieve (teal, P7) -->
  <g>
    <rect x="494" y="186" width="124" height="66" rx="12" fill="#f0fdfa" stroke="#14b8a6"/>
    <rect x="494" y="186" width="6" height="66" rx="3" fill="#14b8a6"/>
    <rect x="574" y="194" width="36" height="18" rx="8" fill="#ffffff" stroke="#5eead4"/>
    <text x="592" y="207" font-size="9.5" font-weight="700" fill="#0f766e" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">P7</text>
    <text x="556" y="232" font-size="11.5" font-weight="700" fill="#0f766e" text-anchor="middle">Hybrid</text>
    <text x="556" y="247" font-size="11.5" font-weight="700" fill="#0f766e" text-anchor="middle">retrieve</text>
  </g>

  <!-- Block: Rerank (violet, P8) -->
  <g>
    <rect x="646" y="186" width="110" height="66" rx="12" fill="#f5f3ff" stroke="#8b5cf6"/>
    <rect x="646" y="186" width="6" height="66" rx="3" fill="#8b5cf6"/>
    <rect x="712" y="194" width="36" height="18" rx="8" fill="#ffffff" stroke="#ddd6fe"/>
    <text x="730" y="207" font-size="9.5" font-weight="700" fill="#6d28d9" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">P8</text>
    <text x="701" y="239" font-size="11.5" font-weight="700" fill="#6d28d9" text-anchor="middle">Rerank</text>
  </g>

  <!-- Block: Generate (stream) (indigo, P6) -->
  <g>
    <rect x="784" y="186" width="124" height="66" rx="12" fill="#eef2ff" stroke="#6366f1"/>
    <rect x="784" y="186" width="6" height="66" rx="3" fill="#6366f1"/>
    <rect x="864" y="194" width="36" height="18" rx="8" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="882" y="207" font-size="9.5" font-weight="700" fill="#4f46e5" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">P6</text>
    <text x="846" y="232" font-size="11.5" font-weight="700" fill="#4f46e5" text-anchor="middle">Generate</text>
    <text x="846" y="247" font-size="11.5" font-weight="700" fill="#4f46e5" text-anchor="middle">(stream)</text>
  </g>

  <!-- Block: Response (grounded) (emerald, P1 . P6) -->
  <g>
    <rect x="936" y="186" width="104" height="66" rx="12" fill="#ecfdf5" stroke="#10b981"/>
    <rect x="936" y="186" width="6" height="66" rx="3" fill="#10b981"/>
    <text x="990" y="216" font-size="11.5" font-weight="700" fill="#047857" text-anchor="middle">Response</text>
    <text x="990" y="231" font-size="11.5" font-weight="700" fill="#047857" text-anchor="middle">(grounded)</text>
    <text x="990" y="246" font-size="9" font-weight="700" fill="#059669" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">P1 &#183; P6</text>
  </g>

  <!-- Request-path arrows (slate) -->
  <line x1="158" y1="219" x2="184" y2="219" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#p12-arr)"/>
  <line x1="314" y1="219" x2="340" y2="219" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#p12-arr)"/>
  <line x1="466" y1="219" x2="492" y2="219" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#p12-arr)"/>
  <line x1="618" y1="219" x2="644" y2="219" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#p12-arr)"/>
  <line x1="756" y1="219" x2="782" y2="219" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#p12-arr)"/>
  <line x1="908" y1="219" x2="934" y2="219" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#p12-arr)"/>

  <!-- DASHED cyan short-circuit: cache check -> response -->
  <path d="M250,186 V158 H988 V184" fill="none" stroke="#06b6d4" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#p12-arr-cyan)"/>
  <text x="619" y="151" font-size="10.5" font-weight="700" fill="#0891b2" text-anchor="middle">cache hit: skip the pipeline</text>

  <!-- ===================================================================== -->
  <!-- SECURITY FRAME around retrieve -> generate                            -->
  <!-- ===================================================================== -->
  <g>
    <rect x="482" y="170" width="438" height="124" rx="14" fill="none" stroke="#f43f5e" stroke-width="1.4" stroke-dasharray="6 4"/>
    <rect x="488" y="270" width="426" height="18" rx="6" fill="#fff1f2"/>
    <text x="500" y="283" font-size="10.5" font-weight="700" fill="#e11d48">SECURITY &amp; ACCESS FILTERING</text>
    <text x="672" y="283" font-size="10" fill="#e11d48">per-user filters, content wall</text>
    <rect x="846" y="271" width="62" height="16" rx="7" fill="#ffffff" stroke="#fda4af"/>
    <text x="877" y="283" font-size="9" font-weight="700" fill="#e11d48" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">P8 &#183; P12</text>
  </g>

  <!-- ===================================================================== -->
  <!-- VECTOR INDEX (below Hybrid retrieve)                                   -->
  <!-- ===================================================================== -->
  <g>
    <rect x="492" y="346" width="128" height="60" rx="12" fill="#f0fdfa" stroke="#14b8a6"/>
    <rect x="492" y="346" width="6" height="60" rx="3" fill="#14b8a6"/>
    <text x="558" y="374" font-size="12" font-weight="700" fill="#0f766e" text-anchor="middle">Vector index</text>
    <text x="558" y="392" font-size="9.5" font-weight="700" fill="#0d9488" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">P3 &#183; P4</text>
  </g>

  <!-- retrieve <-> vector index arrow (teal, two-way feel: query down, hits up) -->
  <path d="M548,294 V344" fill="none" stroke="#14b8a6" stroke-width="1.8" marker-end="url(#p12-arr-teal)"/>
  <path d="M576,344 V296" fill="none" stroke="#14b8a6" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#p12-arr-teal)"/>
  <text x="640" y="324" font-size="9.5" fill="#0f766e">search &#183; top-k hits</text>

  <!-- ===================================================================== -->
  <!-- BOTTOM BAND: Ingestion pipeline -> Vector index                       -->
  <!-- ===================================================================== -->
  <g>
    <rect x="40" y="440" width="1000" height="96" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-dasharray="6 4"/>
    <rect x="40" y="440" width="6" height="96" rx="3" fill="#14b8a6"/>
    <text x="64" y="466" font-size="11.5" font-weight="700" letter-spacing="0.04em" fill="#475569">INGESTION PIPELINE</text>
    <text x="198" y="466" font-size="11" fill="#64748b">keeps the index fresh</text>

    <!-- Load -->
    <rect x="64" y="478" width="120" height="44" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="124" y="505" font-size="11.5" font-weight="700" fill="#475569" text-anchor="middle">Load</text>

    <!-- Chunk (P5, amber) -->
    <rect x="224" y="478" width="120" height="44" rx="10" fill="#fffbeb" stroke="#f59e0b"/>
    <text x="278" y="505" font-size="11.5" font-weight="700" fill="#b45309" text-anchor="middle">Chunk</text>
    <rect x="312" y="489" width="26" height="16" rx="7" fill="#ffffff" stroke="#fcd34d"/>
    <text x="325" y="501" font-size="9" font-weight="700" fill="#b45309" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">P5</text>

    <!-- Embed (P2, violet) -->
    <rect x="384" y="478" width="120" height="44" rx="10" fill="#f5f3ff" stroke="#8b5cf6"/>
    <text x="438" y="505" font-size="11.5" font-weight="700" fill="#6d28d9" text-anchor="middle">Embed</text>
    <rect x="472" y="489" width="26" height="16" rx="7" fill="#ffffff" stroke="#ddd6fe"/>
    <text x="485" y="501" font-size="9" font-weight="700" fill="#6d28d9" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">P2</text>

    <!-- Index (P3/P4, teal) -->
    <rect x="544" y="478" width="128" height="44" rx="10" fill="#f0fdfa" stroke="#14b8a6"/>
    <text x="600" y="505" font-size="11.5" font-weight="700" fill="#0f766e" text-anchor="middle">Index</text>
    <rect x="636" y="489" width="30" height="16" rx="7" fill="#ffffff" stroke="#5eead4"/>
    <text x="651" y="501" font-size="8.5" font-weight="700" fill="#0f766e" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">P3/P4</text>

    <!-- ingestion arrows -->
    <line x1="184" y1="500" x2="222" y2="500" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#p12-arr)"/>
    <line x1="344" y1="500" x2="382" y2="500" stroke="#8b5cf6" stroke-width="1.8" marker-end="url(#p12-arr-violet)"/>
    <line x1="504" y1="500" x2="542" y2="500" stroke="#14b8a6" stroke-width="1.8" marker-end="url(#p12-arr-teal)"/>

    <text x="760" y="496" font-size="11" fill="#475569">Runs offline / on a schedule, not on the</text>
    <text x="760" y="513" font-size="11" fill="#475569">request path. New docs flow into the index.</text>
  </g>

  <!-- arrow from ingestion Index up into the Vector index (violet/teal) -->
  <path d="M608,478 C608,440 580,432 558,408" fill="none" stroke="#14b8a6" stroke-width="1.8" marker-end="url(#p12-arr-teal)"/>
  <text x="640" y="430" font-size="9.5" fill="#0f766e">write fresh vectors</text>

  <!-- ===================================================================== -->
  <!-- SERIES TOC LEGEND                                                      -->
  <!-- ===================================================================== -->
  <text x="40" y="576" font-size="11.5" font-weight="700" letter-spacing="0.04em" fill="#64748b">THE WHOLE SERIES, AT A GLANCE</text>

  <g font-size="10" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">
    <!-- Row 1 -->
    <rect x="40" y="588" width="118" height="24" rx="8" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="99" y="604" fill="#4f46e5" text-anchor="middle">P1 Why RAG</text>

    <rect x="166" y="588" width="128" height="24" rx="8" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="230" y="604" fill="#7c3aed" text-anchor="middle">P2 Embeddings</text>

    <rect x="302" y="588" width="122" height="24" rx="8" fill="#f0fdfa" stroke="#99f6e4"/>
    <text x="363" y="604" fill="#0d9488" text-anchor="middle">P3 Similarity</text>

    <rect x="432" y="588" width="128" height="24" rx="8" fill="#f0fdfa" stroke="#5eead4"/>
    <text x="496" y="604" fill="#0f766e" text-anchor="middle">P4 Vector DBs</text>

    <rect x="568" y="588" width="112" height="24" rx="8" fill="#fffbeb" stroke="#fde68a"/>
    <text x="624" y="604" fill="#b45309" text-anchor="middle">P5 Chunking</text>

    <rect x="688" y="588" width="92" height="24" rx="8" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="734" y="604" fill="#4f46e5" text-anchor="middle">P6 Build</text>

    <!-- Row 2 -->
    <rect x="40" y="620" width="118" height="24" rx="8" fill="#f0fdfa" stroke="#5eead4"/>
    <text x="99" y="636" fill="#0f766e" text-anchor="middle">P7 Retrieval</text>

    <rect x="166" y="620" width="112" height="24" rx="8" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="222" y="636" fill="#7c3aed" text-anchor="middle">P8 Smarter</text>

    <rect x="286" y="620" width="112" height="24" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="342" y="636" fill="#475569" text-anchor="middle">P9 Patterns</text>

    <rect x="406" y="620" width="142" height="24" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="477" y="636" fill="#475569" text-anchor="middle">P10 Architectures</text>

    <rect x="556" y="620" width="128" height="24" rx="8" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text x="620" y="636" fill="#475569" text-anchor="middle">P11 Evaluation</text>

    <rect x="692" y="620" width="128" height="24" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="756" y="636" fill="#047857" text-anchor="middle">P12 Production</text>
  </g>
</svg>
