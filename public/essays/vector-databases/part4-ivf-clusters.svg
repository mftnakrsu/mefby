<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 560" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect x="0" y="0" width="780" height="560" fill="#ffffff" />

  <!-- Title -->
  <text x="40" y="40" font-size="20" font-weight="700" fill="#0f172a">IVF: search the right shelves, skip the rest</text>
  <text x="40" y="62" font-size="13" fill="#64748b">Compare to the centroids first, then search only the nearest few clusters.</text>

  <!-- nprobe chip -->
  <rect x="600" y="66" width="130" height="24" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5" />
  <text x="665" y="82" font-size="12.5" font-weight="700" fill="#4f46e5" text-anchor="middle">nprobe = 2</text>

  <!-- ===================== CELLS ===================== -->
  <!-- unsearched (dim) -->
  <polygon points="60,90 295,90 265,265 60,270"   fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" />
  <polygon points="295,90 490,90 515,300 265,265" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" />
  <polygon points="490,90 720,90 720,290 515,300" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" />
  <polygon points="60,270 265,265 270,470 60,470" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" />
  <!-- searched (highlighted): E = query's cell, F = next-nearest centroid -->
  <polygon points="265,265 515,300 510,470 270,470" fill="#eef2ff" stroke="#4f46e5" stroke-width="2.5" />
  <polygon points="515,300 720,290 720,470 510,470" fill="#eef2ff" stroke="#6366f1" stroke-width="2" />

  <!-- ===================== COMPARISON LINES (Q to dots in searched cells) ===================== -->
  <g stroke="#06b6d4" stroke-width="1.2" opacity="0.45">
    <!-- to cell E dots -->
    <line x1="470" y1="360" x2="330" y2="350" /><line x1="470" y1="360" x2="440" y2="340" /><line x1="470" y1="360" x2="360" y2="430" /><line x1="470" y1="360" x2="470" y2="420" /><line x1="470" y1="360" x2="310" y2="400" /><line x1="470" y1="360" x2="445" y2="378" />
    <!-- to cell F dots -->
    <line x1="470" y1="360" x2="560" y2="350" /><line x1="470" y1="360" x2="660" y2="345" /><line x1="470" y1="360" x2="590" y2="430" /><line x1="470" y1="360" x2="680" y2="425" /><line x1="470" y1="360" x2="540" y2="390" />
  </g>

  <!-- ===================== DOTS ===================== -->
  <!-- skipped cells: dim gray dots -->
  <g fill="#cbd5e1" opacity="0.75">
    <circle cx="130" cy="150" r="4" /><circle cx="210" cy="155" r="4" /><circle cx="150" cy="215" r="4" /><circle cx="225" cy="205" r="4" /><circle cx="110" cy="180" r="4" />
    <circle cx="340" cy="150" r="4" /><circle cx="440" cy="150" r="4" /><circle cx="360" cy="220" r="4" /><circle cx="450" cy="235" r="4" /><circle cx="400" cy="180" r="4" />
    <circle cx="560" cy="150" r="4" /><circle cx="660" cy="150" r="4" /><circle cx="600" cy="230" r="4" /><circle cx="680" cy="225" r="4" /><circle cx="540" cy="200" r="4" />
    <circle cx="120" cy="320" r="4" /><circle cx="210" cy="330" r="4" /><circle cx="140" cy="420" r="4" /><circle cx="220" cy="420" r="4" /><circle cx="110" cy="380" r="4" />
  </g>
  <!-- searched cells: examined candidates (indigo) -->
  <g fill="#6366f1">
    <circle cx="330" cy="350" r="4.5" /><circle cx="440" cy="340" r="4.5" /><circle cx="360" cy="430" r="4.5" /><circle cx="470" cy="420" r="4.5" /><circle cx="310" cy="400" r="4.5" />
    <circle cx="560" cy="350" r="4.5" /><circle cx="660" cy="345" r="4.5" /><circle cx="590" cy="430" r="4.5" /><circle cx="680" cy="425" r="4.5" /><circle cx="540" cy="390" r="4.5" />
  </g>
  <!-- nearest match (emerald) -->
  <circle cx="445" cy="378" r="10" fill="none" stroke="#10b981" stroke-width="2" />
  <circle cx="445" cy="378" r="6" fill="#10b981" stroke="#fff" stroke-width="2" />

  <!-- ===================== CENTROIDS (x marks) ===================== -->
  <!-- skipped centroids -->
  <g stroke="#94a3b8" stroke-width="2" stroke-linecap="round">
    <line x1="165" y1="174" x2="175" y2="184" /><line x1="165" y1="184" x2="175" y2="174" />
    <line x1="386" y1="181" x2="396" y2="191" /><line x1="386" y1="191" x2="396" y2="181" />
    <line x1="606" y1="188" x2="616" y2="198" /><line x1="606" y1="198" x2="616" y2="188" />
    <line x1="159" y1="364" x2="169" y2="374" /><line x1="159" y1="374" x2="169" y2="364" />
  </g>
  <!-- searched centroids (stronger) -->
  <g stroke="#4f46e5" stroke-width="2.6" stroke-linecap="round">
    <line x1="384" y1="370" x2="396" y2="382" /><line x1="384" y1="382" x2="396" y2="370" />
    <line x1="610" y1="377" x2="622" y2="389" /><line x1="610" y1="389" x2="622" y2="377" />
  </g>
  <text x="611" y="176" font-size="11" fill="#64748b" text-anchor="middle">centroid</text>

  <!-- ===================== QUERY ===================== -->
  <path d="M470,352 L478,360 L470,368 L462,360 Z" fill="#6366f1" stroke="#fff" stroke-width="2" />
  <text x="470" y="344" font-size="11" font-weight="700" fill="#4f46e5" text-anchor="middle">query</text>

  <!-- ===================== LEGEND ===================== -->
  <g font-size="12" fill="#64748b">
    <path d="M60,512 L67,518 L60,524 L53,518 Z" fill="#6366f1" /><text x="74" y="522">query</text>
    <g stroke="#94a3b8" stroke-width="2" stroke-linecap="round"><line x1="146" y1="513" x2="156" y2="523" /><line x1="146" y1="523" x2="156" y2="513" /></g><text x="166" y="522">centroid</text>
    <circle cx="280" cy="518" r="4.5" fill="#6366f1" /><text x="294" y="522">examined</text>
    <circle cx="406" cy="518" r="5" fill="#10b981" /><text x="420" y="522">nearest match</text>
    <circle cx="566" cy="518" r="4" fill="#cbd5e1" /><text x="580" y="522">skipped cells</text>
  </g>
</svg>
