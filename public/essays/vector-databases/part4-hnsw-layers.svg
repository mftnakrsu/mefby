<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 600" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="hnsw-drop" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1,1 L9,5 L1,9" fill="none" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>

  <rect x="0" y="0" width="760" height="600" fill="#ffffff" />

  <!-- Title -->
  <text x="40" y="40" font-size="20" font-weight="700" fill="#0f172a">HNSW: long hops first, short hops last</text>
  <text x="40" y="62" font-size="13" fill="#64748b">Navigate a layered graph from a sparse top layer down to the dense bottom.</text>

  <!-- ===================== PANELS ===================== -->
  <rect x="40" y="84"  width="680" height="120" rx="14" fill="#f8fafc" stroke="#e2e8f0" />
  <rect x="40" y="228" width="680" height="120" rx="14" fill="#f8fafc" stroke="#e2e8f0" />
  <rect x="40" y="372" width="680" height="160" rx="14" fill="#f8fafc" stroke="#e2e8f0" />

  <text x="60" y="106" font-size="11" font-weight="700" letter-spacing="0.06em" fill="#64748b">LAYER 2 : SPARSEST, LONGEST HOPS</text>
  <text x="60" y="250" font-size="11" font-weight="700" letter-spacing="0.06em" fill="#64748b">LAYER 1 : DENSER, SHORTER HOPS</text>
  <text x="60" y="394" font-size="11" font-weight="700" letter-spacing="0.06em" fill="#64748b">LAYER 0 : ALL VECTORS, SHORTEST HOPS</text>

  <!-- ===================== GRAY (non-path) EDGES ===================== -->
  <g stroke="#cbd5e1" stroke-width="1.6">
    <!-- layer 2 -->
    <line x1="110" y1="150" x2="300" y2="150" /><line x1="300" y1="150" x2="470" y2="150" /><line x1="470" y1="150" x2="640" y2="150" />
    <!-- layer 1 -->
    <line x1="130" y1="294" x2="250" y2="294" /><line x1="250" y1="294" x2="360" y2="294" /><line x1="360" y1="294" x2="470" y2="294" /><line x1="470" y1="294" x2="560" y2="294" /><line x1="560" y1="294" x2="660" y2="294" />
    <!-- layer 0 -->
    <line x1="90" y1="440" x2="150" y2="440" /><line x1="150" y1="440" x2="210" y2="440" /><line x1="210" y1="440" x2="270" y2="440" /><line x1="270" y1="440" x2="330" y2="440" /><line x1="330" y1="440" x2="390" y2="440" /><line x1="390" y1="440" x2="450" y2="440" /><line x1="450" y1="440" x2="510" y2="440" /><line x1="510" y1="440" x2="570" y2="440" /><line x1="570" y1="440" x2="630" y2="440" /><line x1="630" y1="440" x2="690" y2="440" />
  </g>

  <!-- ===================== DESCENT CONNECTORS ===================== -->
  <g stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 5">
    <line x1="470" y1="160" x2="470" y2="286" marker-end="url(#hnsw-drop)" />
    <line x1="560" y1="304" x2="632" y2="430" marker-end="url(#hnsw-drop)" />
  </g>
  <text x="482" y="226" font-size="10.5" fill="#94a3b8">descend</text>
  <text x="600" y="372" font-size="10.5" fill="#94a3b8">descend</text>

  <!-- ===================== PATH EDGES (cyan) ===================== -->
  <g stroke="#06b6d4" stroke-width="3" stroke-linecap="round">
    <line x1="110" y1="150" x2="300" y2="150" /><line x1="300" y1="150" x2="470" y2="150" />
    <line x1="470" y1="294" x2="560" y2="294" />
    <line x1="630" y1="440" x2="570" y2="440" /><line x1="570" y1="440" x2="510" y2="440" />
  </g>

  <!-- ===================== NODES ===================== -->
  <!-- layer 2: slate non-path -->
  <circle cx="640" cy="150" r="8" fill="#94a3b8" />
  <!-- layer 2: visited -->
  <circle cx="300" cy="150" r="8" fill="#06b6d4" stroke="#fff" stroke-width="2" />
  <circle cx="470" cy="150" r="8" fill="#06b6d4" stroke="#fff" stroke-width="2" />
  <!-- layer 2: entry -->
  <circle cx="110" cy="150" r="9" fill="#6366f1" stroke="#fff" stroke-width="2" />

  <!-- layer 1: slate non-path -->
  <circle cx="130" cy="294" r="7" fill="#94a3b8" /><circle cx="250" cy="294" r="7" fill="#94a3b8" /><circle cx="360" cy="294" r="7" fill="#94a3b8" /><circle cx="660" cy="294" r="7" fill="#94a3b8" />
  <!-- layer 1: visited -->
  <circle cx="470" cy="294" r="7" fill="#06b6d4" stroke="#fff" stroke-width="2" /><circle cx="560" cy="294" r="7" fill="#06b6d4" stroke="#fff" stroke-width="2" />

  <!-- layer 0: slate non-path -->
  <circle cx="90" cy="440" r="5" fill="#94a3b8" /><circle cx="150" cy="440" r="5" fill="#94a3b8" /><circle cx="210" cy="440" r="5" fill="#94a3b8" /><circle cx="270" cy="440" r="5" fill="#94a3b8" /><circle cx="330" cy="440" r="5" fill="#94a3b8" /><circle cx="390" cy="440" r="5" fill="#94a3b8" /><circle cx="450" cy="440" r="5" fill="#94a3b8" /><circle cx="690" cy="440" r="5" fill="#94a3b8" />
  <!-- layer 0: visited -->
  <circle cx="630" cy="440" r="6" fill="#06b6d4" stroke="#fff" stroke-width="2" /><circle cx="570" cy="440" r="6" fill="#06b6d4" stroke="#fff" stroke-width="2" />
  <!-- layer 0: target -->
  <circle cx="510" cy="440" r="8" fill="#10b981" stroke="#fff" stroke-width="2" />

  <!-- ===================== QUERY MARKER ===================== -->
  <line x1="510" y1="449" x2="510" y2="471" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="2 3" />
  <path d="M510,471 L517,478 L510,485 L503,478 Z" fill="#6366f1" stroke="#fff" stroke-width="1.5" />

  <!-- ===================== LABELS ===================== -->
  <text x="110" y="131" font-size="11" font-weight="700" fill="#4f46e5" text-anchor="middle">entry</text>
  <text x="510" y="421" font-size="11" font-weight="700" fill="#059669" text-anchor="middle">nearest</text>
  <text x="510" y="503" font-size="11" font-weight="700" fill="#4f46e5" text-anchor="middle">query</text>

  <!-- ===================== LEGEND ===================== -->
  <g font-size="11.5" fill="#64748b">
    <circle cx="48" cy="566" r="6" fill="#6366f1" /><text x="60" y="570">entry point</text>
    <circle cx="150" cy="566" r="6" fill="#06b6d4" /><text x="162" y="570">search path</text>
    <circle cx="262" cy="566" r="6" fill="#10b981" /><text x="274" y="570">nearest neighbor</text>
    <circle cx="408" cy="566" r="6" fill="#94a3b8" /><text x="420" y="570">other vectors</text>
    <path d="M530,560 L537,566 L530,572 L523,566 Z" fill="#6366f1" /><text x="544" y="570">query vector</text>
  </g>
</svg>
