<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" role="img" aria-labelledby="t d">
  <title id="t">Uçtan uca tipik angajman akışı — 6 adım</title>
  <desc id="d">TOYGUN'un bir hedefin tespitinden vuruşuna ya da başka bir birime devrine kadar olan tipik adımları. Tarama, tespit, kilitlenme, menzil/koordinat hesabı tamamen pasiftir; yalnızca 5. adımda kısa süreli, dar bir lazer ışını dışarı çıkar. 6. adımda ya güdümlü mühimmat hedefe kilitlenir ya da üretilen koordinat başka bir platforma devredilir.</desc>

  <style><![CDATA[
    .title { font: 600 15px ui-sans-serif, system-ui, sans-serif; fill: #18181b; }
    .top-label { font: 600 11px ui-sans-serif, system-ui, sans-serif; fill: #047857; letter-spacing: 0.06em; text-transform: uppercase; }
    .label-main { font: 600 13px ui-sans-serif, system-ui, sans-serif; fill: #18181b; }
    .label-sub  { font: 400 11px ui-monospace, monospace; fill: #71717a; }
    .step-num { font: 700 14px ui-sans-serif, system-ui, sans-serif; fill: #ffffff; }
    .annot { font: 400 11px ui-sans-serif, system-ui, sans-serif; fill: #52525b; }

    .frame-pasif { fill: #ecfdf5; stroke: #10b981; stroke-width: 1.5; }
    .frame-aktif { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; }
    .num-bg      { fill: #10b981; }
    .num-bg-a    { fill: #f59e0b; }

    .arrow { stroke: #a1a1aa; stroke-width: 1.5; fill: none; }

    .step { opacity: 0; animation: in 0.5s ease forwards, loop 16s infinite; }
    .st1 { animation-delay: 0.3s, 0.3s; }
    .st2 { animation-delay: 1.0s, 1.0s; }
    .st3 { animation-delay: 1.7s, 1.7s; }
    .st4 { animation-delay: 2.4s, 2.4s; }
    .st5 { animation-delay: 3.1s, 3.1s; }
    .st6 { animation-delay: 3.8s, 3.8s; }
    @keyframes in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes loop { 0%,92%,100% { opacity: 1 } 94%,99% { opacity: 0.3 } }

    .banner { fill: #ecfdf5; stroke: #6ee7b7; stroke-width: 1; }
  ]]></style>

  <text class="title" x="400" y="28" text-anchor="middle">Uçtan uca angajman — 6 adımda tipik akış</text>

  <g transform="translate(140, 60)">
    <rect class="banner" x="0" y="0" width="520" height="40" rx="8"/>
    <text class="top-label" x="260" y="25" text-anchor="middle">Tüm süreç boyunca uçağın radarı KAPALI — pasif algılama</text>
  </g>

  <g class="step st1" transform="translate(220, 125)">
    <rect class="frame-pasif" x="0" y="0" width="360" height="50" rx="8"/>
    <circle class="num-bg" cx="30" cy="25" r="16"/>
    <text class="step-num" x="30" y="30" text-anchor="middle">1</text>
    <text class="label-main" x="60" y="22">Tarama</text>
    <text class="label-sub"  x="60" y="40">MWIR ile sahneyi gözle (IRST)</text>
  </g>
  <path class="arrow step st2" d="M 400 180 L 400 195" marker-end="url(#a)"/>

  <g class="step st2" transform="translate(220, 200)">
    <rect class="frame-pasif" x="0" y="0" width="360" height="50" rx="8"/>
    <circle class="num-bg" cx="30" cy="25" r="16"/>
    <text class="step-num" x="30" y="30" text-anchor="middle">2</text>
    <text class="label-main" x="60" y="22">Tespit & tanı</text>
    <text class="label-sub"  x="60" y="40">ATR hedefi bulur ve sınıflandırır</text>
  </g>
  <path class="arrow step st3" d="M 400 255 L 400 270" marker-end="url(#a)"/>

  <g class="step st3" transform="translate(220, 275)">
    <rect class="frame-pasif" x="0" y="0" width="360" height="50" rx="8"/>
    <circle class="num-bg" cx="30" cy="25" r="16"/>
    <text class="step-num" x="30" y="30" text-anchor="middle">3</text>
    <text class="label-main" x="60" y="22">Kilitlenme</text>
    <text class="label-sub"  x="60" y="40">takip kapısı kapanır · kapalı çevrim</text>
  </g>
  <path class="arrow step st4" d="M 400 330 L 400 345" marker-end="url(#a)"/>

  <g class="step st4" transform="translate(220, 350)">
    <rect class="frame-pasif" x="0" y="0" width="360" height="50" rx="8"/>
    <circle class="num-bg" cx="30" cy="25" r="16"/>
    <text class="step-num" x="30" y="30" text-anchor="middle">4</text>
    <text class="label-main" x="60" y="22">Menzil & koordinat</text>
    <text class="label-sub"  x="60" y="40">lazer + GPS/IMU → hedef konumu</text>
  </g>
  <path class="arrow step st5" d="M 400 405 L 400 420" marker-end="url(#a)"/>

  <g class="step st5" transform="translate(220, 425)">
    <rect class="frame-aktif" x="0" y="0" width="360" height="50" rx="8"/>
    <circle class="num-bg-a" cx="30" cy="25" r="16"/>
    <text class="step-num" x="30" y="30" text-anchor="middle">5</text>
    <text class="label-main" x="60" y="22">İşaretleme</text>
    <text class="label-sub"  x="60" y="40">kodlu lazerle hedefi boya (kısa, dar)</text>
  </g>
  <path class="arrow step st6" d="M 400 480 L 400 495" marker-end="url(#a)"/>

  <g class="step st6" transform="translate(220, 500)">
    <rect class="frame-pasif" x="0" y="0" width="360" height="40" rx="8"/>
    <circle class="num-bg" cx="30" cy="20" r="13"/>
    <text class="step-num" x="30" y="25" text-anchor="middle">6</text>
    <text class="label-main" x="60" y="18">Vuruş / devir</text>
    <text class="label-sub"  x="60" y="33">mühimmat kilitlenir ya da koordinat devredilir</text>
  </g>

  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#a1a1aa"/>
    </marker>
  </defs>
</svg>
