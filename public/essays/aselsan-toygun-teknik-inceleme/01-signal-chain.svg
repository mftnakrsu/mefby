<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 470" role="img" aria-labelledby="t d">
  <title id="t">TOYGUN işlevsel sinyal zinciri</title>
  <desc id="d">Hedef sahnesinden gelen kızılötesi ışıma fasetli pencereden girer, gimbal stabilizasyonunda kararlı tutulur, soğutmalı MWIR algılayıcıda elektrik sinyaline çevrilir, görüntü işleyicide tespit-takip-tanıma adımlarından geçer ve görev bilgisayarına aktarılır. Aktif lazer birimi gimballa aynı açıklığı paylaşır.</desc>

  <style><![CDATA[
    .frame-pasif { fill: #ecfdf5; stroke: #6ee7b7; stroke-width: 1.5; }
    .frame-aktif { fill: #fef3c7; stroke: #fcd34d; stroke-width: 1.5; }
    .frame-dis   { fill: #f4f4f5; stroke: #d4d4d8; stroke-width: 1.5; }
    .label-main  { font: 600 13px ui-sans-serif, system-ui, sans-serif; fill: #18181b; }
    .label-sub   { font: 400 10.5px ui-sans-serif, system-ui, sans-serif; fill: #71717a; }
    .arrow-label { font: 400 10px ui-monospace, monospace; fill: #71717a; }
    .arrow       { stroke: #a1a1aa; stroke-width: 1.5; fill: none; }
    .arrow-bi    { stroke: #f59e0b; stroke-width: 1.6; fill: none; }
    .title       { font: 600 15px ui-sans-serif, system-ui, sans-serif; fill: #18181b; }

    .stage { opacity: 0; animation: in 0.5s cubic-bezier(0.4,0,0.2,1) forwards; }
    .s1 { animation-delay: 0.2s; }
    .s2 { animation-delay: 0.7s; }
    .s3 { animation-delay: 1.2s; }
    .s4 { animation-delay: 1.7s; }
    .s5 { animation-delay: 2.2s; }
    .s6 { animation-delay: 2.7s; }
    .s7 { animation-delay: 3.2s; }
    @keyframes in { from { opacity: 0; } to { opacity: 1; } }
    .loop-group { animation: loop 16s infinite 3.7s; }
    @keyframes loop { 0%,90%,100% { opacity: 1 } 92%,98% { opacity: 0.2 } }
  ]]></style>

  <text class="title" x="400" y="28" text-anchor="middle">TOYGUN işlevsel sinyal zinciri</text>

  <g class="loop-group">
    <g class="stage s1" transform="translate(280, 55)">
      <rect class="frame-dis" x="0" y="0" width="240" height="50" rx="8"/>
      <text class="label-main" x="120" y="22" text-anchor="middle">Hedef sahnesi</text>
      <text class="label-sub"  x="120" y="40" text-anchor="middle">IR ışıması + yansıyan lazer</text>
    </g>
    <path class="arrow stage s2" d="M 400 110 L 400 130" marker-end="url(#a1)"/>
    <text class="arrow-label stage s2" x="408" y="124">alınan IR</text>

    <g class="stage s2" transform="translate(280, 135)">
      <rect class="frame-pasif" x="0" y="0" width="240" height="50" rx="8"/>
      <text class="label-main" x="120" y="22" text-anchor="middle">Fasetli pencere</text>
      <text class="label-sub"  x="120" y="40" text-anchor="middle">düşük radar izi · MWIR geçirgen</text>
    </g>
    <path class="arrow stage s3" d="M 400 190 L 400 210" marker-end="url(#a1)"/>

    <g class="stage s3" transform="translate(155, 215)">
      <rect class="frame-aktif" x="0" y="0" width="125" height="50" rx="8"/>
      <text class="label-main" x="62.5" y="22" text-anchor="middle">Lazer birimi</text>
      <text class="label-sub"  x="62.5" y="40" text-anchor="middle">mesafe + işaretleme</text>
    </g>
    <path class="arrow-bi stage s3" d="M 280 240 L 305 240" marker-end="url(#a2)" marker-start="url(#a2)"/>

    <g class="stage s3" transform="translate(305, 215)">
      <rect class="frame-pasif" x="0" y="0" width="190" height="50" rx="8"/>
      <text class="label-main" x="95" y="22" text-anchor="middle">Gimbal + stabilizasyon</text>
      <text class="label-sub"  x="95" y="40" text-anchor="middle">2 mekanik + 2 optik eksen</text>
    </g>
    <path class="arrow stage s4" d="M 400 270 L 400 290" marker-end="url(#a1)"/>

    <g class="stage s4" transform="translate(280, 295)">
      <rect class="frame-pasif" x="0" y="0" width="240" height="50" rx="8"/>
      <text class="label-main" x="120" y="22" text-anchor="middle">MWIR algılayıcı (FPA)</text>
      <text class="label-sub"  x="120" y="40" text-anchor="middle">1280×1024 · soğutmalı · ≈77 K</text>
    </g>
    <path class="arrow stage s5" d="M 400 350 L 400 370" marker-end="url(#a1)"/>

    <g class="stage s5" transform="translate(280, 375)">
      <rect class="frame-pasif" x="0" y="0" width="240" height="50" rx="8"/>
      <text class="label-main" x="120" y="22" text-anchor="middle">Görüntü işleyici</text>
      <text class="label-sub"  x="120" y="40" text-anchor="middle">NUC · tespit · takip · ATR</text>
    </g>

    <g class="stage s6" transform="translate(560, 375)">
      <rect class="frame-dis" x="0" y="0" width="180" height="50" rx="8"/>
      <text class="label-main" x="90" y="22" text-anchor="middle">Seyrüsefer</text>
      <text class="label-sub"  x="90" y="40" text-anchor="middle">GPS + IMU</text>
    </g>
    <path class="arrow stage s6" d="M 558 400 L 522 400" marker-end="url(#a1)"/>

    <path class="arrow stage s7" d="M 400 430 L 400 445" marker-end="url(#a1)"/>
    <g class="stage s7" transform="translate(280, 425)">
      <text class="arrow-label" x="120" y="36" text-anchor="middle">↓ video · iz · koordinat → görev bilgisayarı (MIL-STD-1553B)</text>
    </g>
  </g>

  <defs>
    <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#a1a1aa"/>
    </marker>
    <marker id="a2" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
