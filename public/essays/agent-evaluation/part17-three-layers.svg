<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 860" width="100%" style="height:auto" role="img" aria-label="Three orthogonal eval layers grading one agent run, the right-answer wrong-path refund. Layer one, Outcome, checks world state deterministically: the ledger holds exactly ORD-3300 at 180 dollars, so outcome passes. Layer two, Trajectory or process, checks whether the path was good using set precision and recall, an order-aware edit distance against a golden trajectory, and step count against a budget: precision is 0.75, recall 1.0, edit distance 2, steps 5 against a budget of 3, so trajectory fails. Layer three, Component, runs unit checks on the pieces: every refund call has a positive amount and a real order id, so component passes. The same correct refund passes outcome and component but fails trajectory. Eyeballing the final answer would have shipped it; only the trajectory layer catches the wrong path.">
  <title>Three eval layers: a right-answer wrong-path run passes Outcome and Component but fails Trajectory.</title>

  <defs>
    <marker id="arrSlate" markerWidth="11" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <polygon points="0 0, 11 4.5, 0 9" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="860" fill="#f8fafc"/>

  <!-- Top-right label -->
  <text x="1170" y="30" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="11" font-weight="700" fill="#64748b" letter-spacing="0.06em">AGENTS FROM FIRST PRINCIPLES</text>
  <text x="1170" y="46" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="10" fill="#94a3b8">Part 17, grading the agent (the finale)</text>

  <!-- Title -->
  <text x="40" y="34" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Three layers grade one run: right answer, wrong path</text>
  <text x="40" y="54" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12" fill="#64748b">Eyeballing checks only the answer. Grade a run three orthogonal ways. The wrong-path run passes two layers and is caught by one.</text>

  <!-- ============= THE RUN UNDER TEST ============= -->
  <rect x="40" y="78" width="1120" height="118" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.4"/>
  <text x="62" y="104" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#0f172a" letter-spacing="0.03em">THE RUN UNDER TEST</text>
  <text x="200" y="104" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#64748b">refund (right answer, wrong path) &#183; same correct refund, two redundant searches first</text>

  <!-- golden trajectory -->
  <text x="62" y="134" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" font-weight="700" fill="#0d9488" letter-spacing="0.04em">GOLDEN</text>
  <g font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700">
    <rect x="150" y="120" width="118" height="22" rx="6" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.1"/>
    <text x="209" y="135" text-anchor="middle" fill="#047857">search_policy</text>
    <text x="278" y="135" text-anchor="middle" fill="#94a3b8">&#8594;</text>
    <rect x="290" y="120" width="128" height="22" rx="6" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.1"/>
    <text x="354" y="135" text-anchor="middle" fill="#047857">process_refund</text>
    <text x="428" y="135" text-anchor="middle" fill="#94a3b8">&#8594;</text>
    <rect x="440" y="120" width="66" height="22" rx="6" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.1"/>
    <text x="473" y="135" text-anchor="middle" fill="#047857">finish</text>
    <text x="520" y="135" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#94a3b8">3 steps, budget 3</text>
  </g>

  <!-- this run trajectory -->
  <text x="62" y="174" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" font-weight="700" fill="#475569" letter-spacing="0.04em">THIS RUN</text>
  <g font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700">
    <rect x="150" y="160" width="118" height="22" rx="6" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.1"/>
    <text x="209" y="175" text-anchor="middle" fill="#047857">search_policy</text>
    <text x="278" y="175" text-anchor="middle" fill="#94a3b8">&#8594;</text>
    <rect x="290" y="160" width="118" height="22" rx="6" fill="#fff1f2" stroke="#fecdd3" stroke-width="1.1"/>
    <text x="349" y="175" text-anchor="middle" fill="#9f1239">search_policy</text>
    <text x="418" y="175" text-anchor="middle" fill="#94a3b8">&#8594;</text>
    <rect x="430" y="160" width="132" height="22" rx="6" fill="#fff1f2" stroke="#fecdd3" stroke-width="1.1"/>
    <text x="496" y="175" text-anchor="middle" fill="#9f1239">search_products</text>
    <text x="572" y="175" text-anchor="middle" fill="#94a3b8">&#8594;</text>
    <rect x="584" y="160" width="128" height="22" rx="6" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.1"/>
    <text x="648" y="175" text-anchor="middle" fill="#047857">process_refund</text>
    <text x="722" y="175" text-anchor="middle" fill="#94a3b8">&#8594;</text>
    <rect x="734" y="160" width="66" height="22" rx="6" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.1"/>
    <text x="767" y="175" text-anchor="middle" fill="#047857">finish</text>
    <text x="814" y="175" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#9f1239">5 steps, over budget</text>
  </g>

  <!-- ============= THE THREE STACKED LAYERS ============= -->
  <!-- LAYER 1: OUTCOME (PASS) -->
  <rect x="40" y="224" width="1120" height="170" rx="12" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.8"/>
  <rect x="40" y="224" width="8" height="170" rx="4" fill="#6366f1"/>
  <circle cx="78" cy="256" r="8" fill="#6366f1"/>
  <text x="98" y="252" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#4f46e5">Layer 1 &#183; OUTCOME</text>
  <text x="98" y="270" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#64748b">Did the world end up correct? Deterministic, against world STATE, not text. (tau2-style)</text>
  <!-- verdict pill -->
  <rect x="1000" y="240" width="140" height="34" rx="9" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.4"/>
  <text x="1070" y="262" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700" fill="#047857">PASS</text>
  <!-- evidence -->
  <rect x="98" y="290" width="500" height="86" rx="9" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.2"/>
  <text x="116" y="312" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" font-weight="700" fill="#4f46e5" letter-spacing="0.04em">CHECK: state == expected_state</text>
  <text x="116" y="334" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="11" fill="#334155">ledger == {'ORD-3300': 180.0}</text>
  <text x="116" y="356" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10.5" fill="#047857">The ledger holds exactly the authorized refund. Correct.</text>
  <text x="650" y="320" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#64748b">The strongest outcome check is world STATE plus</text>
  <text x="650" y="338" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#64748b">POLICY, not "the text said done". A contaminated</text>
  <text x="650" y="356" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#64748b">suite or reward hacking can still pass the letter.</text>

  <!-- LAYER 2: TRAJECTORY (FAIL) -->
  <rect x="40" y="410" width="1120" height="222" rx="12" fill="#ffffff" stroke="#fecdd3" stroke-width="2.2"/>
  <rect x="40" y="410" width="8" height="222" rx="4" fill="#14b8a6"/>
  <circle cx="78" cy="442" r="8" fill="#14b8a6"/>
  <text x="98" y="438" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#0d9488">Layer 2 &#183; TRAJECTORY / process</text>
  <text x="98" y="456" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#64748b">Was the PATH good? Set precision/recall, order-aware edit distance vs the golden path, steps vs budget.</text>
  <!-- verdict pill -->
  <rect x="1000" y="426" width="140" height="34" rx="9" fill="#fff1f2" stroke="#fecdd3" stroke-width="1.4"/>
  <text x="1070" y="448" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700" fill="#9f1239">FAIL</text>

  <!-- four metric chips -->
  <g font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace">
    <!-- precision (bad) -->
    <rect x="98" y="478" width="248" height="62" rx="9" fill="#fff1f2" stroke="#fecdd3" stroke-width="1.3"/>
    <text x="114" y="500" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" font-weight="700" fill="#9f1239" letter-spacing="0.04em">PRECISION</text>
    <text x="114" y="528" font-size="20" font-weight="700" fill="#9f1239">0.75</text>
    <text x="200" y="528" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#9f1239">extra tool in the set</text>
    <!-- recall (ok) -->
    <rect x="360" y="478" width="248" height="62" rx="9" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.3"/>
    <text x="376" y="500" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" font-weight="700" fill="#047857" letter-spacing="0.04em">RECALL</text>
    <text x="376" y="528" font-size="20" font-weight="700" fill="#047857">1.0</text>
    <text x="450" y="528" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#047857">every golden tool hit</text>
    <!-- edit distance (bad) -->
    <rect x="622" y="478" width="248" height="62" rx="9" fill="#fff1f2" stroke="#fecdd3" stroke-width="1.3"/>
    <text x="638" y="500" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" font-weight="700" fill="#9f1239" letter-spacing="0.04em">EDIT DISTANCE</text>
    <text x="638" y="528" font-size="20" font-weight="700" fill="#9f1239">2</text>
    <text x="690" y="528" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#9f1239">order-aware vs golden</text>
    <!-- steps (bad) -->
    <rect x="884" y="478" width="256" height="62" rx="9" fill="#fff1f2" stroke="#fecdd3" stroke-width="1.3"/>
    <text x="900" y="500" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" font-weight="700" fill="#9f1239" letter-spacing="0.04em">STEPS / BUDGET</text>
    <text x="900" y="528" font-size="20" font-weight="700" fill="#9f1239">5 / 3</text>
    <text x="980" y="528" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#9f1239">over the step budget</text>
  </g>

  <!-- the catch banner -->
  <rect x="98" y="556" width="1042" height="58" rx="9" fill="#fff7f8" stroke="#fecdd3" stroke-width="1.3"/>
  <rect x="98" y="556" width="5" height="58" rx="2.5" fill="#f43f5e"/>
  <text x="118" y="580" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11.5" font-weight="700" fill="#9f1239">This is the layer that catches the run.</text>
  <text x="118" y="600" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#9f1239">A pass requires precision == 1.0 AND recall == 1.0 AND edit == 0 AND steps within budget. The wrong path breaks three of four.</text>

  <!-- LAYER 3: COMPONENT (PASS) -->
  <rect x="40" y="648" width="1120" height="120" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.6"/>
  <rect x="40" y="648" width="8" height="120" rx="4" fill="#64748b"/>
  <circle cx="78" cy="680" r="8" fill="#64748b"/>
  <text x="98" y="676" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#475569">Layer 3 &#183; COMPONENT</text>
  <text x="98" y="694" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#64748b">Unit checks on the pieces. Each refund call must have a positive numeric amount and a real order id.</text>
  <!-- verdict pill -->
  <rect x="1000" y="664" width="140" height="34" rx="9" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.4"/>
  <text x="1070" y="686" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700" fill="#047857">PASS</text>
  <!-- evidence -->
  <rect x="98" y="712" width="660" height="40" rx="8" fill="#fcfcfd" stroke="#e2e8f0" stroke-width="1.1"/>
  <text x="116" y="737" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#334155">amount &gt; 0 (180.0)  &#183;  order_id startswith "ORD-" (ORD-3300)  -&gt; ok</text>

  <!-- ============= VERDICT STRIP ============= -->
  <rect x="40" y="784" width="1120" height="56" rx="11" fill="#fffbeb" stroke="#fde68a" stroke-width="1.6"/>
  <rect x="40" y="784" width="6" height="56" rx="3" fill="#f59e0b"/>
  <text x="66" y="808" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12.5" font-weight="700" fill="#b45309">Outcome PASS, Component PASS, Trajectory FAIL.</text>
  <text x="66" y="826" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#92400e">Same correct refund, wrong path. Eyeballing the final answer ships it; the three-layer eval does not. The layers are orthogonal on purpose.</text>

  <!-- legend -->
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#64748b">
    <rect x="760" y="800" width="11" height="11" rx="2" fill="#6366f1"/>
    <text x="776" y="809">outcome</text>
    <rect x="850" y="800" width="11" height="11" rx="2" fill="#14b8a6"/>
    <text x="866" y="809">trajectory</text>
    <rect x="950" y="800" width="11" height="11" rx="2" fill="#10b981"/>
    <text x="966" y="809">pass</text>
    <rect x="1020" y="800" width="11" height="11" rx="2" fill="#f43f5e"/>
    <text x="1036" y="809">fail</text>
  </g>

</svg>
