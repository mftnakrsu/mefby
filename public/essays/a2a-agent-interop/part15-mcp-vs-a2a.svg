<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="100%" style="height:auto" role="img" aria-label="Two protocols, one transport: MCP versus A2A. On the left, MCP is VERTICAL: a single agent reaches DOWN to its tools. The agent box sits at the top; below it three tool boxes (search_policy, process_refund, file resource) are reached over JSON-RPC using the methods initialize, tools/list, and tools/call. The relationship is owner-to-capability inside one trust domain. On the right, A2A is HORIZONTAL: an agent reaches ACROSS an organization boundary to a peer agent. The support agent on the left side talks across a dashed boundary line to the billing-agent peer on the right, over JSON-RPC using the methods agent/getCard and tasks/send, which runs a task lifecycle of submitted then working then completed. The two diagrams share a single label at the bottom: both ride JSON-RPC; A2A adds discovery via Agent Cards and a trust boundary between peers. MCP is agent to tools, vertical; A2A is agent to agent, horizontal; same plumbing, opposite direction.">
  <title>MCP is vertical (agent to tools); A2A is horizontal (agent to agent). Same JSON-RPC transport, opposite direction.</title>

  <defs>
    <marker id="arrIndigo" markerWidth="12" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0 0, 12 5, 0 10" fill="#6366f1"/>
    </marker>
    <marker id="arrIndigoUp" markerWidth="12" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0 0, 12 5, 0 10" fill="#818cf8"/>
    </marker>
    <marker id="arrTeal" markerWidth="11" markerHeight="9" refX="9" refY="4.5" orient="auto">
      <polygon points="0 0, 11 4.5, 0 9" fill="#14b8a6"/>
    </marker>
    <marker id="arrTealBack" markerWidth="11" markerHeight="9" refX="9" refY="4.5" orient="auto">
      <polygon points="0 0, 11 4.5, 0 9" fill="#5eead4"/>
    </marker>
    <marker id="arrSlate" markerWidth="11" markerHeight="9" refX="9" refY="4.5" orient="auto">
      <polygon points="0 0, 11 4.5, 0 9" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="720" fill="#f8fafc"/>

  <!-- Top-right label -->
  <text x="1170" y="30" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="11" font-weight="700" fill="#64748b" letter-spacing="0.06em">AGENTS FROM FIRST PRINCIPLES</text>
  <text x="1170" y="46" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="10" fill="#94a3b8">Part 15, agent to agent (A2A)</text>

  <!-- Title -->
  <text x="40" y="34" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Two protocols, one transport: MCP is vertical, A2A is horizontal</text>
  <text x="40" y="54" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12" fill="#64748b">MCP reaches DOWN to tools; A2A reaches ACROSS to a peer agent. Same JSON-RPC plumbing, opposite direction.</text>

  <!-- ============================ LEFT: MCP (VERTICAL) ============================ -->
  <rect x="40" y="80" width="540" height="560" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.6"/>
  <text x="64" y="112" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#4f46e5" letter-spacing="0.03em">MCP &#183; VERTICAL</text>
  <text x="64" y="130" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#64748b">An agent reaches DOWN to its tools (Part 12). One trust domain.</text>

  <!-- the agent (top) -->
  <rect x="180" y="150" width="260" height="64" rx="11" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.8"/>
  <rect x="180" y="150" width="6" height="64" rx="3" fill="#4f46e5"/>
  <text x="310" y="178" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700" fill="#4f46e5">AGENT (host)</text>
  <text x="310" y="197" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#3730a3">discovers + calls its own tools</text>

  <!-- vertical method label running down -->
  <rect x="466" y="232" width="96" height="232" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="514" y="252" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" fill="#4f46e5">JSON-RPC</text>
  <line x1="476" y1="262" x2="552" y2="262" stroke="#e2e8f0" stroke-width="1"/>
  <text x="514" y="288" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9.5" fill="#475569">initialize</text>
  <text x="514" y="312" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9.5" fill="#475569">tools/list</text>
  <text x="514" y="336" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9.5" fill="#475569">tools/call</text>
  <line x1="476" y1="352" x2="552" y2="352" stroke="#e2e8f0" stroke-width="1"/>
  <text x="514" y="378" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="8.5" fill="#64748b">methods point</text>
  <text x="514" y="392" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="8.5" fill="#64748b">at capabilities,</text>
  <text x="514" y="406" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="8.5" fill="#64748b">not at a peer.</text>
  <text x="514" y="436" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" font-weight="700" fill="#0f766e">no org</text>
  <text x="514" y="450" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" font-weight="700" fill="#0f766e">boundary</text>

  <!-- vertical arrow agent -> tools (down) -->
  <line x1="240" y1="214" x2="240" y2="276" stroke="#6366f1" stroke-width="2.4" marker-end="url(#arrIndigo)"/>
  <text x="222" y="248" text-anchor="end" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="8.5" fill="#4f46e5">call</text>
  <!-- vertical arrow tools -> agent (up, results) -->
  <line x1="380" y1="276" x2="380" y2="214" stroke="#818cf8" stroke-width="2.0" marker-end="url(#arrIndigoUp)" stroke-dasharray="4 3"/>
  <text x="398" y="248" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="8.5" fill="#6366f1">result</text>

  <!-- tools row (bottom) -->
  <rect x="64" y="284" width="124" height="120" rx="10" fill="#fcfcfd" stroke="#c7d2fe" stroke-width="1.4"/>
  <circle cx="84" cy="308" r="4.5" fill="#6366f1"/>
  <text x="96" y="312" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9.5" font-weight="700" fill="#4f46e5">tool</text>
  <text x="80" y="338" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9" fill="#475569">search_policy</text>
  <text x="80" y="356" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="8.5" fill="#64748b">read-only</text>
  <text x="80" y="386" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="8.5" fill="#64748b">owned by host</text>

  <rect x="198" y="284" width="124" height="120" rx="10" fill="#fcfcfd" stroke="#c7d2fe" stroke-width="1.4"/>
  <circle cx="218" cy="308" r="4.5" fill="#6366f1"/>
  <text x="230" y="312" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9.5" font-weight="700" fill="#4f46e5">tool</text>
  <text x="214" y="338" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9" fill="#475569">process_refund</text>
  <text x="214" y="356" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="8.5" fill="#64748b">side-effecting</text>
  <text x="214" y="386" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="8.5" fill="#64748b">owned by host</text>

  <rect x="332" y="284" width="124" height="120" rx="10" fill="#fcfcfd" stroke="#99f6e4" stroke-width="1.4"/>
  <circle cx="352" cy="308" r="4.5" fill="#14b8a6"/>
  <text x="364" y="312" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9.5" font-weight="700" fill="#0d9488">resource</text>
  <text x="348" y="338" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9" fill="#475569">refund.md</text>
  <text x="348" y="356" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="8.5" fill="#64748b">file context</text>
  <text x="348" y="386" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="8.5" fill="#64748b">owned by host</text>

  <!-- direction strip -->
  <rect x="64" y="430" width="392" height="44" rx="9" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.2"/>
  <text x="84" y="451" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="700" fill="#4f46e5">Direction: DOWN</text>
  <text x="84" y="466" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">agent &#8594; tools. The action space is the host's own capabilities.</text>

  <!-- ============================ RIGHT: A2A (HORIZONTAL) ============================ -->
  <rect x="620" y="80" width="540" height="560" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.6"/>
  <text x="644" y="112" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#0d9488" letter-spacing="0.03em">A2A &#183; HORIZONTAL</text>
  <text x="644" y="130" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#64748b">An agent reaches ACROSS a boundary to a peer agent (this part).</text>

  <!-- org boundary (dashed vertical) -->
  <line x1="890" y1="156" x2="890" y2="556" stroke="#94a3b8" stroke-width="1.8" stroke-dasharray="6 5"/>
  <rect x="852" y="150" width="76" height="20" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="890" y="164" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="8.5" font-weight="700" fill="#475569">ORG BOUNDARY</text>

  <!-- support agent (left of boundary) -->
  <rect x="648" y="208" width="216" height="76" rx="11" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.8"/>
  <rect x="648" y="208" width="6" height="76" rx="3" fill="#4f46e5"/>
  <text x="756" y="236" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" fill="#4f46e5">support agent</text>
  <text x="756" y="255" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#3730a3">the A2A client</text>
  <text x="756" y="270" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#3730a3">your team, your host</text>

  <!-- billing-agent peer (right of boundary) -->
  <rect x="916" y="208" width="216" height="76" rx="11" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.8"/>
  <rect x="916" y="208" width="6" height="76" rx="3" fill="#0d9488"/>
  <text x="1024" y="236" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" fill="#0d9488">billing-agent</text>
  <text x="1024" y="255" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#0f766e">a peer agent</text>
  <text x="1024" y="270" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#0f766e">another team, another host</text>

  <!-- horizontal arrows across boundary -->
  <line x1="864" y1="232" x2="912" y2="232" stroke="#14b8a6" stroke-width="2.4" marker-end="url(#arrTeal)"/>
  <line x1="916" y1="262" x2="868" y2="262" stroke="#5eead4" stroke-width="2.0" marker-end="url(#arrTealBack)" stroke-dasharray="4 3"/>

  <!-- method strip (horizontal) -->
  <rect x="648" y="306" width="484" height="92" rx="9" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="668" y="328" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" fill="#0d9488">JSON-RPC (same transport as MCP)</text>
  <rect x="668" y="338" width="216" height="22" rx="6" fill="#ffffff" stroke="#99f6e4" stroke-width="1.1"/>
  <text x="680" y="353" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9.5" fill="#0d9488">agent/getCard &#8594; discover</text>
  <rect x="896" y="338" width="216" height="22" rx="6" fill="#ffffff" stroke="#99f6e4" stroke-width="1.1"/>
  <text x="908" y="353" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9.5" fill="#0d9488">tasks/send &#8594; delegate</text>
  <text x="668" y="384" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#475569">Discovery via an Agent Card, then a delegated task. Trust is a separate decision (allowlist).</text>

  <!-- task lifecycle strip -->
  <text x="648" y="426" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="700" fill="#0d9488">task lifecycle (returned by tasks/send)</text>
  <rect x="648" y="436" width="150" height="38" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.3"/>
  <text x="723" y="460" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#475569">submitted</text>
  <line x1="800" y1="455" x2="822" y2="455" stroke="#14b8a6" stroke-width="2.2" marker-end="url(#arrTeal)"/>
  <rect x="826" y="436" width="150" height="38" rx="8" fill="#ffffff" stroke="#fbbf24" stroke-width="1.3"/>
  <text x="901" y="460" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#b45309">working</text>
  <line x1="978" y1="455" x2="1000" y2="455" stroke="#14b8a6" stroke-width="2.2" marker-end="url(#arrTeal)"/>
  <rect x="1004" y="436" width="128" height="38" rx="8" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.3"/>
  <text x="1068" y="460" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#047857">completed</text>

  <!-- direction strip -->
  <rect x="648" y="490" width="484" height="44" rx="9" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.2"/>
  <text x="668" y="511" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="700" fill="#0d9488">Direction: ACROSS</text>
  <text x="668" y="526" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">agent &#8594; agent. The peer is its own actor across an org boundary, so trust is explicit.</text>

  <!-- ====================== bottom takeaway ====================== -->
  <rect x="40" y="660" width="1120" height="44" rx="9" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.1"/>
  <text x="60" y="681" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10.5" fill="#4f46e5">Both ride JSON-RPC. MCP (initialize / tools-list / tools-call) is agent &#8594; TOOLS, vertical. A2A (agent-card / tasks-send + a task lifecycle) is agent &#8594; AGENT, horizontal.</text>
  <text x="60" y="697" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10.5" fill="#4f46e5">Same plumbing, opposite direction; A2A adds discovery via Agent Cards and a trust boundary between peers.</text>

  <!-- legend -->
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#64748b">
    <rect x="950" y="92" width="11" height="11" rx="2" fill="#6366f1"/>
    <text x="966" y="101">agent / host</text>
    <rect x="1064" y="92" width="11" height="11" rx="2" fill="#14b8a6"/>
    <text x="1080" y="101">peer agent</text>
  </g>

</svg>
