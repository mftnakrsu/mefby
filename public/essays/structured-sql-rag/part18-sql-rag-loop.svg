<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 560" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="p18-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <marker id="p18-arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#14b8a6"/>
    </marker>
    <marker id="p18-arr-emerald" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1080" height="560" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="42" font-size="20" font-weight="700" fill="#0f172a">Structured RAG: retrieve the schema, not passages</text>
  <text x="40" y="64" font-size="13" fill="#64748b">A numeric question is answered by SQL run against a database, not by reading a chunk. Four stages, left to right.</text>

  <!-- ===================================================================== -->
  <!-- STAGE 0: question                                                     -->
  <!-- ===================================================================== -->
  <rect x="40" y="232" width="150" height="78" rx="14" fill="#eef2ff" stroke="#6366f1"/>
  <text x="115" y="262" font-size="13" font-weight="700" fill="#4f46e5" text-anchor="middle">Question</text>
  <text x="115" y="282" font-size="9.5" fill="#6366f1" text-anchor="middle">"total revenue</text>
  <text x="115" y="296" font-size="9.5" fill="#6366f1" text-anchor="middle">from shipped orders?"</text>

  <line x1="190" y1="271" x2="226" y2="271" stroke="#64748b" stroke-width="1.8" marker-end="url(#p18-arr)"/>

  <!-- ===================================================================== -->
  <!-- STAGE 1: retrieve schema subset                                       -->
  <!-- ===================================================================== -->
  <g transform="translate(230,148)">
    <rect width="208" height="248" rx="14" fill="#f0fdfa" stroke="#5eead4"/>
    <rect width="208" height="6" rx="3" fill="#14b8a6"/>
    <text x="16" y="32" font-size="12" font-weight="700" letter-spacing="0.04em" fill="#0f766e">1 &#183; RETRIEVE SCHEMA</text>
    <text x="16" y="50" font-size="9.5" fill="#0f766e">Score schema cards, keep the relevant few.</text>

    <!-- the full catalog (faded) -->
    <text x="16" y="74" font-size="9" font-weight="700" letter-spacing="0.04em" fill="#94a3b8">CATALOG (too big for the prompt)</text>
    <g font-size="9" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">
      <rect x="16" y="82" width="55" height="20" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="43" y="96" fill="#cbd5e1" text-anchor="middle">customers</text>
      <rect x="75" y="82" width="48" height="20" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="99" y="96" fill="#cbd5e1" text-anchor="middle">invoices</text>
      <rect x="127" y="82" width="40" height="20" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="147" y="96" fill="#cbd5e1" text-anchor="middle">tickets</text>
      <rect x="16" y="106" width="36" height="20" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="34" y="120" fill="#cbd5e1" text-anchor="middle">...</text>
    </g>

    <!-- the retrieved subset (highlighted) -->
    <text x="16" y="152" font-size="9" font-weight="700" letter-spacing="0.04em" fill="#0f766e">RETRIEVED SUBSET (top-2)</text>
    <g font-size="9" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">
      <rect x="16" y="160" width="176" height="34" rx="8" fill="#ccfbf1" stroke="#14b8a6"/>
      <text x="24" y="174" fill="#0f766e">orders(id, product_id,</text>
      <text x="24" y="186" fill="#0f766e">  quantity, status, date)</text>
      <rect x="16" y="200" width="176" height="34" rx="8" fill="#ccfbf1" stroke="#14b8a6"/>
      <text x="24" y="214" fill="#0f766e">products(id, name,</text>
      <text x="24" y="226" fill="#0f766e">  category, price)</text>
    </g>
  </g>

  <line x1="438" y1="271" x2="474" y2="271" stroke="#14b8a6" stroke-width="1.8" marker-end="url(#p18-arr-teal)"/>

  <!-- ===================================================================== -->
  <!-- STAGE 2: generate SQL                                                  -->
  <!-- ===================================================================== -->
  <g transform="translate(478,188)">
    <rect width="214" height="168" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect width="214" height="6" rx="3" fill="#6366f1"/>
    <text x="16" y="32" font-size="12" font-weight="700" letter-spacing="0.04em" fill="#4f46e5">2 &#183; GENERATE SQL</text>
    <text x="16" y="50" font-size="9.5" fill="#475569">Schema + glossary + few-shot</text>
    <text x="16" y="63" font-size="9.5" fill="#475569">exemplars in, one query out.</text>

    <rect x="16" y="74" width="182" height="80" rx="8" fill="#0f172a"/>
    <g font-size="9" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" fill="#e2e8f0">
      <text x="26" y="92"><tspan fill="#5eead4">SELECT</tspan> SUM(p.price</text>
      <text x="26" y="105">  * o.quantity)</text>
      <text x="26" y="118"><tspan fill="#5eead4">FROM</tspan> orders o <tspan fill="#5eead4">JOIN</tspan></text>
      <text x="26" y="131">  products p <tspan fill="#5eead4">ON</tspan> ...</text>
      <text x="26" y="144"><tspan fill="#5eead4">WHERE</tspan> status=<tspan fill="#fcd34d">'shipped'</tspan></text>
    </g>
  </g>

  <line x1="585" y1="356" x2="585" y2="392" stroke="#6366f1" stroke-width="1.8" marker-end="url(#p18-arr)"/>

  <!-- ===================================================================== -->
  <!-- STAGE 3: execute                                                       -->
  <!-- ===================================================================== -->
  <g transform="translate(478,396)">
    <rect width="214" height="92" rx="14" fill="#f1f5f9" stroke="#cbd5e1"/>
    <rect width="214" height="6" rx="3" fill="#64748b"/>
    <text x="16" y="32" font-size="12" font-weight="700" letter-spacing="0.04em" fill="#334155">3 &#183; EXECUTE</text>
    <text x="16" y="52" font-size="10" fill="#475569">Run the SQL against the live</text>
    <text x="16" y="66" font-size="10" fill="#475569">database. The result is exact,</text>
    <text x="16" y="80" font-size="10" fill="#475569">computed, never hallucinated.</text>
  </g>

  <!-- database cylinder -->
  <g transform="translate(360,400)">
    <ellipse cx="40" cy="14" rx="40" ry="12" fill="#e2e8f0" stroke="#94a3b8"/>
    <path d="M0,14 V70 a40,12 0 0 0 80,0 V14" fill="#f1f5f9" stroke="#94a3b8"/>
    <ellipse cx="40" cy="14" rx="40" ry="12" fill="#f8fafc" stroke="#94a3b8"/>
    <text x="40" y="52" font-size="10" font-weight="700" fill="#475569" text-anchor="middle">DB</text>
    <text x="40" y="66" font-size="8" fill="#94a3b8" text-anchor="middle">rows</text>
  </g>
  <line x1="478" y1="442" x2="446" y2="442" stroke="#64748b" stroke-width="1.6" marker-end="url(#p18-arr)"/>

  <line x1="692" y1="442" x2="760" y2="442" stroke="#10b981" stroke-width="1.8" marker-end="url(#p18-arr-emerald)"/>

  <!-- ===================================================================== -->
  <!-- STAGE 4: answer                                                        -->
  <!-- ===================================================================== -->
  <g transform="translate(764,188)">
    <rect width="276" height="300" rx="14" fill="#ecfdf5" stroke="#6ee7b7"/>
    <rect width="276" height="6" rx="3" fill="#10b981"/>
    <text x="18" y="32" font-size="12" font-weight="700" letter-spacing="0.04em" fill="#047857">4 &#183; ANSWER FROM THE RESULT</text>

    <rect x="18" y="48" width="240" height="44" rx="8" fill="#ffffff" stroke="#6ee7b7"/>
    <text x="30" y="66" font-size="10" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" fill="#475569">result rows:</text>
    <text x="30" y="82" font-size="11" font-weight="700" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" fill="#047857">[(436.0,)]</text>

    <line x1="138" y1="98" x2="138" y2="118" stroke="#10b981" stroke-width="1.6" marker-end="url(#p18-arr-emerald)"/>

    <rect x="18" y="122" width="240" height="46" rx="8" fill="#ffffff" stroke="#6ee7b7"/>
    <text x="138" y="142" font-size="11" font-weight="700" fill="#065f46" text-anchor="middle">"Total revenue from shipped</text>
    <text x="138" y="158" font-size="11" font-weight="700" fill="#065f46" text-anchor="middle">orders was 436.0."</text>

    <text x="18" y="194" font-size="9.5" font-weight="700" letter-spacing="0.04em" fill="#047857">WHY NOT JUST RETRIEVE A PASSAGE?</text>
    <text x="18" y="212" font-size="10" fill="#334155">No passage holds this number.</text>
    <text x="18" y="226" font-size="10" fill="#334155">It must be computed over rows.</text>
    <text x="18" y="240" font-size="10" fill="#334155">Dense retrieval finds text that</text>
    <text x="18" y="254" font-size="10" fill="#334155">looks similar; it cannot SUM.</text>
    <text x="18" y="278" font-size="9.5" font-style="italic" fill="#047857">The DB does the arithmetic, exactly.</text>
  </g>

  <!-- ===================================================================== -->
  <!-- bottom note                                                           -->
  <!-- ===================================================================== -->
  <rect x="40" y="508" width="1000" height="40" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <g transform="translate(70,528)">
    <circle cx="0" cy="0" r="11" fill="#ecfdf5" stroke="#10b981" stroke-width="1.6"/>
    <path d="M-5,0 L-1,4 L6,-5" fill="none" stroke="#047857" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="92" y="525" font-size="12" font-weight="700" fill="#047857">The schema is retrieved; the answer is executed.</text>
  <text x="92" y="540" font-size="11" fill="#334155">Enterprise schemas are far too large to paste whole, so you retrieve the relevant tables, then let SQL compute the exact answer.</text>
</svg>
