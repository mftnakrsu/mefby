<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="p14cr-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <marker id="p14cr-arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b"/>
    </marker>
    <marker id="p14cr-arr-violet" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b5cf6"/>
    </marker>
    <marker id="p14cr-arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#14b8a6"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1080" height="600" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="42" font-size="20" font-weight="700" fill="#0f172a">Contextual Retrieval: prepend a situating sentence before embedding</text>
  <text x="40" y="64" font-size="13" fill="#64748b">At index time an LLM writes one sentence that re-anchors the chunk in its document, then the chunk is embedded with it attached.</text>

  <!-- ===================== INPUTS (left) ===================== -->
  <!-- whole document -->
  <rect x="40" y="108" width="250" height="118" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="58" y="134" font-size="10.5" font-weight="700" letter-spacing="0.05em" fill="#64748b">THE WHOLE DOCUMENT</text>
  <text x="58" y="158" font-size="11" fill="#334155">Alice and Acme's refund note</text>
  <text x="58" y="176" font-size="10.5" fill="#64748b">&#167; Alice founded Acme in 2019.</text>
  <text x="58" y="192" font-size="10.5" fill="#64748b">&#167; She set the refund window.</text>
  <text x="58" y="208" font-size="10.5" fill="#64748b">&#167; Returns, error codes.</text>

  <!-- the bare chunk -->
  <rect x="40" y="246" width="250" height="86" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="58" y="272" font-size="10.5" font-weight="700" letter-spacing="0.05em" fill="#64748b">ONE BARE CHUNK</text>
  <text x="58" y="294" font-size="11" fill="#334155">"She set the refund window</text>
  <text x="58" y="310" font-size="11" fill="#334155">at 30 days."</text>
  <text x="58" y="326" font-size="9.5" fill="#94a3b8">"She" is who? Unclear alone.</text>

  <!-- arrows from doc + chunk into the LLM -->
  <line x1="290" y1="167" x2="356" y2="200" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#p14cr-arr)"/>
  <line x1="290" y1="289" x2="356" y2="246" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#p14cr-arr)"/>

  <!-- ===================== LLM situating step (center) ===================== -->
  <rect x="358" y="184" width="180" height="76" rx="14" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="448" y="212" font-size="13" font-weight="700" fill="#4f46e5" text-anchor="middle">LLM</text>
  <text x="448" y="231" font-size="10" fill="#6366f1" text-anchor="middle">"In one sentence, situate</text>
  <text x="448" y="245" font-size="10" fill="#6366f1" text-anchor="middle">this chunk in the document."</text>
  <text x="448" y="278" font-size="9.5" fill="#64748b" text-anchor="middle">one extra call per chunk, at index time</text>
  <text x="448" y="292" font-size="9.5" fill="#64748b" text-anchor="middle">(prompt caching reuses the doc)</text>

  <!-- generated situating sentence -->
  <line x1="538" y1="222" x2="604" y2="222" stroke="#f59e0b" stroke-width="1.8" marker-end="url(#p14cr-arr-amber)"/>
  <rect x="606" y="184" width="290" height="76" rx="14" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="624" y="210" font-size="10.5" font-weight="700" letter-spacing="0.05em" fill="#b45309">GENERATED SITUATING SENTENCE</text>
  <text x="624" y="232" font-size="11" fill="#92400e">"This chunk is from a note about</text>
  <text x="624" y="248" font-size="11" fill="#92400e">Alice and Acme's refund policy."</text>

  <!-- ===================== prepend (combine) ===================== -->
  <text x="40" y="384" font-size="10.5" font-weight="700" letter-spacing="0.05em" fill="#64748b">PREPEND, THEN EMBED THE COMBINED TEXT</text>

  <!-- situating sentence chip flowing down -->
  <path d="M751,260 V356" fill="none" stroke="#f59e0b" stroke-width="1.8" marker-end="url(#p14cr-arr-amber)"/>
  <!-- bare chunk chip flowing down/right -->
  <path d="M165,332 V356" fill="none" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#p14cr-arr)"/>

  <!-- combined block: amber prefix + grey chunk -->
  <g transform="translate(40,396)">
    <rect width="724" height="46" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <!-- amber prepended segment -->
    <rect width="372" height="46" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <rect x="362" width="10" height="46" fill="#fffbeb"/>
    <text x="16" y="22" font-size="10.5" fill="#92400e" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">This chunk is from a note about Alice</text>
    <text x="16" y="38" font-size="10.5" fill="#92400e" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">and Acme's refund policy.</text>
    <text x="388" y="22" font-size="10.5" fill="#334155" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">She set the refund window</text>
    <text x="388" y="38" font-size="10.5" fill="#334155" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">at 30 days.</text>
    <text x="186" y="-8" font-size="9" font-weight="700" letter-spacing="0.04em" fill="#b45309" text-anchor="middle">SITUATING PREFIX</text>
    <text x="548" y="-8" font-size="9" font-weight="700" letter-spacing="0.04em" fill="#64748b" text-anchor="middle">ORIGINAL CHUNK</text>
  </g>

  <!-- arrow into embedder -->
  <line x1="766" y1="419" x2="832" y2="419" stroke="#8b5cf6" stroke-width="1.8" marker-end="url(#p14cr-arr-violet)"/>
  <rect x="834" y="396" width="120" height="46" rx="10" fill="#f5f3ff" stroke="#8b5cf6"/>
  <text x="894" y="416" font-size="11" font-weight="700" fill="#6d28d9" text-anchor="middle">embedder</text>
  <text x="894" y="431" font-size="9" fill="#7c3aed" text-anchor="middle">unchanged</text>

  <!-- final vector -->
  <line x1="894" y1="442" x2="894" y2="476" stroke="#14b8a6" stroke-width="1.8" marker-end="url(#p14cr-arr-teal)"/>
  <rect x="780" y="476" width="228" height="44" rx="10" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="894" y="496" font-size="10.5" font-weight="700" fill="#0f766e" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">contextual chunk vector</text>
  <text x="894" y="512" font-size="9.5" fill="#0f766e" text-anchor="middle">now matches "Alice's refund window?"</text>

  <!-- footnote contrasting with late chunking -->
  <text x="40" y="494" font-size="11.5" fill="#475569">Model-agnostic: the embedder never changes. The context lives in the text you feed it, not in the architecture.</text>
  <text x="40" y="514" font-size="11.5" fill="#475569">Compare late chunking, which changes <tspan font-style="italic">where</tspan> you pool, not <tspan font-style="italic">what</tspan> you embed.</text>
</svg>
