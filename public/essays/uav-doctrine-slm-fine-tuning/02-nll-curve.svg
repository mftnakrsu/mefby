<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="t d">
  <title id="t">Validation NLL over Phase A training</title>
  <desc id="d">Line chart showing validation negative-log-likelihood descending from 2.2539 at step 50 to 1.4706 at step 994 across 994 SFT steps and 2 epochs of LoRA training on gpt-oss-20b.</desc>

  <style><![CDATA[
    .axis { stroke: #e4e4e7; stroke-width: 1; }
    .tick { font: 400 10px ui-monospace, monospace; fill: #a1a1aa; }
    .tlabel { font: 500 11px ui-sans-serif, system-ui, sans-serif; fill: #71717a; }
    .title { font: 600 14px ui-sans-serif, system-ui, sans-serif; fill: #52525b; }
    .subtitle { font: 400 12px ui-sans-serif, system-ui, sans-serif; fill: #a1a1aa; }
    .grid { stroke: #f4f4f5; stroke-width: 1; stroke-dasharray: 3 3; }
    .line { fill: none; stroke: #10b981; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
            stroke-dasharray: 1200; stroke-dashoffset: 1200; animation: draw 4s cubic-bezier(0.4,0,0.2,1) forwards, idle 12s infinite 4s; }
    .pt { fill: #ffffff; stroke: #10b981; stroke-width: 1.5; opacity: 0; animation: dot 0.3s ease forwards; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes idle { 0%,90%,100% { stroke-dashoffset: 0; opacity: 1 } 92%,98% { opacity: 0.3 } }
    @keyframes dot  { to { opacity: 1; } }
    .epoch-mark { fill: none; stroke: #e4e4e7; stroke-width: 1; stroke-dasharray: 4 4; }
    .epoch-label { font: 500 10px ui-monospace, monospace; fill: #a1a1aa; }
  ]]></style>

  <text class="title" x="400" y="34" text-anchor="middle">Validation NLL — v4 training (994 steps, 2 epochs)</text>
  <text class="subtitle" x="400" y="54" text-anchor="middle">2.2539 → 1.4706 · Δ 0.7833 nats</text>

  <g transform="translate(80, 80)">
    <line class="axis" x1="0" y1="0" x2="0" y2="280"/>
    <line class="axis" x1="0" y1="280" x2="660" y2="280"/>

    <line class="grid" x1="0" y1="0" x2="660" y2="0"/>
    <line class="grid" x1="0" y1="70" x2="660" y2="70"/>
    <line class="grid" x1="0" y1="140" x2="660" y2="140"/>
    <line class="grid" x1="0" y1="210" x2="660" y2="210"/>

    <text class="tick" x="-8" y="4" text-anchor="end">2.3</text>
    <text class="tick" x="-8" y="74" text-anchor="end">2.1</text>
    <text class="tick" x="-8" y="144" text-anchor="end">1.9</text>
    <text class="tick" x="-8" y="214" text-anchor="end">1.7</text>
    <text class="tick" x="-8" y="284" text-anchor="end">1.5</text>

    <text class="tick" x="0"   y="298" text-anchor="middle">0</text>
    <text class="tick" x="165" y="298" text-anchor="middle">250</text>
    <text class="tick" x="330" y="298" text-anchor="middle">500</text>
    <text class="tick" x="495" y="298" text-anchor="middle">750</text>
    <text class="tick" x="660" y="298" text-anchor="middle">994</text>

    <line class="epoch-mark" x1="330" y1="0" x2="330" y2="280"/>
    <text class="epoch-label" x="335" y="14">epoch 1 / 2</text>

    <text class="tlabel" x="330" y="324" text-anchor="middle">training step</text>
    <text class="tlabel" x="-50" y="140" text-anchor="middle" transform="rotate(-90 -50 140)">val NLL</text>

    <path class="line" d="
      M 33,17.86
      L 66,68.85
      L 99,94.50
      L 132,120.13
      L 165,135.95
      L 198,151.28
      L 231,164.69
      L 264,166.75
      L 297,178.23
      L 330,190.04
      L 363,212.30
      L 396,229.58
      L 429,245.79
      L 462,258.36
      L 495,266.78
      L 528,276.51
      L 561,282.95
      L 594,288.27
      L 627,291.55
      L 660,293.79
    "/>

    <circle class="pt" cx="33"  cy="17.86" r="3" style="animation-delay:0.5s"/>
    <circle class="pt" cx="165" cy="135.95" r="3" style="animation-delay:1.5s"/>
    <circle class="pt" cx="330" cy="190.04" r="3" style="animation-delay:2.5s"/>
    <circle class="pt" cx="495" cy="266.78" r="3" style="animation-delay:3.5s"/>
    <circle class="pt" cx="660" cy="293.79" r="3" style="animation-delay:4s"/>

    <text x="660" y="284" text-anchor="end" fill="#047857" style="font: 600 12px ui-monospace, monospace">1.4706</text>
  </g>

  <text x="400" y="425" text-anchor="middle" class="subtitle">994 steps · 3.98M tokens · 1h07m wall · $1.59 (placeholder)</text>
</svg>
