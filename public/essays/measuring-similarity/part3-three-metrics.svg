<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 430" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="tm-violet" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1,1 L9,5 L1,9" fill="none" stroke="#8b5cf6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
    <marker id="tm-cyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1,1 L9,5 L1,9" fill="none" stroke="#06b6d4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1080" height="430" fill="#ffffff" />

  <!-- Title -->
  <text x="30" y="38" font-size="19" font-weight="700" fill="#0f172a">What each metric sees</text>
  <text x="30" y="58" font-size="13" fill="#64748b">The same two vectors, A = [3, 4] and B = [4, 3], read three ways</text>

  <!-- ============ PANEL 1: Euclidean ============ -->
  <g transform="translate(18,0)">
    <rect x="8" y="70" width="320" height="330" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="28" y="98" font-size="12" font-weight="700" fill="#475569" letter-spacing="0.06em">1 &#183; EUCLIDEAN DISTANCE</text>
    <!-- axes from origin (66,348) -->
    <line x1="66" y1="348" x2="66" y2="120" stroke="#e2e8f0" stroke-width="1.2"/>
    <line x1="66" y1="348" x2="300" y2="348" stroke="#e2e8f0" stroke-width="1.2"/>
    <!-- vectors -->
    <line x1="66" y1="348" x2="156" y2="228" stroke="#8b5cf6" stroke-width="3" marker-end="url(#tm-violet)"/>
    <line x1="66" y1="348" x2="186" y2="258" stroke="#06b6d4" stroke-width="3" marker-end="url(#tm-cyan)"/>
    <!-- the gap between the tips -->
    <line x1="156" y1="228" x2="186" y2="258" stroke="#475569" stroke-width="2" stroke-dasharray="5 4"/>
    <circle cx="156" cy="228" r="4" fill="#8b5cf6"/><circle cx="186" cy="258" r="4" fill="#06b6d4"/>
    <text x="120" y="220" font-size="12" font-weight="700" fill="#7c3aed">A</text>
    <text x="196" y="262" font-size="12" font-weight="700" fill="#0e7490">B</text>
    <text x="150" y="300" font-size="12" font-weight="600" fill="#334155">gap between tips</text>
    <text x="150" y="318" font-size="12.5" font-weight="700" fill="#475569">&#8730;2 &#8776; 1.41</text>
  </g>

  <!-- ============ PANEL 2: Dot product ============ -->
  <g transform="translate(372,0)">
    <rect x="8" y="70" width="320" height="330" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="28" y="98" font-size="12" font-weight="700" fill="#b45309" letter-spacing="0.06em">2 &#183; DOT PRODUCT</text>
    <line x1="66" y1="348" x2="66" y2="120" stroke="#e2e8f0" stroke-width="1.2"/>
    <line x1="66" y1="348" x2="300" y2="348" stroke="#e2e8f0" stroke-width="1.2"/>
    <!-- projection shadow of B onto A (amber, thick) -->
    <line x1="66" y1="348" x2="152.4" y2="232.8" stroke="#f59e0b" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
    <!-- vectors -->
    <line x1="66" y1="348" x2="156" y2="228" stroke="#8b5cf6" stroke-width="3" marker-end="url(#tm-violet)"/>
    <line x1="66" y1="348" x2="186" y2="258" stroke="#06b6d4" stroke-width="3" marker-end="url(#tm-cyan)"/>
    <!-- perpendicular from B tip to the projection point -->
    <line x1="186" y1="258" x2="152.4" y2="232.8" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="4 4"/>
    <circle cx="152.4" cy="232.8" r="3.5" fill="#d97706"/>
    <text x="120" y="220" font-size="12" font-weight="700" fill="#7c3aed">A</text>
    <text x="196" y="262" font-size="12" font-weight="700" fill="#0e7490">B</text>
    <text x="150" y="300" font-size="12" font-weight="600" fill="#334155">projection &#215; length</text>
    <text x="150" y="318" font-size="12.5" font-weight="700" fill="#b45309">A &#183; B = 24</text>
  </g>

  <!-- ============ PANEL 3: Cosine ============ -->
  <g transform="translate(726,0)">
    <rect x="8" y="70" width="320" height="330" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="28" y="98" font-size="12" font-weight="700" fill="#4f46e5" letter-spacing="0.06em">3 &#183; COSINE SIMILARITY</text>
    <line x1="66" y1="348" x2="66" y2="120" stroke="#e2e8f0" stroke-width="1.2"/>
    <line x1="66" y1="348" x2="300" y2="348" stroke="#e2e8f0" stroke-width="1.2"/>
    <!-- angle arc between the two vectors -->
    <path d="M99.6,322.8 A42 42 0 0 1 91.2,314.4" fill="none" stroke="#6366f1" stroke-width="2.5"/>
    <!-- vectors -->
    <line x1="66" y1="348" x2="156" y2="228" stroke="#8b5cf6" stroke-width="3" marker-end="url(#tm-violet)"/>
    <line x1="66" y1="348" x2="186" y2="258" stroke="#06b6d4" stroke-width="3" marker-end="url(#tm-cyan)"/>
    <text x="120" y="220" font-size="12" font-weight="700" fill="#7c3aed">A</text>
    <text x="196" y="262" font-size="12" font-weight="700" fill="#0e7490">B</text>
    <text x="112" y="306" font-size="12" font-weight="700" fill="#4f46e5">&#952;</text>
    <text x="150" y="300" font-size="12" font-weight="600" fill="#334155">the angle between them</text>
    <text x="150" y="318" font-size="12.5" font-weight="700" fill="#4f46e5">cos &#952; = 0.96</text>
  </g>
</svg>
