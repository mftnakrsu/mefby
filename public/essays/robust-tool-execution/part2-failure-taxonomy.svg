<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="100%" style="height:auto" role="img" aria-label="The failure taxonomy: a tool call flows into a classify gate that branches into five categories. Transient failures are retried with bounded backoff; permanent, empty-result, malformed, and unknown-tool failures are fed back to the model as an Observation. An inset shows the idempotency guard on the side-effecting branch, where a retry hits the guard and skips re-acting.">
  <title>The Failure Taxonomy: classify, then retry only transients</title>

  <defs>
    <marker id="arrGray" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#64748b"/>
    </marker>
    <marker id="arrAmber" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#f59e0b"/>
    </marker>
    <marker id="arrRose" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#f43f5e"/>
    </marker>
    <marker id="arrEmerald" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#10b981"/>
    </marker>
    <marker id="arrIndigo" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="720" fill="#ffffff"/>
  <rect width="1200" height="720" fill="#f8fafc"/>

  <!-- Top-right label -->
  <text x="1170" y="30" text-anchor="end"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" font-weight="700" fill="#64748b" letter-spacing="0.06em">AGENTS FROM FIRST PRINCIPLES</text>
  <text x="1170" y="46" text-anchor="end"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="10" fill="#94a3b8">Part 2, the failure taxonomy</text>

  <!-- ═══════════ TOOL CALL (teal) ═══════════ -->
  <rect x="40" y="100" width="220" height="80" rx="14" fill="#ffffff" stroke="#14b8a6" stroke-width="2"/>
  <rect x="40" y="100" width="220" height="30" rx="14" fill="#14b8a6"/>
  <rect x="40" y="116" width="220" height="14" fill="#14b8a6"/>
  <text x="150" y="120" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="12" font-weight="700" fill="#ffffff" letter-spacing="0.03em">a tool call</text>
  <text x="150" y="152" text-anchor="middle"
    font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace"
    font-size="12" fill="#0f172a">execute_tool(name, args)</text>
  <text x="150" y="170" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="10.5" fill="#64748b">schema-valid, but it can still go wrong</text>

  <!-- arrow call -> classify -->
  <line x1="260" y1="140" x2="320" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#arrGray)"/>

  <!-- ═══════════ CLASSIFY GATE (indigo) ═══════════ -->
  <path d="M 330 140 L 415 96 L 500 140 L 415 184 Z" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="415" y="136" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="13" font-weight="700" fill="#4f46e5">classify()</text>
  <text x="415" y="153" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="10" fill="#6366f1">which kind</text>
  <text x="415" y="166" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="10" fill="#6366f1">of failure?</text>

  <!-- fan-out hub from classify right edge -->
  <line x1="500" y1="140" x2="560" y2="140" stroke="#64748b" stroke-width="2"/>
  <circle cx="560" cy="140" r="4" fill="#64748b"/>

  <!-- five branch connectors from hub (x=560,y=140) to each category card left edge (x=620) -->
  <!-- transient (top) -->
  <path d="M 560 140 C 590 140, 590 80, 620 80" fill="none" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrAmber)"/>
  <!-- permanent -->
  <path d="M 560 140 C 590 140, 590 168, 620 168" fill="none" stroke="#f43f5e" stroke-width="2" marker-end="url(#arrRose)"/>
  <!-- empty-result -->
  <path d="M 560 140 C 590 140, 590 256, 620 256" fill="none" stroke="#f43f5e" stroke-width="2" marker-end="url(#arrRose)"/>
  <!-- malformed -->
  <path d="M 560 140 C 590 140, 590 344, 620 344" fill="none" stroke="#f43f5e" stroke-width="2" marker-end="url(#arrRose)"/>
  <!-- unknown-tool -->
  <path d="M 560 140 C 590 140, 590 432, 620 432" fill="none" stroke="#f43f5e" stroke-width="2" marker-end="url(#arrRose)"/>

  <!-- ═══════════ FIVE CATEGORY CARDS ═══════════ -->
  <!-- 1. TRANSIENT (amber) -->
  <rect x="620" y="52" width="300" height="56" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <rect x="620" y="52" width="8" height="56" rx="4" fill="#f59e0b"/>
  <text x="642" y="78"
    font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace"
    font-size="13" font-weight="700" fill="#b45309">transient</text>
  <text x="642" y="96"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="10.5" fill="#92400e">temporary; might succeed if tried again</text>

  <!-- 2. PERMANENT (rose) -->
  <rect x="620" y="140" width="300" height="56" rx="12" fill="#fff1f2" stroke="#f43f5e" stroke-width="2"/>
  <rect x="620" y="140" width="8" height="56" rx="4" fill="#f43f5e"/>
  <text x="642" y="166"
    font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace"
    font-size="13" font-weight="700" fill="#9f1239">permanent</text>
  <text x="642" y="184"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="10.5" fill="#9f1239">will never succeed; a retry only wastes</text>

  <!-- 3. EMPTY-RESULT (rose) -->
  <rect x="620" y="228" width="300" height="56" rx="12" fill="#fff1f2" stroke="#f43f5e" stroke-width="2"/>
  <rect x="620" y="228" width="8" height="56" rx="4" fill="#f43f5e"/>
  <text x="642" y="254"
    font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace"
    font-size="13" font-weight="700" fill="#9f1239">empty-result</text>
  <text x="642" y="272"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="10.5" fill="#9f1239">the call worked but found nothing useful</text>

  <!-- 4. MALFORMED (rose) -->
  <rect x="620" y="316" width="300" height="56" rx="12" fill="#fff1f2" stroke="#f43f5e" stroke-width="2"/>
  <rect x="620" y="316" width="8" height="56" rx="4" fill="#f43f5e"/>
  <text x="642" y="342"
    font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace"
    font-size="13" font-weight="700" fill="#9f1239">malformed</text>
  <text x="642" y="360"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="10.5" fill="#9f1239">arguments fail the schema (Part 1)</text>

  <!-- 5. UNKNOWN-TOOL (rose) -->
  <rect x="620" y="404" width="300" height="56" rx="12" fill="#fff1f2" stroke="#f43f5e" stroke-width="2"/>
  <rect x="620" y="404" width="8" height="56" rx="4" fill="#f43f5e"/>
  <text x="642" y="430"
    font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace"
    font-size="13" font-weight="700" fill="#9f1239">unknown-tool</text>
  <text x="642" y="448"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="10.5" fill="#9f1239">not in the action space (Part 1)</text>

  <!-- ═══════════ RECOVERY POLICY COLUMN ═══════════ -->
  <!-- transient -> RETRY (amber) -->
  <line x1="920" y1="80" x2="978" y2="80" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrAmber)"/>
  <rect x="980" y="56" width="180" height="48" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="1070" y="78" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="12.5" font-weight="700" fill="#b45309">RETRY</text>
  <text x="1070" y="94" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="10" fill="#92400e">bounded + exponential backoff</text>

  <!-- the four rose categories collapse to one FEED BACK box -->
  <!-- connectors from each rose card right edge to the feed-back box left edge (x=980, y=300) -->
  <path d="M 920 168 C 950 168, 950 290, 978 290" fill="none" stroke="#f43f5e" stroke-width="1.6" marker-end="url(#arrRose)"/>
  <path d="M 920 256 C 950 256, 950 296, 978 296" fill="none" stroke="#f43f5e" stroke-width="1.6" marker-end="url(#arrRose)"/>
  <path d="M 920 344 C 950 344, 950 304, 978 304" fill="none" stroke="#f43f5e" stroke-width="1.6" marker-end="url(#arrRose)"/>
  <path d="M 920 432 C 950 432, 950 310, 978 310" fill="none" stroke="#f43f5e" stroke-width="1.6" marker-end="url(#arrRose)"/>

  <rect x="980" y="262" width="180" height="76" rx="10" fill="#fff1f2" stroke="#f43f5e" stroke-width="2"/>
  <text x="1070" y="288" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="12.5" font-weight="700" fill="#9f1239">FEED BACK</text>
  <text x="1070" y="306" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="10" fill="#9f1239">as an Observation the</text>
  <text x="1070" y="320" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="10" fill="#9f1239">controller reads, not a crash</text>

  <!-- transient: after retries exhausted, also feeds back (amber dashed down to FEED BACK) -->
  <path d="M 1070 104 C 1070 150, 1190 150, 1190 300 C 1190 340, 1162 340, 1162 320" fill="none" stroke="#f59e0b" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrAmber)"/>
  <text x="1196" y="200" text-anchor="start"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="9.5" fill="#b45309" transform="rotate(90 1196 200)">if retries exhausted, give up gracefully and feed back</text>

  <!-- note: retries ONLY for transient -->
  <rect x="980" y="120" width="180" height="40" rx="9" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="1070" y="138" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="9.5" font-weight="600" fill="#475569">retries apply ONLY to</text>
  <text x="1070" y="151" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="9.5" font-weight="600" fill="#475569">the transient branch</text>

  <!-- ═══════════ IDEMPOTENCY GUARD INSET (side-effecting branch) ═══════════ -->
  <rect x="40" y="500" width="1120" height="156" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="40" y="500" width="1120" height="34" rx="14" fill="#f1f5f9"/>
  <rect x="40" y="518" width="1120" height="16" fill="#f1f5f9"/>
  <text x="64" y="522"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="12" font-weight="700" fill="#0f172a" letter-spacing="0.02em">INSET: the side-effecting branch needs more than a retry</text>
  <text x="1136" y="522" text-anchor="end"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="10.5" fill="#64748b">a refund that posts then times out must not be re-acted by a blind retry</text>

  <!-- retry node -->
  <rect x="70" y="560" width="150" height="64" rx="11" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="145" y="588" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="12" font-weight="700" fill="#b45309">transient retry</text>
  <text x="145" y="606" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="10" fill="#92400e">re-invoke process_refund</text>

  <line x1="220" y1="592" x2="288" y2="592" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrAmber)"/>

  <!-- guard gate (diamond, indigo) -->
  <path d="M 300 592 L 372 552 L 444 592 L 372 632 Z" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="372" y="588" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11.5" font-weight="700" fill="#4f46e5">guard:</text>
  <text x="372" y="603" text-anchor="middle"
    font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace"
    font-size="9.5" fill="#6366f1">order_id seen?</text>

  <!-- YES branch -> skip re-act (emerald) -->
  <line x1="444" y1="592" x2="520" y2="592" stroke="#10b981" stroke-width="2" marker-end="url(#arrEmerald)"/>
  <text x="482" y="584" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="10" font-weight="700" fill="#059669">YES</text>
  <rect x="522" y="560" width="220" height="64" rx="11" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="632" y="586" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="12" font-weight="700" fill="#064e3b">skip re-acting</text>
  <text x="632" y="604" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="10" fill="#047857">return the recorded result; exactly once</text>

  <!-- NO branch -> act (down) -->
  <line x1="372" y1="632" x2="372" y2="616" stroke="#64748b" stroke-width="0"/>
  <path d="M 372 632 L 372 644" fill="none" stroke="#64748b" stroke-width="0"/>

  <!-- ledger comparison (right side of inset) -->
  <rect x="780" y="552" width="170" height="36" rx="9" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="800" y="574"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" fill="#064e3b">guarded ledger: <tspan font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-weight="700">$80.00</tspan></text>

  <rect x="780" y="596" width="170" height="36" rx="9" fill="#fff1f2" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="800" y="618"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11" fill="#9f1239">no-guard ledger: <tspan font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-weight="700">$160.00</tspan></text>

  <text x="970" y="574"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="10.5" fill="#047857">exactly once</text>
  <text x="970" y="618"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="10.5" fill="#9f1239">double refund</text>

  <!-- ═══════════ BOTTOM CAPTION ═══════════ -->
  <rect x="40" y="676" width="1120" height="34" rx="9" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="600" y="698" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="11.5" fill="#475569">Classify every failure, retry only the transient kind with bounded backoff, and feed everything else back as an Observation, never a crash.</text>

</svg>
