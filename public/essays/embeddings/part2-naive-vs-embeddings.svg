<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 600" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="e2arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1,1 L9,5 L1,9" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
    <marker id="e2cyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1,1 L9,5 L1,9" fill="none" stroke="#06b6d4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>

  <!-- Canvas -->
  <rect x="0" y="0" width="1060" height="600" fill="#ffffff" />

  <!-- Title -->
  <text x="40" y="44" font-size="20" font-weight="700" fill="#0f172a">One-hot / bag-of-words vs. embeddings</text>
  <text x="40" y="66" font-size="13" fill="#64748b">Same words, two ways to turn them into numbers</text>

  <!-- Vertical divider -->
  <line x1="530" y1="92" x2="530" y2="572" stroke="#e2e8f0" stroke-width="1" />

  <!-- ============ LEFT: one-hot / bag-of-words ============ -->
  <text x="64" y="112" font-size="16" font-weight="700" fill="#0f172a">One-hot / bag-of-words</text>
  <text x="64" y="132" font-size="12.5" fill="#64748b">long, sparse, no sense of similarity</text>

  <!-- ===== Column: king (indigo, hot row 1) ===== -->
  <!-- cells -->
  <g>
    <rect x="70" y="170" width="60" height="16" rx="2" fill="#f8fafc" stroke="#e2e8f0" /><text x="100" y="182" font-size="9" fill="#cbd5e1" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">0</text>
    <rect x="70" y="188" width="60" height="16" rx="2" fill="#6366f1" stroke="#4f46e5" /><text x="100" y="200" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">1</text>
    <rect x="70" y="206" width="60" height="16" rx="2" fill="#f8fafc" stroke="#e2e8f0" /><text x="100" y="218" font-size="9" fill="#cbd5e1" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">0</text>
    <rect x="70" y="224" width="60" height="16" rx="2" fill="#f8fafc" stroke="#e2e8f0" /><text x="100" y="236" font-size="9" fill="#cbd5e1" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">0</text>
    <rect x="70" y="242" width="60" height="16" rx="2" fill="#f8fafc" stroke="#e2e8f0" /><text x="100" y="254" font-size="9" fill="#cbd5e1" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">0</text>
    <rect x="70" y="260" width="60" height="16" rx="2" fill="#f8fafc" stroke="#e2e8f0" /><text x="100" y="272" font-size="9" fill="#cbd5e1" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">0</text>
    <rect x="70" y="278" width="60" height="16" rx="2" fill="#f8fafc" stroke="#e2e8f0" /><text x="100" y="290" font-size="9" fill="#cbd5e1" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">0</text>
    <rect x="70" y="296" width="60" height="16" rx="2" fill="#f8fafc" stroke="#e2e8f0" /><text x="100" y="308" font-size="9" fill="#cbd5e1" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">0</text>
    <rect x="70" y="314" width="60" height="16" rx="2" fill="#f8fafc" stroke="#e2e8f0" /><text x="100" y="326" font-size="9" fill="#cbd5e1" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">0</text>
  </g>
  <text x="100" y="350" font-size="16" fill="#94a3b8" text-anchor="middle">&#8942;</text>
  <text x="100" y="382" font-size="13" font-weight="700" fill="#4f46e5" text-anchor="middle">king</text>
  <text x="100" y="398" font-size="10" fill="#94a3b8" text-anchor="middle">~100k dims</text>

  <!-- ===== Column: queen (violet, hot row 5) ===== -->
  <g>
    <rect x="220" y="170" width="60" height="16" rx="2" fill="#f8fafc" stroke="#e2e8f0" /><text x="250" y="182" font-size="9" fill="#cbd5e1" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">0</text>
    <rect x="220" y="188" width="60" height="16" rx="2" fill="#f8fafc" stroke="#e2e8f0" /><text x="250" y="200" font-size="9" fill="#cbd5e1" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">0</text>
    <rect x="220" y="206" width="60" height="16" rx="2" fill="#f8fafc" stroke="#e2e8f0" /><text x="250" y="218" font-size="9" fill="#cbd5e1" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">0</text>
    <rect x="220" y="224" width="60" height="16" rx="2" fill="#f8fafc" stroke="#e2e8f0" /><text x="250" y="236" font-size="9" fill="#cbd5e1" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">0</text>
    <rect x="220" y="242" width="60" height="16" rx="2" fill="#f8fafc" stroke="#e2e8f0" /><text x="250" y="254" font-size="9" fill="#cbd5e1" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">0</text>
    <rect x="220" y="260" width="60" height="16" rx="2" fill="#8b5cf6" stroke="#7c3aed" /><text x="250" y="272" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">1</text>
    <rect x="220" y="278" width="60" height="16" rx="2" fill="#f8fafc" stroke="#e2e8f0" /><text x="250" y="290" font-size="9" fill="#cbd5e1" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">0</text>
    <rect x="220" y="296" width="60" height="16" rx="2" fill="#f8fafc" stroke="#e2e8f0" /><text x="250" y="308" font-size="9" fill="#cbd5e1" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">0</text>
    <rect x="220" y="314" width="60" height="16" rx="2" fill="#f8fafc" stroke="#e2e8f0" /><text x="250" y="326" font-size="9" fill="#cbd5e1" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">0</text>
  </g>
  <text x="250" y="350" font-size="16" fill="#94a3b8" text-anchor="middle">&#8942;</text>
  <text x="250" y="382" font-size="13" font-weight="700" fill="#7c3aed" text-anchor="middle">queen</text>
  <text x="250" y="398" font-size="10" fill="#94a3b8" text-anchor="middle">~100k dims</text>

  <!-- ===== Column: banana (amber, hot row 7) ===== -->
  <g>
    <rect x="370" y="170" width="60" height="16" rx="2" fill="#f8fafc" stroke="#e2e8f0" /><text x="400" y="182" font-size="9" fill="#cbd5e1" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">0</text>
    <rect x="370" y="188" width="60" height="16" rx="2" fill="#f8fafc" stroke="#e2e8f0" /><text x="400" y="200" font-size="9" fill="#cbd5e1" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">0</text>
    <rect x="370" y="206" width="60" height="16" rx="2" fill="#f8fafc" stroke="#e2e8f0" /><text x="400" y="218" font-size="9" fill="#cbd5e1" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">0</text>
    <rect x="370" y="224" width="60" height="16" rx="2" fill="#f8fafc" stroke="#e2e8f0" /><text x="400" y="236" font-size="9" fill="#cbd5e1" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">0</text>
    <rect x="370" y="242" width="60" height="16" rx="2" fill="#f8fafc" stroke="#e2e8f0" /><text x="400" y="254" font-size="9" fill="#cbd5e1" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">0</text>
    <rect x="370" y="260" width="60" height="16" rx="2" fill="#f8fafc" stroke="#e2e8f0" /><text x="400" y="272" font-size="9" fill="#cbd5e1" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">0</text>
    <rect x="370" y="278" width="60" height="16" rx="2" fill="#f8fafc" stroke="#e2e8f0" /><text x="400" y="290" font-size="9" fill="#cbd5e1" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">0</text>
    <rect x="370" y="296" width="60" height="16" rx="2" fill="#f59e0b" stroke="#d97706" /><text x="400" y="308" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">1</text>
    <rect x="370" y="314" width="60" height="16" rx="2" fill="#f8fafc" stroke="#e2e8f0" /><text x="400" y="326" font-size="9" fill="#cbd5e1" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">0</text>
  </g>
  <text x="400" y="350" font-size="16" fill="#94a3b8" text-anchor="middle">&#8942;</text>
  <text x="400" y="382" font-size="13" font-weight="700" fill="#b45309" text-anchor="middle">banana</text>
  <text x="400" y="398" font-size="10" fill="#94a3b8" text-anchor="middle">~100k dims</text>

  <!-- takeaway note (left) -->
  <rect x="64" y="430" width="402" height="86" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
  <rect x="64" y="430" width="6" height="86" rx="3" fill="#f43f5e" />
  <text x="86" y="456" font-size="12.5" fill="#334155">Mostly zeros, one lonely 1. Each word sits in its own slot,</text>
  <text x="86" y="476" font-size="12.5" fill="#334155">touching nothing else, so</text>
  <text x="86" y="500" font-size="13" font-weight="700" fill="#e11d48">king &#8596; queen is exactly as far as king &#8596; banana.</text>

  <!-- ============ RIGHT: embeddings (dense) ============ -->
  <text x="596" y="112" font-size="16" font-weight="700" fill="#0f172a">Embeddings (dense)</text>
  <text x="596" y="132" font-size="12.5" fill="#64748b">short and dense; meaning becomes position</text>

  <!-- dense vector rows -->
  <!-- king -->
  <rect x="596" y="152" width="62" height="22" rx="8" fill="#eef2ff" stroke="#c7d2fe" /><text x="627" y="167" font-size="11" font-weight="700" fill="#4f46e5" text-anchor="middle">king</text>
  <text x="670" y="168" font-size="12.5" fill="#334155" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">[0.82, 0.41, -0.10, 0.27, &#8230;]</text>
  <!-- queen -->
  <rect x="596" y="184" width="62" height="22" rx="8" fill="#f5f3ff" stroke="#ddd6fe" /><text x="627" y="199" font-size="11" font-weight="700" fill="#7c3aed" text-anchor="middle">queen</text>
  <text x="670" y="200" font-size="12.5" fill="#334155" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">[0.79, 0.46, -0.06, 0.22, &#8230;]</text>
  <!-- prince -->
  <rect x="596" y="216" width="62" height="22" rx="8" fill="#eef2ff" stroke="#c7d2fe" /><text x="627" y="231" font-size="11" font-weight="700" fill="#4f46e5" text-anchor="middle">prince</text>
  <text x="670" y="232" font-size="12.5" fill="#334155" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">[0.80, 0.39, -0.14, 0.31, &#8230;]</text>
  <!-- banana -->
  <rect x="596" y="248" width="62" height="22" rx="8" fill="#fffbeb" stroke="#fde68a" /><text x="627" y="263" font-size="11" font-weight="700" fill="#b45309" text-anchor="middle">banana</text>
  <text x="670" y="264" font-size="12.5" fill="#334155" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">[-0.55, 0.12, 0.88, -0.40, &#8230;]</text>

  <text x="596" y="292" font-size="11" fill="#94a3b8">just a few hundred numbers, every one meaningful</text>

  <!-- mini meaning-space plot -->
  <rect x="596" y="306" width="400" height="250" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
  <text x="614" y="330" font-size="11" font-weight="700" fill="#64748b" letter-spacing="0.4">MEANING-SPACE (flattened to 2D)</text>
  <!-- faint axes -->
  <line x1="624" y1="350" x2="624" y2="536" stroke="#e2e8f0" stroke-width="1" />
  <line x1="624" y1="536" x2="970" y2="536" stroke="#e2e8f0" stroke-width="1" />

  <!-- royalty cluster -->
  <ellipse cx="712" cy="392" rx="56" ry="48" fill="#eef2ff" fill-opacity="0.6" stroke="#a5b4fc" stroke-width="1.4" stroke-dasharray="5 4" />
  <text x="712" y="352" font-size="11" font-weight="700" fill="#4f46e5" text-anchor="middle">royalty</text>
  <!-- king -->
  <circle cx="700" cy="382" r="6" fill="#6366f1" />
  <text x="690" y="378" font-size="11.5" font-weight="600" fill="#0f172a" text-anchor="end">king</text>
  <!-- queen -->
  <circle cx="736" cy="398" r="6" fill="#8b5cf6" />
  <text x="748" y="402" font-size="11.5" font-weight="600" fill="#0f172a">queen</text>
  <!-- prince -->
  <circle cx="698" cy="412" r="6" fill="#818cf8" />
  <text x="690" y="430" font-size="11.5" font-weight="600" fill="#0f172a" text-anchor="middle">prince</text>

  <!-- close double-arrow king<->queen -->
  <line x1="709" y1="386" x2="727" y2="394" stroke="#06b6d4" stroke-width="1.6" marker-start="url(#e2cyan)" marker-end="url(#e2cyan)" />
  <text x="742" y="372" font-size="11" font-weight="700" fill="#0e7490">close</text>

  <!-- banana far -->
  <circle cx="912" cy="500" r="6" fill="#f59e0b" />
  <text x="912" y="522" font-size="11.5" font-weight="600" fill="#0f172a" text-anchor="middle">banana</text>

  <!-- far dashed line cluster->banana -->
  <line x1="760" y1="420" x2="892" y2="492" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="6 5" />
  <text x="826" y="446" font-size="11" font-weight="700" fill="#64748b" transform="rotate(28 826 446)">far</text>
</svg>
