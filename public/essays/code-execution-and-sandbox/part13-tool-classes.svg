<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="100%" style="height:auto" role="img" aria-label="The tool-class spectrum, rising in power and in blast radius. Three classes are shown left to right. First, TYPED JSON TOOLS from Parts 1 to 12: narrow keyhole functions like search_policy and process_refund, called with validated JSON arguments; read-only or a single fixed side effect; small blast radius. Second, CODE EXECUTION: the agent writes and runs code such as round(sum(orders) divided by len(orders), 2) giving 173.33; it can compute anything no fixed tool covers, but it can also run __import__ os system rm report.txt; medium to large blast radius. Third, COMPUTER-USE: the agent acts on a surface, the filesystem and browser, with read_file, write_file, delete_file, and http_get; it can read secrets.txt and POST the API key to evil.com; largest blast radius. A rising arrow underneath is labeled power grows and danger grows together. The conclusion is that capability and danger arrive together, which is why code and computer-use must run behind a sandbox or permission boundary.">
  <title>The tool-class spectrum: typed JSON tools to code execution to computer-use, power and danger rising together</title>

  <defs>
    <marker id="arrSlate" markerWidth="13" markerHeight="11" refX="10" refY="5.5" orient="auto">
      <polygon points="0 0, 13 5.5, 0 11" fill="#475569"/>
    </marker>
    <linearGradient id="powerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="0.5" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#f43f5e"/>
    </linearGradient>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="720" fill="#f8fafc"/>

  <!-- Top-right label -->
  <text x="1170" y="30" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="11" font-weight="700" fill="#64748b" letter-spacing="0.06em">AGENTS FROM FIRST PRINCIPLES</text>
  <text x="1170" y="46" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="10" fill="#94a3b8">Part 13, code execution and the sandbox</text>

  <!-- Title -->
  <text x="40" y="34" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="18" font-weight="700" fill="#0f172a">The tool-class spectrum: more power means more blast radius</text>
  <text x="40" y="54" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12" fill="#64748b">From a narrow typed function to write-and-run code to acting on a surface. Each step widens what the agent can do, and what it can break.</text>

  <!-- ====================== COLUMN 1: TYPED JSON TOOLS ====================== -->
  <rect x="48" y="92" width="352" height="468" rx="13" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.8"/>
  <rect x="48" y="92" width="352" height="6" rx="3" fill="#14b8a6"/>
  <text x="72" y="128" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#0d9488">TYPED JSON TOOLS</text>
  <text x="72" y="147" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9.5" fill="#0f766e">Parts 1 to 12  &#183;  the narrow keyhole</text>

  <rect x="72" y="162" width="304" height="22" rx="6" fill="#ffffff" stroke="#99f6e4" stroke-width="1.1"/>
  <text x="84" y="177" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#0f766e">A fixed function, called with validated JSON</text>

  <!-- examples -->
  <rect x="72" y="196" width="304" height="96" rx="9" fill="#ffffff" stroke="#99f6e4" stroke-width="1.2"/>
  <text x="86" y="215" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" fill="#0d9488">examples</text>
  <text x="86" y="233" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10" fill="#334155">search_policy({"query": ...})</text>
  <text x="86" y="251" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10" fill="#334155">process_refund({"order_id",</text>
  <text x="86" y="265" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="10" fill="#334155">                "amount"})</text>
  <text x="86" y="283" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#64748b">each argument schema-checked before the call</text>

  <!-- what it can do -->
  <rect x="72" y="304" width="304" height="84" rx="9" fill="#f7fffd" stroke="#99f6e4" stroke-width="1.1"/>
  <text x="86" y="323" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" font-weight="700" fill="#0d9488">what it can do</text>
  <text x="86" y="341" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">Only the one operation the author wrote.</text>
  <text x="86" y="356" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">Read-only, or a single fixed side effect</text>
  <text x="86" y="371" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">that the developer chose in advance.</text>

  <!-- blast radius -->
  <rect x="72" y="400" width="304" height="138" rx="9" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.3"/>
  <text x="86" y="419" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" font-weight="700" fill="#047857">blast radius</text>
  <text x="86" y="438" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#047857">SMALL</text>
  <!-- small dot -->
  <circle cx="300" cy="434" r="13" fill="#10b981" opacity="0.30"/>
  <circle cx="300" cy="434" r="6" fill="#10b981"/>
  <text x="86" y="462" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">The action space is fixed at author time.</text>
  <text x="86" y="477" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">The worst case is bounded by the set of</text>
  <text x="86" y="492" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">tools you handed it. No arbitrary code,</text>
  <text x="86" y="507" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">no filesystem, no network of its own.</text>
  <text x="86" y="528" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" fill="#047857">danger: low</text>

  <!-- ====================== COLUMN 2: CODE EXECUTION ====================== -->
  <rect x="424" y="92" width="352" height="468" rx="13" fill="#fffbeb" stroke="#fde68a" stroke-width="1.8"/>
  <rect x="424" y="92" width="352" height="6" rx="3" fill="#f59e0b"/>
  <text x="448" y="128" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#b45309">CODE EXECUTION</text>
  <text x="448" y="147" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9.5" fill="#92400e">write and run code  &#183;  the new modality</text>

  <rect x="448" y="162" width="304" height="22" rx="6" fill="#ffffff" stroke="#fde68a" stroke-width="1.1"/>
  <text x="460" y="177" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#92400e">The agent emits code; a runtime executes it</text>

  <!-- legit example -->
  <rect x="448" y="196" width="304" height="58" rx="9" fill="#ffffff" stroke="#a7f3d0" stroke-width="1.3"/>
  <text x="462" y="214" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="8.5" font-weight="700" fill="#047857">legit</text>
  <text x="462" y="231" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9.5" fill="#334155">round(sum(orders) / len(orders), 2)</text>
  <text x="462" y="247" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9.5" font-weight="700" fill="#047857">-&gt; 173.33   (no fixed tool covered this)</text>

  <!-- danger example -->
  <rect x="448" y="262" width="304" height="58" rx="9" fill="#ffffff" stroke="#fecdd3" stroke-width="1.3"/>
  <text x="462" y="280" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="8.5" font-weight="700" fill="#9f1239">danger</text>
  <text x="462" y="297" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9.5" fill="#334155">__import__('os').system('rm</text>
  <text x="462" y="311" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9.5" fill="#9f1239">report.txt')  -&gt; deletes data</text>

  <!-- what it can do -->
  <rect x="448" y="332" width="304" height="56" rx="9" fill="#fffdf5" stroke="#fde68a" stroke-width="1.1"/>
  <text x="462" y="351" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" font-weight="700" fill="#b45309">what it can do</text>
  <text x="462" y="369" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">Anything the language can express, which is</text>
  <text x="462" y="383" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">everything, including import, files, network.</text>

  <!-- blast radius -->
  <rect x="448" y="400" width="304" height="138" rx="9" fill="#fff7ed" stroke="#fdba74" stroke-width="1.3"/>
  <text x="462" y="419" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" font-weight="700" fill="#b45309">blast radius</text>
  <text x="462" y="438" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#b45309">MEDIUM to LARGE</text>
  <!-- medium dot -->
  <circle cx="710" cy="434" r="22" fill="#f59e0b" opacity="0.24"/>
  <circle cx="710" cy="434" r="9" fill="#f59e0b"/>
  <text x="462" y="462" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">The keyhole is gone. Code can reach for any</text>
  <text x="462" y="477" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">import, open any file path, and call out to</text>
  <text x="462" y="492" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">the network. One bad line reads a secret</text>
  <text x="462" y="507" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">or deletes data.</text>
  <text x="462" y="528" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" fill="#b45309">danger: high without a boundary</text>

  <!-- ====================== COLUMN 3: COMPUTER-USE ====================== -->
  <rect x="800" y="92" width="352" height="468" rx="13" fill="#fff1f2" stroke="#fecdd3" stroke-width="1.8"/>
  <rect x="800" y="92" width="352" height="6" rx="3" fill="#f43f5e"/>
  <text x="824" y="128" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#9f1239">COMPUTER-USE</text>
  <text x="824" y="147" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9.5" fill="#9f1239">act on a surface  &#183;  files and browser</text>

  <rect x="824" y="162" width="304" height="22" rx="6" fill="#ffffff" stroke="#fecdd3" stroke-width="1.1"/>
  <text x="836" y="177" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#9f1239">The agent drives a real surface like a person</text>

  <!-- legit example -->
  <rect x="824" y="196" width="304" height="58" rx="9" fill="#ffffff" stroke="#a7f3d0" stroke-width="1.3"/>
  <text x="838" y="214" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="8.5" font-weight="700" fill="#047857">legit</text>
  <text x="838" y="231" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9.5" fill="#334155">read_file({"path": "report.txt"})</text>
  <text x="838" y="247" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9.5" font-weight="700" fill="#047857">-&gt; Q2 refunds summary</text>

  <!-- danger example -->
  <rect x="824" y="262" width="304" height="58" rx="9" fill="#ffffff" stroke="#fecdd3" stroke-width="1.3"/>
  <text x="838" y="280" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="8.5" font-weight="700" fill="#9f1239">danger</text>
  <text x="838" y="297" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9.5" fill="#334155">delete_file(secrets.txt) / http_get</text>
  <text x="838" y="311" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9.5" fill="#9f1239">-&gt; POST API key to evil.com</text>

  <!-- what it can do -->
  <rect x="824" y="332" width="304" height="56" rx="9" fill="#fff7f8" stroke="#fecdd3" stroke-width="1.1"/>
  <text x="838" y="351" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" font-weight="700" fill="#9f1239">what it can do</text>
  <text x="838" y="369" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">Read and write files, click, navigate, and</text>
  <text x="838" y="383" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">send requests, the full reach of a user.</text>

  <!-- blast radius -->
  <rect x="824" y="400" width="304" height="138" rx="9" fill="#fff1f2" stroke="#fda4af" stroke-width="1.4"/>
  <text x="838" y="419" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" font-weight="700" fill="#9f1239">blast radius</text>
  <text x="838" y="438" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#9f1239">LARGEST</text>
  <!-- large dot -->
  <circle cx="1086" cy="434" r="30" fill="#f43f5e" opacity="0.20"/>
  <circle cx="1086" cy="434" r="13" fill="#f43f5e"/>
  <text x="838" y="462" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">It touches the same data, files, and accounts</text>
  <text x="838" y="477" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">a person can. It can read secrets.txt and</text>
  <text x="838" y="492" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">exfiltrate the key, or delete files outright.</text>
  <text x="838" y="507" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">Real consequences, real surface.</text>
  <text x="838" y="528" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" fill="#9f1239">danger: highest without a boundary</text>

  <!-- ====================== rising power/danger arrow ====================== -->
  <rect x="48" y="588" width="1104" height="14" rx="7" fill="url(#powerGrad)" opacity="0.85"/>
  <line x1="48" y1="595" x2="1140" y2="595" stroke="#475569" stroke-width="0" />
  <line x1="60" y1="595" x2="1138" y2="595" stroke="#475569" stroke-width="2.6" marker-end="url(#arrSlate)" opacity="0"/>
  <!-- explicit rising arrow above the bar -->
  <line x1="64" y1="578" x2="1132" y2="578" stroke="#475569" stroke-width="2.6" marker-end="url(#arrSlate)"/>
  <text x="64" y="570" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#0d9488">low power, small blast radius</text>
  <text x="1132" y="570" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#9f1239">high power, large blast radius</text>
  <text x="600" y="623" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12.5" font-weight="700" fill="#334155">Power grows and danger grows together: the same capability that unlocks real work unlocks real harm.</text>

  <!-- ====================== bottom takeaway ====================== -->
  <rect x="48" y="644" width="1104" height="52" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.4"/>
  <rect x="48" y="644" width="6" height="52" rx="3" fill="#6366f1"/>
  <text x="74" y="667" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11.5" font-weight="700" fill="#4f46e5">This is why code execution and computer-use must run behind a sandbox.</text>
  <text x="74" y="684" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10.5" fill="#475569">You cannot forbid the power without losing the work, so you wrap it in a permission boundary. The next figure shows that boundary.</text>

  <!-- legend bottom-right -->
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#64748b">
    <rect x="48" y="706" width="11" height="11" rx="2" fill="#14b8a6"/>
    <text x="64" y="715">typed JSON tools</text>
    <rect x="220" y="706" width="11" height="11" rx="2" fill="#f59e0b"/>
    <text x="236" y="715">code execution</text>
    <rect x="370" y="706" width="11" height="11" rx="2" fill="#f43f5e"/>
    <text x="386" y="715">computer-use</text>
  </g>
  <text x="1152" y="715" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10.5" fill="#4f46e5">Capability and danger arrive together.</text>

</svg>
