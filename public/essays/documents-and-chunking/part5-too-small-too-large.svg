<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 470" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect x="0" y="0" width="1080" height="470" fill="#ffffff" />

  <!-- Title -->
  <text x="30" y="40" font-size="20" font-weight="700" fill="#0f172a">Too small, too large, just right</text>
  <text x="30" y="62" font-size="13" fill="#64748b">The same refund-policy passage, cut three ways. The middle one is what you want.</text>

  <!-- ===================== PANEL 1: TOO SMALL ===================== -->
  <g>
    <rect x="18" y="86" width="332" height="350" rx="14" fill="#f8fafc" stroke="#e2e8f0" />
    <rect x="18" y="86" width="6" height="350" rx="3" fill="#f43f5e" />
    <text x="44" y="116" font-size="12" font-weight="700" letter-spacing="0.06em" fill="#e11d48">1 &#183; TOO SMALL</text>

    <rect x="44" y="138" width="180" height="42" rx="8" fill="#ffffff" stroke="#fecdd3" />
    <text x="134" y="164" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">within 30 days</text>

    <text x="44" y="232" font-size="13" fill="#334155">Thirty days of what?</text>
    <text x="44" y="252" font-size="13" fill="#334155">Counting from when?</text>
    <text x="44" y="272" font-size="13" fill="#334155">Ripped from its sentence,</text>
    <text x="44" y="292" font-size="13" fill="#334155">the fragment is ambiguous,</text>
    <text x="44" y="312" font-size="13" fill="#334155">and its embedding points</text>
    <text x="44" y="332" font-size="13" fill="#334155">nowhere useful.</text>

    <text x="44" y="410" font-size="14" font-weight="700" fill="#e11d48">Context lost.</text>
  </g>

  <!-- ===================== PANEL 2: TOO LARGE ===================== -->
  <g>
    <rect x="374" y="86" width="332" height="350" rx="14" fill="#f8fafc" stroke="#e2e8f0" />
    <rect x="374" y="86" width="6" height="350" rx="3" fill="#f59e0b" />
    <text x="400" y="116" font-size="12" font-weight="700" letter-spacing="0.06em" fill="#b45309">2 &#183; TOO LARGE</text>

    <rect x="400" y="138" width="284" height="172" rx="8" fill="#ffffff" stroke="#fde68a" />
    <text x="416" y="162" font-size="11.5" fill="#475569">Refunds within 30 days of</text>
    <text x="416" y="182" font-size="11.5" fill="#475569">purchase. Shipping fees are</text>
    <text x="416" y="202" font-size="11.5" fill="#475569">non-refundable. Final sale</text>
    <text x="416" y="222" font-size="11.5" fill="#475569">items cannot be returned.</text>
    <text x="416" y="242" font-size="11.5" fill="#475569">Email support to start a</text>
    <text x="416" y="262" font-size="11.5" fill="#475569">return. Warranty lasts one</text>
    <text x="416" y="282" font-size="11.5" fill="#475569">year. Gift cards never expire.</text>

    <text x="400" y="346" font-size="13" fill="#334155">Six topics in one vector;</text>
    <text x="400" y="366" font-size="13" fill="#334155">the embedding blurs into</text>
    <text x="400" y="386" font-size="13" fill="#334155">an average that matches</text>
    <text x="400" y="406" font-size="13" fill="#334155">a refund query only weakly.</text>

    <text x="400" y="430" font-size="14" font-weight="700" fill="#b45309">Meaning blurred.</text>
  </g>

  <!-- ===================== PANEL 3: JUST RIGHT ===================== -->
  <g>
    <rect x="730" y="86" width="332" height="350" rx="14" fill="#f8fafc" stroke="#e2e8f0" />
    <rect x="730" y="86" width="6" height="350" rx="3" fill="#10b981" />
    <text x="756" y="116" font-size="12" font-weight="700" letter-spacing="0.06em" fill="#059669">3 &#183; JUST RIGHT</text>

    <rect x="756" y="138" width="284" height="92" rx="8" fill="#ffffff" stroke="#a7f3d0" />
    <text x="772" y="166" font-size="12.5" fill="#0f172a">Refunds are accepted within</text>
    <text x="772" y="188" font-size="12.5" fill="#0f172a">30 days of purchase, provided</text>
    <text x="772" y="210" font-size="12.5" fill="#0f172a">the item is unused.</text>

    <text x="756" y="270" font-size="13" fill="#334155">One complete, self-contained</text>
    <text x="756" y="290" font-size="13" fill="#334155">idea. A sharp, targeted</text>
    <text x="756" y="310" font-size="13" fill="#334155">embedding that a refund</text>
    <text x="756" y="330" font-size="13" fill="#334155">query lands right on.</text>

    <text x="756" y="410" font-size="14" font-weight="700" fill="#059669">Just right.</text>
  </g>
</svg>
