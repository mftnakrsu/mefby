<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect x="0" y="0" width="1000" height="420" fill="#ffffff" />

  <!-- Title -->
  <text x="40" y="38" font-size="19" font-weight="700" fill="#0f172a">Overlap: a sliding window that protects boundaries</text>
  <text x="40" y="60" font-size="13" fill="#64748b">Consecutive chunks share text at the seams, so an idea on a boundary survives whole.</text>

  <!-- ===================== ROW A: WITHOUT OVERLAP ===================== -->
  <text x="40" y="104" font-size="12" font-weight="700" letter-spacing="0.05em" fill="#e11d48">WITHOUT OVERLAP</text>

  <text x="70" y="140" font-size="13" fill="#334155" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace"><tspan>To start a refund, email support </tspan><tspan fill="#4f46e5" font-weight="700">within 30 days of purchase.</tspan></text>

  <!-- windows butting at a hard boundary -->
  <rect x="62" y="152" width="341" height="34" rx="8" fill="none" stroke="#94a3b8" stroke-width="1.6" />
  <rect x="407" y="152" width="138" height="34" rx="8" fill="none" stroke="#94a3b8" stroke-width="1.6" />
  <line x1="405" y1="126" x2="405" y2="190" stroke="#f43f5e" stroke-width="1.6" stroke-dasharray="4 4" />
  <text x="405" y="122" font-size="11" font-weight="700" fill="#e11d48" text-anchor="middle">split</text>

  <text x="72" y="205" font-size="11" fill="#64748b">chunk 1</text>
  <text x="415" y="205" font-size="11" fill="#64748b">chunk 2</text>
  <text x="40" y="230" font-size="12.5" fill="#b91c1c">The boundary cuts the idea in two. Neither chunk holds the whole phrase.</text>

  <!-- ===================== ROW B: WITH OVERLAP ===================== -->
  <text x="40" y="270" font-size="12" font-weight="700" letter-spacing="0.05em" fill="#059669">WITH OVERLAP</text>

  <text x="70" y="306" font-size="13" fill="#334155" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace"><tspan>To start a refund, email support </tspan><tspan fill="#4f46e5" font-weight="700">within 30 days of purchase.</tspan></text>

  <!-- overlapping windows -->
  <rect x="62" y="318" width="398" height="34" rx="8" fill="none" stroke="#94a3b8" stroke-width="1.6" />
  <rect x="327" y="318" width="218" height="34" rx="8" fill="none" stroke="#06b6d4" stroke-width="2" />
  <rect x="327" y="318" width="133" height="34" rx="8" fill="#10b981" fill-opacity="0.18" />
  <text x="393" y="339" font-size="10.5" font-weight="700" fill="#059669" text-anchor="middle">overlap</text>

  <text x="72" y="371" font-size="11" fill="#64748b">chunk 1</text>
  <text x="486" y="371" font-size="11" fill="#0e7490">chunk 2</text>
  <text x="40" y="396" font-size="12.5" fill="#047857">The shared seam keeps the whole phrase inside chunk 2.</text>
</svg>
