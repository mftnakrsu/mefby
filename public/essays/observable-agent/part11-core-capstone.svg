<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="100%" style="height:auto" role="img" aria-label="The core capstone map of the Agents from First Principles core track, Parts 1 to 11. At the center is the augmented-LLM primitive from Part 1: an LLM controller with typed, validated tools, plus memory and retrieval, in a loop. Around it are the rings added by each later part: Part 2 robust execution with a failure taxonomy, retries, and idempotency; Part 3 planning with plan-and-execute, ReWOO, and a tool DAG; Part 4 a critic and error-triggered replanning; Part 5 reflection and cross-trial Reflexion; Part 6 four typed memories the agent edits itself; Part 7 compaction and forgetting for the long haul; Part 8 budgets, a loop detector, and a circuit breaker; Part 9 a durable event journal with replay and effectively-once; Part 10 pause, approve, resume, and steer for human in the loop; and Part 11 observability with spans and cost-per-success, which is the capstone and where you are now. An arrow points onward from the core track to the frontier track, Parts 12 to 17: MCP, code execution and sandbox, supervisor and handoffs, agent-to-agent interop, securing the agent, and agent evaluation.">
  <title>The core capstone: the augmented-LLM primitive with the rings added Parts 2 to 11, then an arrow onward to the frontier track</title>

  <defs>
    <marker id="arrSlate" markerWidth="13" markerHeight="11" refX="10" refY="5.5" orient="auto">
      <polygon points="0 0, 13 5.5, 0 11" fill="#64748b"/>
    </marker>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </radialGradient>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="760" fill="#f8fafc"/>

  <!-- Top-right label -->
  <text x="1170" y="30" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="11" font-weight="700" fill="#64748b" letter-spacing="0.06em">AGENTS FROM FIRST PRINCIPLES</text>
  <text x="1170" y="46" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="10" fill="#94a3b8">Part 11, the core capstone</text>

  <!-- Title -->
  <text x="40" y="34" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="18" font-weight="700" fill="#0f172a">The core capstone: every ring we added to the augmented LLM, Parts 1 to 11</text>
  <text x="40" y="54" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12" fill="#64748b">From a bare loop to a production-shaped core agent: one primitive at the center, one ring per part. The frontier track opens it to the protocol wire and multi-agent systems.</text>

  <!-- ====================== THE RINGS (concentric) ====================== -->
  <!-- center at (430, 420). Rings drawn outermost first so inner rings sit on top. -->

  <!-- Ring 11 (outermost) observability -->
  <circle cx="430" cy="420" r="300" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.4"/>
  <!-- Ring 10 -->
  <circle cx="430" cy="420" r="272" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
  <!-- Ring 9 -->
  <circle cx="430" cy="420" r="244" fill="#eef2ff" stroke="#dbe3ff" stroke-width="1.2"/>
  <!-- Ring 8 -->
  <circle cx="430" cy="420" r="216" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
  <!-- Ring 7 -->
  <circle cx="430" cy="420" r="188" fill="#eef2ff" stroke="#dbe3ff" stroke-width="1.2"/>
  <!-- Ring 6 -->
  <circle cx="430" cy="420" r="160" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
  <!-- Ring 5 -->
  <circle cx="430" cy="420" r="134" fill="#eef2ff" stroke="#dbe3ff" stroke-width="1.2"/>
  <!-- Ring 4 -->
  <circle cx="430" cy="420" r="110" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
  <!-- Ring 3 -->
  <circle cx="430" cy="420" r="88" fill="#eef2ff" stroke="#dbe3ff" stroke-width="1.2"/>
  <!-- Ring 2 -->
  <circle cx="430" cy="420" r="66" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>

  <!-- CORE: the augmented-LLM primitive (Part 1) -->
  <circle cx="430" cy="420" r="46" fill="url(#coreGlow)" stroke="#6366f1" stroke-width="2.2"/>
  <text x="430" y="409" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#4f46e5">Part 1</text>
  <text x="430" y="424" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" font-weight="700" fill="#3730a3">augmented LLM</text>
  <text x="430" y="437" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="8" fill="#4f46e5">controller + tools, loop</text>

  <!-- Ring labels: placed on the top arc of each ring so they read along the radius -->
  <g font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" text-anchor="middle">
    <text x="430" y="365" font-size="9" font-weight="700" fill="#475569">2 &#183; robust execution</text>
    <text x="430" y="343" font-size="9" font-weight="700" fill="#4f46e5">3 &#183; planning + tool DAG</text>
    <text x="430" y="320" font-size="9" font-weight="700" fill="#475569">4 &#183; critic + replanning</text>
    <text x="430" y="295" font-size="9" font-weight="700" fill="#4f46e5">5 &#183; reflection + Reflexion</text>
    <text x="430" y="270" font-size="9" font-weight="700" fill="#475569">6 &#183; four typed memories</text>
    <text x="430" y="243" font-size="9" font-weight="700" fill="#4f46e5">7 &#183; compaction + forgetting</text>
    <text x="430" y="216" font-size="9" font-weight="700" fill="#475569">8 &#183; budgets + breaker</text>
    <text x="430" y="189" font-size="9" font-weight="700" fill="#4f46e5">9 &#183; durable journal + replay</text>
    <text x="430" y="161" font-size="9" font-weight="700" fill="#475569">10 &#183; pause / approve / resume</text>
  </g>

  <!-- Ring 11 is the capstone: highlight its label -->
  <text x="430" y="133" text-anchor="middle" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="9.5" font-weight="700" fill="#b45309">11 &#183; observability: spans + cost-per-success</text>

  <!-- "core capstone" tag near outer ring bottom -->
  <rect x="350" y="700" width="160" height="26" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.4"/>
  <text x="430" y="717" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#4f46e5">CORE CAPSTONE</text>

  <!-- "you are here" pointer to ring 11 -->
  <circle cx="430" cy="125" r="4" fill="#f59e0b"/>
  <text x="430" y="113" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9" font-weight="700" fill="#b45309">you are here</text>

  <!-- ====================== ONWARD ARROW to the frontier track ====================== -->
  <line x1="734" y1="420" x2="828" y2="420" stroke="#64748b" stroke-width="2.6" marker-end="url(#arrSlate)"/>
  <text x="781" y="408" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" font-style="italic" fill="#64748b">onward</text>

  <!-- ====================== FRONTIER TRACK PANEL ====================== -->
  <rect x="840" y="150" width="320" height="540" rx="13" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.6"/>
  <text x="864" y="184" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#0f172a">The frontier track</text>
  <text x="864" y="202" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10.5" fill="#64748b">Parts 12 to 17: open this agent to the</text>
  <text x="864" y="216" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10.5" fill="#64748b">protocol wire and multi-agent systems.</text>

  <!-- frontier items -->
  <g>
    <rect x="864" y="236" width="272" height="60" rx="9" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
    <rect x="864" y="236" width="5" height="60" rx="2.5" fill="#14b8a6"/>
    <text x="882" y="258" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#0d9488">12 &#183; MCP by hand</text>
    <text x="882" y="276" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">the tool protocol on the wire, by hand,</text>
    <text x="882" y="289" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">no SDK.</text>

    <rect x="864" y="304" width="272" height="60" rx="9" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
    <rect x="864" y="304" width="5" height="60" rx="2.5" fill="#14b8a6"/>
    <text x="882" y="326" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#0d9488">13 &#183; code execution + sandbox</text>
    <text x="882" y="344" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">running model-written code under</text>
    <text x="882" y="357" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">isolation.</text>

    <rect x="864" y="372" width="272" height="60" rx="9" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
    <rect x="864" y="372" width="5" height="60" rx="2.5" fill="#14b8a6"/>
    <text x="882" y="394" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#0d9488">14 &#183; supervisor + handoffs</text>
    <text x="882" y="412" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">one agent delegating to many,</text>
    <text x="882" y="425" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">orchestrated.</text>

    <rect x="864" y="440" width="272" height="60" rx="9" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
    <rect x="864" y="440" width="5" height="60" rx="2.5" fill="#14b8a6"/>
    <text x="882" y="462" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#0d9488">15 &#183; A2A agent interop</text>
    <text x="882" y="480" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">agents talking to agents across</text>
    <text x="882" y="493" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">boundaries.</text>

    <rect x="864" y="508" width="272" height="60" rx="9" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
    <rect x="864" y="508" width="5" height="60" rx="2.5" fill="#f43f5e"/>
    <text x="882" y="530" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#9f1239">16 &#183; securing the agent</text>
    <text x="882" y="548" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">prompt injection, untrusted tools,</text>
    <text x="882" y="561" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">the lethal trifecta.</text>

    <rect x="864" y="576" width="272" height="60" rx="9" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
    <rect x="864" y="576" width="5" height="60" rx="2.5" fill="#f59e0b"/>
    <text x="882" y="598" font-family="ui-monospace, JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#b45309">17 &#183; agent evaluation</text>
    <text x="882" y="616" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">judging trajectories, not just final</text>
    <text x="882" y="629" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#475569">answers.</text>
  </g>

  <text x="864" y="664" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#64748b">The core agent is shippable. The frontier</text>
  <text x="864" y="678" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#64748b">track is where it meets the wider world.</text>

  <!-- ====================== bottom note ====================== -->
  <rect x="40" y="700" width="290" height="46" rx="9" fill="#fffbeb" stroke="#fde68a" stroke-width="1.1"/>
  <text x="56" y="720" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#b45309">Each ring was a failure the bare loop could not</text>
  <text x="56" y="734" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="9.5" fill="#b45309">survive, then the mechanism that fixed it.</text>

</svg>
